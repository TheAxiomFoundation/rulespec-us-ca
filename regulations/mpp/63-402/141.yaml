format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-402.141
  summary: |-
    A foster child placed by a federal, state, or local government program in the private home of a relative, or other individual or family, shall be considered a boarder. Such a boarder may participate in the Food Stamp Program only by request of the household providing boarder services, and only as a member of that household.
