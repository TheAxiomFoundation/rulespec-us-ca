format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-402.142
  summary: |-
    a child is: 22 years of age or older and purchases food and prepares meals for home consumption separately from his/her parents; or participating in the other parent's Food Stamp household.
rules:
  - name: child_parent_separate_meals_age_threshold
    kind: parameter
    dtype: Integer
    source: 63-402.142, first clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.142
              excerpt: "22 years of age or older"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          22

  - name: child_is_adult_separate_meals_or_in_other_parent_food_stamp_household
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-402.142
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.142
              excerpt: "22 years of age or older and purchases food and prepares meals for home consumption separately from his/her parents"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.142
              excerpt: "participating in the other parent's Food Stamp household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (child_age_years >= child_parent_separate_meals_age_threshold and child_purchases_food_and_prepares_meals_for_home_consumption_separately_from_parents) or child_participating_in_other_parent_food_stamp_household
