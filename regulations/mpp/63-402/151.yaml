format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-402.151
  summary: |-
    When it can be established that the child eats more meals with one parent. The child may participate with the custodial parent providing the majority of the meals in a given month. When a child eats a number of meals with each parent, the first custodial parent to apply may participate with the child, unless the two custodial parents mutually agree otherwise. When custodial parents mutually agree with whom the child participate. The child may participate with that parent regardless of where the majority of meals are taken in any given month. This page is intentionally left blank. FOOD STAMP REGULATIONS Regulations ELIGIBILITY STANDARDS 63-402.151
rules:
  - name: custodial_parent_may_participate_with_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-402.151
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.151
              excerpt: "When it can be established that the child eats more meals with one parent. The child may participate with the custodial parent providing the majority of the meals in a given month."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.151
              excerpt: "When a child eats a number of meals with each parent, the first custodial parent to apply may participate with the child"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.151
              excerpt: "unless the two custodial parents mutually agree otherwise."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.151
              excerpt: "When custodial parents mutually agree with whom the child participate. The child may participate with that parent regardless of where the majority of meals are taken in any given month."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (it_can_be_established_child_eats_more_meals_with_one_parent and custodial_parent_provides_majority_of_child_meals_in_month)
          or (child_eats_meals_with_each_custodial_parent and custodial_parent_is_first_to_apply_for_child_participation and not custodial_parents_mutually_agree_child_participates_with_another_parent)
          or custodial_parents_mutually_agree_child_participates_with_this_parent
