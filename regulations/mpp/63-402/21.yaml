format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-402.21
  summary: |-
    For purposes of defining a household, the following individuals shall not be included as a member of the household, unless included as a household member as specified in Sections 63-402.13, .14, or .15. Such individuals shall not be included as a member of the household for the purpose of determining household size, eligibility or benefits level. The income and resources of such individuals shall be handled in accordance with Section 63-503.45. Nonhousehold members who are otherwise eligible may participate in the Food Stamp Program as separate households.
rules:
  - name: nonhousehold_individual_excluded_from_household_membership
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-402.21, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.21
              excerpt: "For purposes of defining a household, the following individuals shall not be included as a member of the household"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.21
              excerpt: "unless included as a household member as specified in Sections 63-402.13, .14, or .15"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_nonhousehold_member and
          not included_as_household_member_under_section_63_402_13 and
          not included_as_household_member_under_section_63_402_14 and
          not included_as_household_member_under_section_63_402_15

  - name: nonhousehold_individual_excluded_from_household_size_eligibility_or_benefit_level
