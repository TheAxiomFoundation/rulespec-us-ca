format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-402.17
  summary: |-
    An individual who is 60 years of age or older living with others (and the spouse of such individual) who is unable to purchase and prepare meals because he/she suffers from a disability considered permanent under the Social Security Act or suffers from a nondisease-related, severe, permanent disability. However, the income (all income included under Section 63-502.1 of the others with whom the individual resides (excluding the income of such individual's spouse) cannot exceed 165 percent of the federal poverty guidelines, see Section 63-1001.10, Income Standard for Elderly and Disabled Separate Household Status.
rules:
  - name: elderly_disabled_separate_household_minimum_age
    kind: parameter
    dtype: Integer
    period: Month
    source: 63-402.17, first clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.17
              excerpt: "An individual who is 60 years of age or older living with others"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: elderly_disabled_separate_household_income_limit_rate
    kind: parameter
    dtype: Rate
    period: Month
    source: 63-402.17, income limitation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.17
              excerpt: "cannot exceed 165 percent of the federal poverty guidelines"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1.65

  - name: individual_is_60_years_of_age_or_older
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-402.17, first clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.17
              excerpt: "An individual who is 60 years of age or older"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_age >= elderly_disabled_separate_household_minimum_age

  - name: elderly_disabled_separate_household_income_limit
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 63-402.17, income limitation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.17
              excerpt: "cannot exceed 165 percent of the federal poverty guidelines, see Section 63-1001.10, Income Standard for Elderly and Disabled Separate Household Status"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          elderly_disabled_separate_household_income_limit_rate * income_standard_for_elderly_and_disabled_separate_household_status_under_section_63_1001_10

  - name: elderly_disabled_separate_household_status
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-402.17
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-402.17
              excerpt: "An individual who is 60 years of age or older living with others (and the spouse of such individual) who is unable to purchase and prepare meals because he/she suffers from a disability considered permanent under the Social Security Act or suffers from a nondisease-related, severe, permanent disability. However, the income (all income included under Section 63-502.1 of the others with whom the individual resides (excluding the income of such individual's spouse) cannot exceed 165 percent of the federal poverty guidelines"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_60_years_of_age_or_older
          and individual_lives_with_others
          and (
            individual_unable_to_purchase_and_prepare_meals_because_disability_considered_permanent_under_social_security_act
            or individual_unable_to_purchase_and_prepare_meals_because_nondisease_related_severe_permanent_disability
          )
          and income_of_others_with_whom_individual_resides_excluding_spouse_included_under_section_63_502_1 <= elderly_disabled_separate_household_income_limit
