format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-403.4
  summary: |-
    For CFAP purposes, combined households are those which contain participants of the federal FSP and CFAP. No household shall receive more food stamp benefits under CFAP than it would have received if all members had remained eligible for the federal FSP.
rules:
  - name: cfap_combined_household
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-403.4, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-403.4
              excerpt: "For CFAP purposes, combined households are those which contain participants of the federal FSP and CFAP."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_contains_federal_fsp_participant and household_contains_cfap_participant

  - name: cfap_food_stamp_benefits_after_federal_fsp_all_members_eligible_cap
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 63-403.4, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-403.4
              excerpt: "No household shall receive more food stamp benefits under CFAP than it would have received if all members had remained eligible for the federal FSP."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, min(proposed_cfap_food_stamp_benefits_under_cfap, federal_fsp_food_stamp_benefits_if_all_members_had_remained_eligible))
