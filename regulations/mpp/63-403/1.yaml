format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-403.1
  summary: |-
    Certain legal noncitizens of the United States (U.S.) shall be eligible for CFAP if they are not eligible for federal Food Stamp (FS) benefits, based solely on their immigration status under the Personal Responsibility and Work Opportunity Reconciliation Act of 1996 as amended by the Food Stamp Reauthorization Act of 2002. Legal presence can be verified through USCIS at application [i.e. Systematic Alien Verification for Entitlements (SAVE) System]. Legal noncitizens whose time limit has expired for the federal program but would otherwise remain eligible for federal benefits are eligible for CFAP.
