format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-403.31
  summary: |-
    Trafficking, domestic violence, or other serious crime applicants shall not be subject to food stamp work requirements. This includes the Able-Bodied Adult Without Dependents (ABAWD) work requirement, and requirements for food stamp work registration and participation in the Food Stamp Employment and Training (FSET) program. In addition, recipients shall not be subject to penalties for voluntary quit and reduction of hours worked. However, this group may participate in other education or training to the extent such participation is permissible.
rules:
  - name: trafficking_domestic_violence_or_serious_crime_applicant_work_requirement_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-403.31, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-403.31
              excerpt: "Trafficking, domestic violence, or other serious crime applicants shall not be subject to food stamp work requirements."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          trafficking_applicant or domestic_violence_applicant or other_serious_crime_applicant

