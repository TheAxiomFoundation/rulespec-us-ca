format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-403.2
  summary: |-
    Current federal FSP regulations contained in the State FSP Manual (Division 63 of the CDSS Manual of Policies and Procedures) will apply to the CFAP and its participants unless otherwise stated. For CFAP recipients who do not meet exemptions from deeming, the period for deeming of a sponsor’s income and resources shall be three years from the date of the sponsor’s execution of the 213A Affidavit of Support. Victims of abuse by their sponsor or sponsor’s spouse shall be exempt from deeming.
rules:
  - name: cfap_sponsor_deeming_period_years
    kind: parameter
    dtype: Integer
    source: 63-403.2, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-403.2
              excerpt: "the period for deeming of a sponsor’s income and resources shall be three years from the date of the sponsor’s execution of the 213A Affidavit of Support"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: victim_of_sponsor_abuse_exempt_from_deeming
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-403.2, sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-403.2
              excerpt: "Victims of abuse by their sponsor or sponsor’s spouse shall be exempt from deeming."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cfap_recipient and
          (victim_of_abuse_by_sponsor or victim_of_abuse_by_sponsor_spouse)

  - name: cfap_recipient_meets_deeming_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-403.2, sentences 2-3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-403.2
              excerpt: "For CFAP recipients who do not meet exemptions from deeming"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-403.2
              excerpt: "Victims of abuse by their sponsor or sponsor’s spouse shall be exempt from deeming."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          victim_of_sponsor_abuse_exempt_from_deeming or
          cfap_recipient_meets_other_deeming_exemption

  - name: sponsor_income_and_resources_deemed_to_cfap_recipient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-403.2, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-403.2
              excerpt: "For CFAP recipients who do not meet exemptions from deeming, the period for deeming of a sponsor’s income and resources shall be three years from the date of the sponsor’s execution of the 213A Affidavit of Support."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cfap_recipient and
          sponsor_executed_213a_affidavit_of_support and
          years_since_sponsor_execution_of_213a_affidavit_of_support < cfap_sponsor_deeming_period_years and
          not cfap_recipient_meets_deeming_exemption
