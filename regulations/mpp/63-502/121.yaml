format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-502.121
  summary: |-
    Monies withheld from an assistance payment, earned income, or other income source, or monies received from any income source which are voluntarily or involuntarily returned, to repay a prior overpayment received from that income source, provided that the overpayment was not excludable under Section 63-502.2, or due to the household’s failure to comply as specified in Section 63-502.17.
rules:
  - name: monies_withheld_or_returned_to_repay_nonexcluded_prior_overpayment
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: MPP 63-502.121
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-502.121
              excerpt: "Monies withheld from an assistance payment, earned income, or other income source, or monies received from any income source which are voluntarily or involuntarily returned, to repay a prior overpayment received from that income source"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-502.121
              excerpt: "provided that the overpayment was not excludable under Section 63-502.2"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-502.121
              excerpt: "or due to the household’s failure to comply as specified in Section 63-502.17"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            monies_withheld_from_assistance_payment_earned_income_or_other_income_source_to_repay_prior_overpayment_from_that_income_source
            or monies_received_from_income_source_voluntarily_or_involuntarily_returned_to_repay_prior_overpayment_from_that_income_source
          )
          and
          not prior_overpayment_excludable_under_section_63_502_2
          and
          not prior_overpayment_due_to_household_failure_to_comply_under_section_63_502_17
