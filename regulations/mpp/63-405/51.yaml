format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.51
  summary: |-
    A noncitizen who has been abused:
rules:
  - name: abused_noncitizen
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.51, branch text
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.51
              excerpt: A noncitizen who has been abused
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and person_has_been_abused
