format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.311
  summary: |-
    Has been honorably discharged for a reason other than on account of alienage as documented by a DD Form 214 or other acceptable verification; and
rules:
  - name: honorable_discharge_other_than_alienage_verified
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.311, operative limb
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.311
              excerpt: Has been honorably discharged for a reason other than on account of alienage as documented by a DD Form 214 or other acceptable verification; and
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_been_honorably_discharged
          and discharge_reason_other_than_on_account_of_alienage
          and (
            honorable_discharge_documented_by_dd_form_214
            or honorable_discharge_documented_by_other_acceptable_verification
          )
