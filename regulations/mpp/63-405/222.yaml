format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.222
  summary: |-
    HANDBOOK BEGINS HERE Documentary evidence of Section 289 status is: (a) An unexpired Alien Registration Receipt Card or Permanent Resident Card with the code S13; or (b) An unexpired temporary I-551 stamp in a Canadian passport or on the Arrival-Departure Record with the code S13; or (c) A letter or tribal document certifying at least 50% Indian blood as required by Section 289 of the Act and a birth certificate or satisfactory evidence of birth in Canada. HANDBOOK ENDS HERE
rules:
  - name: section_289_indian_blood_minimum_rate
    kind: parameter
    dtype: Rate
    source: MPP 63-405.222(c), "at least 50% Indian blood"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.222
              excerpt: at least 50% Indian blood
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50
  - name: documentary_evidence_of_section_289_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.222, documentary evidence list
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.222
              excerpt: "Documentary evidence of Section 289 status is: (a) An unexpired Alien Registration Receipt Card or Permanent Resident Card with the code S13; or (b) An unexpired temporary I-551 stamp in a Canadian passport or on the Arrival-Departure Record with the code S13; or (c) A letter or tribal document certifying at least 50% Indian blood as required by Section 289 of the Act and a birth certificate or satisfactory evidence of birth in Canada."
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.222
              excerpt: at least 50% Indian blood
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_unexpired_alien_registration_receipt_card_or_permanent_resident_card_with_code_s13
          or person_has_unexpired_temporary_i_551_stamp_with_code_s13_in_canadian_passport_or_arrival_departure_record
          or (
            person_has_letter_or_tribal_document_certifying_indian_blood
            and person_certified_indian_blood_rate >= section_289_indian_blood_minimum_rate
            and person_has_birth_certificate_or_satisfactory_evidence_of_birth_in_canada
          )
