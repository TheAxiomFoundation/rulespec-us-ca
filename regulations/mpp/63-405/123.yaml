format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.123
  summary: |-
    Is under 18 years of age regardless of the date of entry into the U.S.
rules:
  - name: age_limit_for_under_18_years
    kind: parameter
    dtype: Integer
    source: MPP 63-405.123
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.123
              excerpt: Is under 18 years of age regardless of the date of entry into the U.S.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18
  - name: person_under_18_regardless_of_us_entry_date
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.123
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.123
              excerpt: Is under 18 years of age regardless of the date of entry into the U.S.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age_years < age_limit_for_under_18_years
