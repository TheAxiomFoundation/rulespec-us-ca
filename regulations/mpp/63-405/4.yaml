format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.4
  summary: |-
    A noncitizen who can be credited with 40 quarters (10 years) of qualifying employment; or can be credited with such qualifying credits of employment through parents (up through the quarter the applicant turned 18, including credits earned before the child was born) and/or spouse (for work performed during their marriage and the noncitizen remains married to such spouse or such spouse is deceased) is eligible. One credit equals one calendar quarter of qualifying employment. Beginning with the first quarter of 1997, no credit shall be countable if the individual who earned it received any federal means-tested public benefits. Qualifying credits of employment shall be verified.
rules:
  - name: required_qualifying_employment_credits
    kind: parameter
    dtype: Count
    source: MPP 63-405.4, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.4
              excerpt: A noncitizen who can be credited with 40 quarters (10 years) of qualifying employment
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40
  - name: required_qualifying_employment_years_equivalent
    kind: parameter
    dtype: Count
    source: MPP 63-405.4, parenthetical equivalent
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.4
              excerpt: 40 quarters (10 years) of qualifying employment
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: calendar_quarters_per_qualifying_employment_credit
    kind: parameter
    dtype: Count
    source: MPP 63-405.4, credit definition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: unit
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.4
              excerpt: One credit equals one calendar quarter of qualifying employment.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1
  - name: noncitizen_eligible_based_on_qualifying_employment_credits
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.4, qualifying employment credit eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.4
              excerpt: A noncitizen who can be credited with 40 quarters (10 years) of qualifying employment; or can be credited with such qualifying credits of employment through parents
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.4
              excerpt: and/or spouse (for work performed during their marriage and the noncitizen remains married to such spouse or such spouse is deceased) is eligible.
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.4
              excerpt: Beginning with the first quarter of 1997, no credit shall be countable if the individual who earned it received any federal means-tested public benefits.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.4
              excerpt: Qualifying credits of employment shall be verified.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_noncitizen
          and qualifying_employment_credits_verified
          and all_counted_credits_before_1997_or_without_earner_federal_means_tested_public_benefits
          and (
            noncitizen_own_countable_qualifying_employment_credits >= required_qualifying_employment_credits
            or noncitizen_own_countable_qualifying_employment_credits + parent_qualifying_employment_credits_creditable_through_age_18_including_before_birth >= required_qualifying_employment_credits
            or (
              noncitizen_remains_married_to_spouse_or_spouse_is_deceased
              and noncitizen_own_countable_qualifying_employment_credits + parent_qualifying_employment_credits_creditable_through_age_18_including_before_birth + spouse_qualifying_employment_credits_for_work_performed_during_marriage >= required_qualifying_employment_credits
            )
          )
