format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.121
  summary: |-
    Who is lawfully admitted to the U.S. for permanent residence and can be credited with 40 qualifying quarters of coverage as specified in Section 63-405.4
rules:
  - name: required_qualifying_quarters_of_coverage_for_permanent_resident_branch
    kind: parameter
    dtype: Count
    source: MPP 63-405.121, qualifying quarters phrase
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.121
              excerpt: can be credited with 40 qualifying quarters of coverage as specified in Section 63-405.4
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          40

  - name: lawful_permanent_resident_with_required_qualifying_quarters
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.121, operative text
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.121
              excerpt: Who is lawfully admitted to the U.S. for permanent residence and can be credited with 40 qualifying quarters of coverage as specified in Section 63-405.4
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_lawfully_admitted_to_us_for_permanent_residence
          and creditable_qualifying_quarters_of_coverage_under_section_63_405_4 >= required_qualifying_quarters_of_coverage_for_permanent_resident_branch
