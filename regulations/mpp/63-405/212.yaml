format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.212
  summary: |-
    HANDBOOK BEGINS HERE (a) Divorced spouses do not qualify as family members. (b) A member of the family of a deceased tribal member need not show that the deceased tribal member legally resided in the U.S.. (c) A child means the legally adopted or biological child of the Hmong or Highland Laotian described in Section 64-405.211. (d) An unmarried dependent child of a Hmong or Highland Laotian described in Section 63-405.21, is under the age of 18, or a full-time student under the age of 22, an unmarried child under the age of 18 or if a full-time student under the age of 22 of a deceased Hmong or Highland Laotian provided the child was dependent upon him or her at the time of his/her death, or an unmarried disabled child age 18 or older if the child was disabled and dependent on the person prior to the child’s 18th birthday. HANDBOOK ENDS HERE
rules:
  - name: divorced_spouse_excluded_from_family_members
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.212(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.212
              excerpt: "Divorced spouses do not qualify as family members."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_divorced_spouse

  - name: deceased_tribal_member_legal_residence_showing_not_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.212(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.212
              excerpt: "A member of the family of a deceased tribal member need not show that the deceased tribal member legally resided in the U.S.."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_member_of_family_of_deceased_tribal_member

  - name: child_of_hmong_or_highland_laotian_under_section_64_405_211
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.212(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.212
              excerpt: "A child means the legally adopted or biological child of the Hmong or Highland Laotian described in Section 64-405.211."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_legally_adopted_child_of_hmong_or_highland_laotian_described_in_section_64_405_211
          or person_is_biological_child_of_hmong_or_highland_laotian_described_in_section_64_405_211

  - name: qualifying_child_family_member_of_hmong_or_highland_laotian
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.212(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.212
              excerpt: "An unmarried dependent child of a Hmong or Highland Laotian described in Section 63-405.21, is under the age of 18, or a full-time student under the age of 22"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.212
              excerpt: "an unmarried child under the age of 18 or if a full-time student under the age of 22 of a deceased Hmong or Highland Laotian provided the child was dependent upon him or her at the time of his/her death"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.212
              excerpt: "an unmarried disabled child age 18 or older if the child was disabled and dependent on the person prior to the child’s 18th birthday."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            person_is_unmarried
            and person_is_dependent_child_of_hmong_or_highland_laotian_described_in_section_63_405_21
            and (
              person_is_under_age_18
              or person_is_full_time_student_under_age_22
            )
          )
          or (
            person_is_unmarried
            and person_is_child_of_deceased_hmong_or_highland_laotian
            and person_was_dependent_on_deceased_hmong_or_highland_laotian_at_death
            and (
              person_is_under_age_18
              or person_is_full_time_student_under_age_22
            )
          )
          or (
            person_is_unmarried
            and person_is_disabled_child_age_18_or_older
            and person_was_disabled_and_dependent_on_hmong_or_highland_laotian_prior_to_18th_birthday
          )
