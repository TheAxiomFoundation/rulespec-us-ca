  summary: |-
    Under the age of 18.
rules:
  - name: under_age_limit
    kind: parameter
    dtype: Integer
    source: MPP 63-405.332
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.332
              excerpt: Under the age of 18.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18
  - name: person_under_age_18
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.332
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.332
              excerpt: Under the age of 18.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age_in_years < under_age_limit
