format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.412
  summary: |-
    Did the applicant noncitizen, the applicant noncitizen’s parents (up through the quarter the applicant turned 18, including credits earned before the child was born) and/or spouse (for work performed during their marriage and the noncitizen remains married to such spouse or such spouse is deceased) ever perform work for a United States business or the U.S. government, while not residing in the United States? If so, for how many calendar quarters or years? If an applicant noncitizen neither lived in the U.S. at least 10 years, or worked for a United States business or the U.S. government while living in another country; or if the combination of years lived in the United States and worked for a United States business or the U.S. government while living in another country totals less than 10 years, then the applicant noncitizen shall be denied food stamps. If the total is at least 10 years, then question C (Section 63-405.413) shall be asked.
rules:
  - name: minimum_combined_residence_and_credited_work_years
    kind: parameter
    dtype: Count
    source: MPP 63-405.412, denial and question-C sentences
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.412
              excerpt: "at least 10 years"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: applicant_noncitizen_denied_food_stamps_for_insufficient_residence_or_credited_work
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.412, denial sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.412
              excerpt: "If an applicant noncitizen neither lived in the U.S. at least 10 years, or worked for a United States business or the U.S. government while living in another country; or if the combination of years lived in the United States and worked for a United States business or the U.S. government while living in another country totals less than 10 years, then the applicant noncitizen shall be denied food stamps."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_is_noncitizen and (
            (
              applicant_years_lived_in_united_states < minimum_combined_residence_and_credited_work_years
              and not applicant_or_qualifying_parent_or_spouse_worked_for_us_business_or_government_abroad
            )
            or applicant_combined_years_lived_in_united_states_and_credited_abroad_work_for_us_business_or_government < minimum_combined_residence_and_credited_work_years
          )

  - name: question_c_required_after_residence_or_credited_work_threshold
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.412, final sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.412
              excerpt: "If the total is at least 10 years, then question C (Section 63-405.413) shall be asked."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_is_noncitizen
          and applicant_combined_years_lived_in_united_states_and_credited_abroad_work_for_us_business_or_government >= minimum_combined_residence_and_credited_work_years
