format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.211
  summary: |-
    HANDBOOK BEGINS HERE Documentary evidence of Hmong or Highland Loatian tribe member includes: (a) Was born in Laos [or another country with Hmong or other Highland Loatian populations and can give a reasonable explanation as to why he/she was not born in Laos (the countries include Thailand, Cambodia, China, Vietnam, Philippines, Indonesia, Hong Kong, Malaysia, and Singapore)]; (b) Has a refugee code RE1, RE2, RE3, RE6, RE7, R86, IC6, or IC7, or can give a reasonable explanation of his/her immigration to the U.S. (for example, sought asylum in another country and later immigrated to the U.S.); (c) Entered the U.S. in April 1975 or later (or can give a reasonable explanation for having entered before that, such as came here as a student, for military training, to escape the war, and so on); (d) Signs an affidavit swearing under penalty of law that he/she was a member of a Hmong or Highland Loatian tribe between August 5, 1964 and May 7, 1975. [If a food stamp worker has access to the Refugee Data Center (RDC) list of eligible Hmong and Highland Loatian refugees who entered the U.S. after 1979, and the name or alien number of the person claiming membership in a tribal group appears on the list, there is no need for the affidavit. However, the worker must not deny eligibility for food stamps simply because the RDC list is unavailable or the applicant’s name or alien number does not appear on it.]; and (e) Presents other information/documentation establishing that the tribal member was part of a Hmong/Highland Loatian Tribe between August 5, 1964 and May 7, 1975. HANDBOOK ENDS HERE FOOD STAMP REGULATIONS
rules:
  - name: hmong_or_highland_loation_tribe_member_documentary_evidence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.211, Handbook documentary evidence paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.211
              excerpt: Documentary evidence of Hmong or Highland Loatian tribe member includes clauses (a) through (e), including birth or explanation, refugee code or immigration explanation, U.S. entry timing or explanation, affidavit or RDC-list alternative, and other documentation establishing tribal membership.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            person_was_born_in_laos
            or (
              person_was_born_in_other_country_with_hmong_or_highland_loatian_populations
              and person_reasonably_explains_not_born_in_laos
            )
          )
          and (
            person_has_specified_hmong_highland_loatian_refugee_code
            or person_reasonably_explains_immigration_to_us
          )
          and (
            person_entered_us_in_april_1975_or_later
            or person_reasonably_explains_entry_before_april_1975
          )
          and (
            person_signed_affidavit_of_tribe_membership_between_august_5_1964_and_may_7_1975
            or (
              food_stamp_worker_has_access_to_rdc_eligible_refugee_list
              and person_name_or_alien_number_appears_on_rdc_list
            )
          )
          and person_presents_other_documentation_establishing_tribe_membership_between_august_5_1964_and_may_7_1975
