format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.511
  summary: |-
    In the U.S. by a spouse or a parent, or by a member of the spouse or parent’s family residing in the same household as the noncitizen and the spouse or parent consented to, or acquiesced in, such battery or cruelty, but only if (in the opinion of the agency providing such benefits) there is a substantial connection between such battery or cruelty and the need for the benefits to be provided; and
rules:
  - name: battery_or_cruelty_by_spouse_parent_or_family_substantially_connected_to_benefit_need
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.511, operative clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.511
              excerpt: In the U.S. by a spouse or a parent, or by a member of the spouse or parent’s family residing in the same household as the noncitizen and the spouse or parent consented to, or acquiesced in, such battery or cruelty, but only if (in the opinion of the agency providing such benefits) there is a substantial connection between such battery or cruelty and the need for the benefits to be provided
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          battery_or_cruelty_occurred_in_us
          and (
            battery_or_cruelty_committed_by_spouse
            or battery_or_cruelty_committed_by_parent
            or (
              battery_or_cruelty_committed_by_member_of_spouse_or_parent_family_residing_in_same_household_as_noncitizen
              and spouse_or_parent_consented_to_or_acquiesced_in_battery_or_cruelty
            )
          )
          and agency_opines_substantial_connection_between_battery_or_cruelty_and_need_for_benefits
