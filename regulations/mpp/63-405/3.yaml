format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.3
  summary: |-
    A veteran or a person on active duty in the U.S. armed forces is eligible. The spouse, or unmarried dependent child, or unremarried surviving spouse of a deceased veteran or active duty person is also eligible.
rules:
  - name: veteran_active_duty_person_or_family_member_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.3, operative sentences
    metadata:
