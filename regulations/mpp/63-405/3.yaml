        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.3
              excerpt: A veteran or a person on active duty in the U.S. armed forces is eligible. The spouse, or unmarried dependent child, or unremarried surviving spouse of a deceased veteran or active duty person is also eligible.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_veteran
          or person_on_active_duty_in_us_armed_forces
