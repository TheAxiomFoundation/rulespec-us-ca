format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.42
  summary: |-
    All or part of the qualifying credits of employment may be verified by information provided by the household. The CWD shall accept employer-prepared wage statements, W-2 or W-2c forms, a copy of the federal or state income tax return, etc., as proof of earnings. The normal application processing time frames apply if the CWD is obtaining verification of work credits from the household.
rules:
  - name: household_earnings_documents_accepted_as_proof
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-405.42, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.42
              excerpt: The CWD shall accept employer-prepared wage statements, W-2 or W-2c forms, a copy of the federal or state income tax return, etc., as proof of earnings.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_provides_employer_prepared_wage_statement or household_provides_w2_or_w2c_form or household_provides_copy_of_federal_or_state_income_tax_return
  - name: normal_application_processing_time_frames_apply_to_work_credit_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-405.42, third sentence
    metadata:
