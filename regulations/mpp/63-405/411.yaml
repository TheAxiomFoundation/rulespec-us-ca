format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.411
  summary: |-
    How long has the applicant noncitizen, and if necessary, the applicant noncitizen’s parents (up through the quarter the applicant turned 18, including credits earned before the child was born) and/or spouse (for work performed during their marriage and the noncitizen remains married to such spouse or such spouse is deceased) lived in the United States? If the period of time is more than 10 years, it is not necessary to ask question B (Section 63-405.412). Skip to question C (Section 63-405.413). However, if the period of time is less than 10 years, question B (Section 63-405.412) shall be asked.
rules:
  - name: question_b_residence_threshold_years
    kind: parameter
    dtype: Decimal
    source: MPP 63-405.411, ten-year question B threshold
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.411
              excerpt: If the period of time is more than 10 years, it is not necessary to ask question B
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.411
              excerpt: if the period of time is less than 10 years, question B (Section 63-405.412) shall be asked
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: parent_credit_applicant_age_limit_years
    kind: parameter
    dtype: Count
    source: MPP 63-405.411, parent-credit age limit
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.411
              excerpt: applicant noncitizen’s parents (up through the quarter the applicant turned 18, including credits earned before the child was born)
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: question_b_not_required_after_creditable_us_residence_exceeds_threshold
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.411, more-than-ten-years branch
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.411
              excerpt: If the period of time is more than 10 years, it is not necessary to ask question B
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.411
              excerpt: How long has the applicant noncitizen, and if necessary, the applicant noncitizen’s parents ... and/or spouse ... lived in the United States?
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_noncitizen_creditable_us_residence_years > question_b_residence_threshold_years

  - name: question_c_skipped_to_after_creditable_us_residence_exceeds_threshold
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.411, skip-to-question-C branch
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.411
              excerpt: If the period of time is more than 10 years, it is not necessary to ask question B (Section 63-405.412). Skip to question C (Section 63-405.413).
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_noncitizen_creditable_us_residence_years > question_b_residence_threshold_years

  - name: question_b_required_after_creditable_us_residence_below_threshold
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.411, less-than-ten-years branch
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.411
              excerpt: However, if the period of time is less than 10 years, question B (Section 63-405.412) shall be asked.
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.411
              excerpt: How long has the applicant noncitizen, and if necessary, the applicant noncitizen’s parents ... and/or spouse ... lived in the United States?
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_noncitizen_creditable_us_residence_years < question_b_residence_threshold_years
