format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.512
  summary: |-
    (a) Status as a spouse or a child of a U.S. citizen pursuant to clause (ii), (iii), or (iv) of Section 204(a)(1)(A) of the INA; (b) Classification as a spouse or child of a noncitizen lawfully admitted for permanent residence (LPR) in the U.S. pursuant to clause (ii) or (iii) of Section 204(a)(1)(B) of the INA; (c) Suspension of deportation and adjustment of status pursuant to Section 244(a)(3) of the INA as in effect prior to April 1, 1997; (d) Status as a spouse or child of a U.S. citizen pursuant to clause (i) of Section 204(a)(1)(A) of such Act, or as a spouse or child of an LPR pursuant to clause (i) of Section 204(a)(1)(B) of the INA; or (e) Cancellation of removal pursuant to Section 240A(b)(2) of the INA.
rules:
  - name: person_has_listed_ina_spouse_child_or_removal_relief_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.512, clauses (a)-(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.512
              excerpt: "(a) Status as a spouse or a child of a U.S. citizen pursuant to clause (ii), (iii), or (iv) of Section 204(a)(1)(A) of the INA; (b) Classification as a spouse or child of a noncitizen lawfully admitted for permanent residence (LPR) in the U.S. pursuant to clause (ii) or (iii) of Section 204(a)(1)(B) of the INA; (c) Suspension of deportation and adjustment of status pursuant to Section 244(a)(3) of the INA as in effect prior to April 1, 1997; (d) Status as a spouse or child of a U.S. citizen pursuant to clause (i) of Section 204(a)(1)(A) of such Act, or as a spouse or child of an LPR pursuant to clause (i) of Section 204(a)(1)(B) of the INA; or (e) Cancellation of removal pursuant to Section 240A(b)(2) of the INA."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_spouse_or_child_status_of_us_citizen_under_ina_204_a_1_a_clause_ii_iii_or_iv
          or person_classified_as_spouse_or_child_of_lpr_under_ina_204_a_1_b_clause_ii_or_iii
          or person_has_suspension_of_deportation_and_adjustment_status_under_ina_244_a_3_as_in_effect_before_april_1_1997
          or person_has_spouse_or_child_status_under_ina_204_a_1_a_clause_i_or_204_a_1_b_clause_i
          or person_has_cancellation_of_removal_under_ina_240a_b_2
