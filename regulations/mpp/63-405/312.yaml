format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.312
  summary: |-
    Has met the minimum active-duty service requirements (24 months or the period for which the person was called to active duty).
rules:
  - name: minimum_active_duty_service_requirement_months
    kind: parameter
    dtype: Integer
    source: MPP 63-405.312, parenthetical
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.312
              excerpt: "24 months or the period for which the person was called to active duty"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          24

  - name: person_meets_minimum_active_duty_service_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.312
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.312
              excerpt: "Has met the minimum active-duty service requirements (24 months or the period for which the person was called to active duty)."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_active_duty_service_months >= min(minimum_active_duty_service_requirement_months, period_for_which_person_was_called_to_active_duty_months)
