format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.221
  summary: |-
    HANDBOOK BEGINS HERE (a) This includes, but is not limited to, Native Americans who are entitled to cross the border into the U.S. from Canada or Mexico, the St. Regis Band of the Mohawk in New York State, the Micmac in Maine, the Abanaki in Vermont, and the Kickapoo in Texas. HANDBOOK ENDS HERE Page 174.1 FOOD STAMP REGULATIONS Regulations ELIGIBILITY STANDARDS 63-405 (Cont.) (b) Applicants shall provide a membership card or other tribal document demonstrating membership in an Indian tribe. If the applicant has no membership documentation, the CWD shall contact the Indian tribe for verification.
rules:
  - name: applicant_provides_tribal_membership_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.221(b), first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.221
              excerpt: Applicants shall provide a membership card or other tribal document demonstrating membership in an Indian tribe.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_provided_membership_card_demonstrating_membership_in_indian_tribe or applicant_provided_other_tribal_document_demonstrating_membership_in_indian_tribe

  - name: cwd_must_contact_indian_tribe_for_membership_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-405.221(b), second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.221
              excerpt: If the applicant has no membership documentation, the CWD shall contact the Indian tribe for verification.
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.221
              excerpt: Applicants shall provide a membership card or other tribal document demonstrating membership in an Indian tribe.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not applicant_provided_membership_card_demonstrating_membership_in_indian_tribe and
          not applicant_provided_other_tribal_document_demonstrating_membership_in_indian_tribe
