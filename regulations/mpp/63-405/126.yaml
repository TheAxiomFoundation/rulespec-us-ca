format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-405.126
  summary: |-
    HANDBOOK BEGINS HERE (a) The five-year period begins on the date the immigrant obtains status as a qualified non-citizen through the INS. In cases where the INS grants qualified status retroactively, the CWD shall use the date that INS grants qualified status. For example, a non-citizen enters the country on January 1, 1996, but INS does not complete paperwork until January 1, 1997, and subsequently grants qualified status effective January 1, 1996. The CWD shall begin counting the five–year qualifying period on January 1, 1996. HANDBOOK ENDS HERE
rules:
  - name: qualified_noncitizen_qualifying_period_year_count
    kind: parameter
    dtype: Count
    source: MPP 63-405.126(a), handbook
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-405.126
              excerpt: The five-year period begins on the date the immigrant obtains status as a qualified non-citizen through the INS.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5
  - name: qualified_noncitizen_five_year_period_begins_on_day
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: MPP 63-405.126(a), handbook
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
