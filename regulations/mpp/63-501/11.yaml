format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-501.11
  summary: |-
    Liquid resources, such as cash on hand, money in checking or savings accounts, savings certificates, trust deeds, notes receivable, stocks or bonds, non-recurring lump sum payments, funds held in individual retirement accounts (IRAs) and funds held in accessible Keogh plans.
rules:
  - name: asset_is_listed_liquid_resource
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Month
    source: MPP 63-501.11
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-501.11
              excerpt: "Liquid resources, such as cash on hand, money in checking or savings accounts, savings certificates, trust deeds, notes receivable, stocks or bonds, non-recurring lump sum payments, funds held in individual retirement accounts (IRAs) and funds held in accessible Keogh plans."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          asset_is_cash_on_hand
          or asset_is_money_in_checking_or_savings_account
          or asset_is_savings_certificate
          or asset_is_trust_deed
          or asset_is_note_receivable
          or asset_is_stock_or_bond
          or asset_is_non_recurring_lump_sum_payment
          or asset_is_funds_held_in_individual_retirement_account
          or asset_is_funds_held_in_accessible_keogh_plan
