format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.1
  summary: |-
    The CWD shall determine which household members are required to be registered for employment. Each household member who is not exempt by Section 63-407.2 shall be registered for employment at the time of application and once every twelve months after initial registration as a condition of eligibility, unless the household is entitled to expedited service. If the household is entitled to expedited service, household members subject to work registration shall be registered as indicated in Section 63-301.5.
rules:
  - name: employment_registration_renewal_interval_months
    kind: parameter
    dtype: Count
    source: MPP 63-407.1, twelve-month registration interval
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.1
              excerpt: "once every twelve months after initial registration"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12
  - name: household_member_subject_to_work_registration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.1, nonexempt household members
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.1
              excerpt: "Each household member who is not exempt by Section 63-407.2 shall be registered for employment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_household_member
          and not household_member_exempt_under_section_63_407_2
  - name: regular_employment_registration_required_as_condition_of_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.1, regular registration timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.1
              excerpt: "shall be registered for employment at the time of application and once every twelve months after initial registration as a condition of eligibility, unless the household is entitled to expedited service"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_subject_to_work_registration
          and not household_entitled_to_expedited_service
          and (
            registration_is_at_time_of_application
            or registration_due_under_twelve_month_interval
          )
  - name: expedited_service_employment_registration_under_section_63_301_5_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.1, expedited service registration route
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.1
              excerpt: "If the household is entitled to expedited service, household members subject to work registration shall be registered as indicated in Section 63-301.5."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_subject_to_work_registration
          and household_entitled_to_expedited_service
