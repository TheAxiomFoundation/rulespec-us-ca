format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.61
  summary: |-
    Following the completion of a minimum disqualification period identified in Section 63-407.53, an individual who is otherwise eligible, may apply for food stamps and be approved if the CWD determines the individual is in compliance with the food stamp work registration requirements defined in Section 63-407.4. For the purpose of this provision, in compliance means the individual is fulfilling one of the food stamp work registration requirements, or he/she agrees to fulfill the requirements as specified by the CWD at application.
rules:
