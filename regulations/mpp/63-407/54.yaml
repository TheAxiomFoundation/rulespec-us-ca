format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.54
  summary: |-
    When an individual is sanctioned for failing to comply with the work requirements of a program as specified in Section 63-407.21(c) (Welfare-to-Work), Section 63-407.21(e) (Unemployment Compensation), Section 63-407.23 (Substitute Programs), or Section 63-407.24 (CalWORKs Unpaid Community Service and Work Experience), the individual shall also receive a Food Stamp sanction in accordance with Section 63-407.5.
rules:
  - name: food_stamp_sanction_for_program_work_requirement_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.54, operative sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.54
              excerpt: When an individual is sanctioned for failing to comply with the work requirements of a program as specified in Section 63-407.21(c) (Welfare-to-Work), Section 63-407.21(e) (Unemployment Compensation), Section 63-407.23 (Substitute Programs), or Section 63-407.24 (CalWORKs Unpaid Community Service and Work Experience)
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.54
              excerpt: the individual shall also receive a Food Stamp sanction in accordance with Section 63-407.5
