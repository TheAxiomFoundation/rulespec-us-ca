format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.842
  summary: |-
    (a) Counties shall submit a plan in accordance with guidelines specified by SDSS. Partial or total geographical exclusion may be requested if an FSET Program would be impracticable due to such factors as the availability of work opportunities and the cost-effectiveness of the requirements. Counties requesting geographical exclusion shall submit sufficient economic and demographic data to justify such exclusion. County plan amendments shall be submitted to SDSS for approval 60 days prior to the effective date of any proposed changes. (b) The CWD shall be permitted to operate or contract with another organization to operate the FSET Program or any component. FOOD STAMP REGULATIONS (c) Counties that operate their own programs shall be permitted to establish independent FSET components and/or use existing components of WIN/Demo or GAIN, or those offered under other programs such as Refugee Employment Services, or General Assistance. If existing components are used, the following conditions shall be met: (1) Participation and sanction requirements are consistent with Sections 63-407.85 and .86. (2) The components are described in an approved county plan. (3) Activities associated with the delivery of services to FSET participants are time studied and claimed to the FSET Program in accordance with applicable time study and claiming instructions issued by SDSS.
