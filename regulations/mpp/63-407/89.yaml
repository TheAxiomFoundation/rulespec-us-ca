format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.89
  summary: |-
    If a benefit overissuance is discovered for a month or months in which a participant has already fulfilled a workfare or work component requirement, the following requirements shall apply.
rules:
  - name: overissuance_month_after_fulfilled_workfare_or_work_component_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.89, operative sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.89
              excerpt: If a benefit overissuance is discovered for a month or months in which a participant has already fulfilled a workfare or work component requirement, the following requirements shall apply.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          benefit_overissuance_discovered_for_participant_month
          and participant_already_fulfilled_workfare_or_work_component_requirement_for_month
