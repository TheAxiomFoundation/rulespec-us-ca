format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.854
  summary: |-
    For a job search component as described in Section 63-407.841(a), the participation requirement shall be permitted to begin at application for an initial period of up to eight consecutive weeks, and continue for an additional period of up to eight weeks during 12 consecutive months. The 12-consecutive-month period shall be permitted to begin at any time following the close of the initial eight-week period.
rules:
  - name: job_search_initial_participation_period_week_limit
    kind: parameter
    dtype: Count
    source: 63-407.854, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.854
              excerpt: "an initial period of up to eight consecutive weeks"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          8

  - name: job_search_additional_participation_period_week_limit
    kind: parameter
    dtype: Count
    source: 63-407.854, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.854
              excerpt: "continue for an additional period of up to eight weeks"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          8

  - name: job_search_additional_measurement_period_month_count
    kind: parameter
    dtype: Count
    source: 63-407.854, first and second sentences
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.854
              excerpt: "during 12 consecutive months. The 12-consecutive-month period shall be permitted to begin at any time following the close of the initial eight-week period."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: job_search_initial_participation_requirement_period_permitted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.854, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.854
              excerpt: "For a job search component as described in Section 63-407.841(a)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.854
              excerpt: "the participation requirement shall be permitted to begin at application for an initial period of up to eight consecutive weeks"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          job_search_component_under_section_63_407_841_a and
          participation_requirement_begins_at_application and
          initial_participation_requirement_period_is_consecutive and
          initial_participation_requirement_period_weeks <= job_search_initial_participation_period_week_limit

  - name: job_search_additional_participation_requirement_period_permitted
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.854
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.854
              excerpt: "For a job search component as described in Section 63-407.841(a)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.854
              excerpt: "continue for an additional period of up to eight weeks during 12 consecutive months"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.854
              excerpt: "The 12-consecutive-month period shall be permitted to begin at any time following the close of the initial eight-week period."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          job_search_component_under_section_63_407_841_a and
          additional_participation_requirement_period_weeks <= job_search_additional_participation_period_week_limit and
          additional_measurement_period_months == job_search_additional_measurement_period_month_count and
          additional_measurement_period_is_consecutive and
          additional_measurement_period_begins_following_close_of_initial_period
