format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.21
  summary: |-
    (a) A person younger than 16 years of age or a person 60 years of age or older. If a child has his/her 16th birthday within a certification period, the child shall fulfill the work registration requirement as part of the next scheduled recertification process, unless the child qualifies for another exemption. FOOD STAMP REGULATIONS Regulations ELIGIBILITY STANDARDS 63-407 (Cont.) (1) A person age 16 or 17 who is not the head of the household, or who is attending school, or enrolled in an employment training program on at least a half-time basis is exempt. (b) A person physically or mentally unfit for employment. If mental or physical unfitness is claimed and the unfitness is not evident to the CWD, verification shall be require. Appropriate verification may consist of receipt of temporary or permanent disability benefits issued by governmental or private sources, or of a statement from a physician or licensed or certified psychologist; (c) A household member subject to and complying with any work requirement under Title IV of the Social Security Act including Greater Avenues for Independence (GAIN) and California Work Opportunity and Responsibility to Kids (CalWORKs) programs. If the exemption claimed is questionable, the CWD shall be responsible for verifying the exemption, as required in Section 63-300.53; (d) A parent or other household member who is responsible for the care of a dependent child under 6 or an incapacitated person. If the child has his/her 6th birthday within a certification period, the individual responsible for the care of the child shall fulfill the work registration requirements as part of the next scheduled recertification process, unless the individual qualifies for another exemption; (e) A person who is in receipt of unemployment compensation or who has applied for, but has not yet begun to receive unemployment compensation, if that person was required to register for work with EDD as a part of the unemployment compensation application process. If the exemption claimed is questionable, the CWD shall be responsible for verifying the exemption with the appropriate EDD office as required by Section 63-300.53; (f) A regular participant in a drug addiction or alcoholic treatment and rehabilitation program; (g) A person who is employed or self-employed and working a minimum of 30 hours weekly or receiving weekly earnings at least equal to the federal minimum wage multiplied by 30 hours. This exemption shall apply to migrant and seasonal farm workers who are under contract or similar agreement with an employer or crew chief to being employed within 30 days; FOOD STAMP REGULATIONS (h) A student enrolled at least half time in any recognized school, training program, or institution of higher education, provided that students enrolled at least half time in a recognized institution of higher education have met the eligibility conditions in Section 63-406.2. A student enrolled in a school, training program or institution of higher education shall remain exempt during normal periods of class attendance, vacation and recess. However, persons who are not enrolled at least half time or who experience a break in their enrollment status due to graduation, expulsion, suspension or who drop-out shall not be considered students for the purpose of qualifying for this exemption;
rules:
  - name: child_work_registration_age_threshold
    kind: parameter
    dtype: Integer
    source: 63-407.21(a), younger than 16 years of age
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.21
              excerpt: A person younger than 16 years of age
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16
  - name: older_person_work_registration_exemption_age_threshold
    kind: parameter
    dtype: Integer
    source: 63-407.21(a), 60 years of age or older
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.21
