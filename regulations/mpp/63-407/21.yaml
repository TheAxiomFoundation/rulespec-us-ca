  - name: listed_work_registration_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.21(a)-(h), listed work registration exemptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.21
              excerpt: A person younger than 16 years of age or a person 60 years of age or older.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.21
              excerpt: A person age 16 or 17 who is not the head of the household, or who is attending school, or enrolled in an employment training program on at least a half-time basis is exempt.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.21
              excerpt: A person physically or mentally unfit for employment.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.21
              excerpt: A household member subject to and complying with any work requirement under Title IV of the Social Security Act including Greater Avenues for Independence (GAIN) and California Work Opportunity and Responsibility to Kids (CalWORKs) programs.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.21
              excerpt: A parent or other household member who is responsible for the care of a dependent child under 6 or an incapacitated person.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.21
              excerpt: A person who is in receipt of unemployment compensation or who has applied for, but has not yet begun to receive unemployment compensation, if that person was required to register for work with EDD as a part of the unemployment compensation application process.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.21
              excerpt: A regular participant in a drug addiction or alcoholic treatment and rehabilitation program
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.21
              excerpt: A person who is employed or self-employed and working a minimum of 30 hours weekly or receiving weekly earnings at least equal to the federal minimum wage multiplied by 30 hours.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.21
              excerpt: This exemption shall apply to migrant and seasonal farm workers who are under contract or similar agreement with an employer or crew chief to being employed within 30 days
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.21
              excerpt: A student enrolled at least half time in any recognized school, training program, or institution of higher education, provided that students enrolled at least half time in a recognized institution of higher education have met the eligibility conditions in Section 63-406.2.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age_years < child_work_registration_age_threshold
          or (
            child_had_16th_birthday_within_current_certification_period
            and current_process_precedes_next_scheduled_recertification_after_child_16th_birthday
          )
          or person_age_years >= older_person_work_registration_exemption_age_threshold
          or (
            person_age_years >= teen_work_registration_exemption_minimum_age
            and person_age_years <= teen_work_registration_exemption_maximum_age
            and (
              person_is_not_head_of_household
              or person_attending_school
              or person_enrolled_employment_training_program_at_least_half_time
            )
          )
          or person_physically_or_mentally_unfit_for_employment
          or (
            household_member_subject_to_title_iv_work_requirement
            and household_member_complies_with_title_iv_work_requirement
          )
          or (
            person_responsible_for_care_of_dependent_child
            and (
              dependent_child_under_care_age_years < dependent_child_care_age_threshold
              or (
                dependent_child_had_6th_birthday_within_current_certification_period
                and current_process_precedes_next_scheduled_recertification_after_dependent_child_6th_birthday
              )
            )
          )
          or person_responsible_for_care_of_incapacitated_person
          or person_in_receipt_of_unemployment_compensation
          or (
            person_applied_for_unemployment_compensation_not_yet_receiving
            and person_required_to_register_for_work_with_edd_as_part_of_application_process
          )
          or person_regular_participant_in_drug_addiction_or_alcoholic_treatment_and_rehabilitation_program
          or (
            person_employed_or_self_employed
            and (
              person_employed_or_self_employed_weekly_hours >= employment_weekly_hours_threshold
              or person_weekly_earnings >= federal_minimum_hourly_wage * employment_weekly_hours_threshold
            )
          )
          or (
            migrant_or_seasonal_farm_worker_under_contract_or_similar_agreement_with_employer_or_crew_chief
            and days_until_migrant_or_seasonal_farm_worker_employment_begins <= migrant_farm_worker_employment_start_days_threshold
          )
          or (
            (
              person_enrolled_at_least_half_time_in_recognized_school_or_training_program
              or (
                person_enrolled_at_least_half_time_in_recognized_institution_of_higher_education
                and higher_education_student_met_eligibility_conditions_under_section_63_406_2
              )
            )
            and student_period_is_normal_class_attendance_vacation_or_recess
            and student_has_not_experienced_break_in_enrollment_status_due_to_graduation_expulsion_suspension_or_dropout
          )
