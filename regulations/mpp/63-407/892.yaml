format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.892
  summary: |-
    If the workfare or work component does not continue and the overissuance was the result of an intentional Program violation, the amount of the claim determined under Section 63-801.322 shall be for the entire amount of the overissuance and not adjusted for work participation.
rules:
  - name: noncontinuing_work_component_intentional_program_violation_claim_applies
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-407.892, antecedent
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.892
              excerpt: "If the workfare or work component does not continue and the overissuance was the result of an intentional Program violation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          workfare_or_work_component_does_not_continue and overissuance_result_of_intentional_program_violation

  - name: noncontinuing_work_component_intentional_program_violation_claim_amount
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 63-407.892, operative consequence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.892
              excerpt: "If the workfare or work component does not continue and the overissuance was the result of an intentional Program violation"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.892
              excerpt: "the amount of the claim determined under Section 63-801.322 shall be for the entire amount of the overissuance and not adjusted for work participation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if noncontinuing_work_component_intentional_program_violation_claim_applies: overissuance_amount else: 0
