format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.722
  summary: |-
    The member is physically or mentally unfit to perform the employment, as documented by medical evidence or by reliable information from other sources.
rules:
  - name: member_unfit_to_perform_employment_documented
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.722, operative sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.722
              excerpt: The member is physically or mentally unfit to perform the employment, as documented by medical evidence or by reliable information from other sources.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            member_physically_unfit_to_perform_employment
            or member_mentally_unfit_to_perform_employment
          )
          and (
            unfitness_documented_by_medical_evidence
            or unfitness_documented_by_reliable_information_from_other_sources
          )
