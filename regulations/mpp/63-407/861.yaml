format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.861
  summary: |-
    FSET participants who refuse or fail without good cause to comply with any of the requirements of that program, shall be subject to the provisions of Section 63-407.5.
rules:
  - name: fset_noncompliance_provisions_apply
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.861
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.861
              excerpt: FSET participants who refuse or fail without good cause to comply with any of the requirements of that program
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.861
              excerpt: without good cause
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.861
              excerpt: shall be subject to the provisions of Section 63-407.5
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          fset_participant
          and (
            participant_refuses_to_comply_with_fset_requirements
            or participant_fails_to_comply_with_fset_requirements
          )
          and
          not participant_has_good_cause_for_fset_noncompliance
