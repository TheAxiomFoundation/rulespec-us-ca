format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.853
  summary: |-
    HANDBOOK BEGINS HERE In a workfare or work experience component, the number of hours may be less if the household’s benefit divided by the minimum wage is less than this amount. HANDBOOK ENDS HERE
rules:
  - name: workfare_or_work_experience_hours_may_be_less_for_low_benefit_wage_quotient
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-407.853, Handbook
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.853
              excerpt: "In a workfare or work experience component, the number of hours may be less if the household’s benefit divided by the minimum wage is less than this amount."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_in_workfare_or_work_experience_component and household_benefit / minimum_wage < otherwise_applicable_workfare_or_work_experience_hours
