format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.543
  summary: |-
    When an individual identified in Section 63-407.54 regains eligibility by complying with the program requirement previously violated, the individual is again exempt from work registration. The food stamp sanction period identified in Section 63-407.531, .532 or .533 shall end and the individual shall be approved for food stamps if otherwise eligible.
