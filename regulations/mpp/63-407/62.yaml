format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.62
  summary: |-
    An individual, who is disqualified for not meeting the food stamp work requirements (e.g., not accepting a job offer) and is discontinued for failing to comply with the 80 hours per month ABAWD work requirement may regain food stamp eligibility if after the disqualification period has ended, he/she complies with the requirements of Section 63-410.5 or becomes exempt under Section 63-410.3 during the disqualification period.
rules:
  - name: abawd_work_requirement_monthly_hours
    kind: parameter
    dtype: Count
    period: Month
    source: MPP 63-407.62, "80 hours per month ABAWD work requirement"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.62
              excerpt: 80 hours per month ABAWD work requirement
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          80
  - name: work_requirement_disqualified_individual_food_stamp_eligibility_restored
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.62, operative sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.62
              excerpt: An individual, who is disqualified for not meeting the food stamp work requirements (e.g., not accepting a job offer) and is discontinued for failing to comply with the 80 hours per month ABAWD work requirement may regain food stamp eligibility if after the disqualification period has ended, he/she complies with the requirements of Section 63-410.5 or becomes exempt under Section 63-410.3 during the disqualification period.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_disqualified_for_not_meeting_food_stamp_work_requirements
          and individual_discontinued_for_failing_to_comply_with_abawd_work_requirement
          and abawd_work_hours_per_month < abawd_work_requirement_monthly_hours
          and (
            (disqualification_period_has_ended and individual_complies_with_requirements_under_section_63_410_5)
            or individual_becomes_exempt_under_section_63_410_3_during_disqualification_period
          )
