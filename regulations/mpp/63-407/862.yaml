format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.862
  summary: |-
    Individuals who are disqualified for failure to comply with the requirements of the FSET Program shall be notified as specified in Sections 63-407.52 and .565.
rules:
