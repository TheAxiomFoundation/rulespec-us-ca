    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.862, operative sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.862
              excerpt: Individuals who are disqualified for failure to comply with the requirements of the FSET Program shall be notified as specified in Sections 63-407.52 and .565.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not individual_disqualified_for_failure_to_comply_with_fset_program_requirements
          or individual_notified_as_specified_in_sections_63_407_52_and_565
