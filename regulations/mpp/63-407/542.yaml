format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.542
  summary: |-
    (a) A food stamp sanction shall not be imposed if the individual qualifies for one of the food stamp work registration exemptions at Section 63-407.21. Since no food stamp sanction is imposed, an instance of noncompliance is not counted for purposes of determining the length of future food stamp sanctions. HANDBOOK BEGINS HERE Example: In March, Sue receives a WTW sanction for failing to participate in a community service assignment. In reviewing her case record, the CWD learns that Sue is responsible for the care of a four-year old child and is exempt from food stamp work registration per MPP Section 63-407.21(d). Therefore, a food stamp sanction would not be imposed and Sue would remain eligible for food stamps while under the WTW sanction. HANDBOOK ENDS HERE (b) When an individual does not qualify for one of the food stamp work registration exemptions at Section 63-407.21 and a food stamp sanction is imposed, the food stamp sanction shall end when the sanctioned individual subsequently qualifies for a work registration exemption. HANDBOOK BEGINS HERE Example: Sally is part of a five-person food stamp household and at the end of February, she receives a CalWORKs/food stamp sanction for failing to participate in a WTW assignment. In May, Sally begins regular participation in a drug rehabilitation program and qualifies for the food stamp work exemption at Section 63-407.21(f). At that time, the food stamp sanction would stop. For multiple person households, eligibility is reestablished for the previously sanctioned individual the first of the following month, if the individual is otherwise eligible (Section 63-504.353). Therefore, Sally would be eligible for food stamps effective June 1. HANDBOOK ENDS HERE FOOD STAMP REGULATIONS
