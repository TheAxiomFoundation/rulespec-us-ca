format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.231
  summary: |-
    Those persons registered in a substitute program as specified in Section 63-407.23, who are deemed ineligible to participate in that program due to a change in household circumstances other than failing to comply with work registration requirements of that program, shall be subject to the work registrant requirements of the Food Stamp Program in Section 63-407.4, within 10 days from the date they lose their eligibility for that program. For treatment of persons who fail to comply with the work registration requirements of these programs see Section 63-407.54.
rules:
  - name: substitute_program_work_registration_transition_deadline_days
    kind: parameter
    dtype: Integer
    source: 63-407.231, first sentence, deadline clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.231
              excerpt: "within 10 days from the date they lose their eligibility for that program"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: substitute_program_ineligible_person_subject_to_food_stamp_work_registration_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 63-407.231, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.231
              excerpt: "Those persons registered in a substitute program as specified in Section 63-407.23, who are deemed ineligible to participate in that program due to a change in household circumstances"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.231
              excerpt: "other than failing to comply with work registration requirements of that program"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.231
              excerpt: "shall be subject to the work registrant requirements of the Food Stamp Program in Section 63-407.4, within 10 days from the date they lose their eligibility for that program"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_registered_in_substitute_program_specified_in_section_63_407_23
          and person_deemed_ineligible_for_substitute_program_due_to_change_in_household_circumstances
          and
          not person_deemed_ineligible_for_substitute_program_due_to_failure_to_comply_with_substitute_program_work_registration_requirements
          and days_since_substitute_program_eligibility_loss <= substitute_program_work_registration_transition_deadline_days
