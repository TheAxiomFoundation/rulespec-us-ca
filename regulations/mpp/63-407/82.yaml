format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.82
  summary: |-
    The CWD shall refer mandatory participants to an FSET Program component who have been specifically identified in an approved county plan in accordance with Section 63-407.842. The CWD shall also be permitted to refer applicants and volunteers. FOOD STAMP REGULATIONS
rules:
  - name: cwd_must_refer_identified_mandatory_participant_to_fset_program_component
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.82, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.82
              excerpt: "The CWD shall refer mandatory participants to an FSET Program component who have been specifically identified in an approved county plan in accordance with Section 63-407.842."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          mandatory_fset_participant and participant_specifically_identified_in_approved_county_plan_under_section_63_407_842

  - name: cwd_permitted_to_refer_applicant_or_volunteer_to_fset_program_component
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.82, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.82
              excerpt: "The CWD shall also be permitted to refer applicants and volunteers."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_for_food_stamp_benefits or fset_volunteer
