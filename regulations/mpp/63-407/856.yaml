format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.856
  summary: |-
    The maximum hours of participation imposed on each individual shall not exceed 120 hours per month, including nonwork and work component hours, optional Food Stamp Workfare Program hours, and hours worked for compensation, in cash or in kind.
rules:
  - name: maximum_monthly_participation_hours
    kind: parameter
    dtype: Integer
    period: Month
    source: 63-407.856, maximum-hours clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.856
              excerpt: "shall not exceed 120 hours per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          120

  - name: individual_monthly_participation_hours_within_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.856, full sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.856
              excerpt: "The maximum hours of participation imposed on each individual shall not exceed 120 hours per month, including nonwork and work component hours, optional Food Stamp Workfare Program hours, and hours worked for compensation, in cash or in kind."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          monthly_nonwork_component_hours_imposed + monthly_work_component_hours_imposed + monthly_optional_food_stamp_workfare_program_hours + monthly_hours_worked_for_compensation_in_cash_or_in_kind <= maximum_monthly_participation_hours
