format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.221
  summary: |-
    Persons losing exemption status due to any change in circumstances that is subject to the reporting requirements of Sections 63-505.3 or .5 (such as a loss of employment that also results in a loss in income of more than $25 a month, or departure from the household of the sole dependent child for whom an otherwise nonexempt household member was caring) shall be registered for employment when the change is reported. The CWD shall annotate the registration changes to the person’s exemption status on an existing record designated by SDSS.
rules:
  - name: reported_change_loss_of_exemption_status_requires_employment_registration
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: MPP 63-407.221, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.221
              excerpt: Persons losing exemption status due to any change in circumstances that is subject to the reporting requirements of Sections 63-505.3 or .5 shall be registered for employment when the change is reported.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_loses_exemption_status_due_to_change_in_circumstances
          and change_in_circumstances_reported
          and (
            change_in_circumstances_subject_to_reporting_requirements_under_section_63_505_3
            or change_in_circumstances_subject_to_reporting_requirements_under_section_63_505_5
          )
