format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.811
  summary: |-
    (a) A person who resides in a federally approved geographically excluded area. FOOD STAMP REGULATIONS 63-407.811(b) ELIGIBILITY STANDARDS Regulations (b) A person who participates in a program described in Section 63-407.23 that has participation requirements exceeding those contained in the FSET Program. (c) A person who is unable to participate due to personal circumstances. This shall include persons who: (1) Lack dependent care; (A) Lack of child care is defined in accordance with Section 63-408.41(j). (B) Lack of dependent care shall be determined if dependent care costs exceed the maximum dependent care deduction per month per dependent. (The current amounts are reproduced in Handbook Section 63-1101.23.) (2) Lack transportation which is defined as: (A) Private or public transportation is not available at reasonable times on a regular basis; or (B) Monthly transportation costs plus other costs of participation (excluding dependent care costs) that exceed the amounts as determined in Section 63-407.831. (3) Live an unreasonable distance from the FSET program site; (4) Have a severe family crisis; (A) Severe family crisis is defined as: An incapacitated or ill family member who temporarily needs the care of the registrant. (B) A death in the immediate family or of any person in the immediate household; (C) A situation in the immediate family or immediate household that temporarily requires the presence of the registrant. FOOD STAMP REGULATIONS Regulations ELIGIBILITY STANDARDS 63-407 (Cont.) (5) Are temporarily laid off from a job and expected to return to work within 60 days; (6) Are involved in legal difficulties (such as court mandated appearances) which preclude participation; (7) Have a temporary illness or disability; or (A) Temporary illness or disability is defined as: Pregnancy; (B) An illness or injury serious enough to temporarily prevent employment. Minor ailments, such as colds, will not defer a person from participation. (8) Repealed by Manual Letter No. FS-89-01, effective 1/1/89.
rules:
  - name: temporary_layoff_return_to_work_limit_days
    kind: parameter
    dtype: Integer
    source: 63-407.811(c)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "Are temporarily laid off from a job and expected to return to work within 60 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: lacks_dependent_care_for_fset_participation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.811(c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "Lack dependent care"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "Lack of child care is defined in accordance with Section 63-408.41(j)."
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "Lack of dependent care shall be determined if dependent care costs exceed the maximum dependent care deduction per month per dependent."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lacks_child_care_under_section_63_408_41_j or dependent_care_costs_exceed_maximum_dependent_care_deduction_per_month_per_dependent

  - name: lacks_transportation_for_fset_participation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.811(c)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "Lack transportation which is defined as: (A) Private or public transportation is not available at reasonable times on a regular basis; or (B) Monthly transportation costs plus other costs of participation (excluding dependent care costs) that exceed the amounts as determined in Section 63-407.831."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          private_or_public_transportation_not_available_at_reasonable_times_on_regular_basis or transportation_and_participation_costs_excluding_dependent_care_exceed_amounts_under_section_63_407_831

  - name: severe_family_crisis_prevents_fset_participation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.811(c)(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "Severe family crisis is defined as: An incapacitated or ill family member who temporarily needs the care of the registrant."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "A death in the immediate family or of any person in the immediate household"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "A situation in the immediate family or immediate household that temporarily requires the presence of the registrant."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          incapacitated_or_ill_family_member_temporarily_needs_registrant_care or death_in_immediate_family_or_household or immediate_family_or_household_situation_temporarily_requires_registrant_presence

  - name: temporary_illness_or_disability_prevents_fset_participation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.811(c)(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "Temporary illness or disability is defined as: Pregnancy"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "An illness or injury serious enough to temporarily prevent employment."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "Minor ailments, such as colds, will not defer a person from participation."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          pregnant or (illness_or_injury_serious_enough_to_temporarily_prevent_employment and
          not minor_ailment_such_as_cold)

  - name: fset_participation_unavailable_due_to_personal_circumstances
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.811(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "A person who is unable to participate due to personal circumstances. This shall include persons who:"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "Live an unreasonable distance from the FSET program site"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "Are temporarily laid off from a job and expected to return to work within 60 days"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "Are involved in legal difficulties (such as court mandated appearances) which preclude participation"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          lacks_dependent_care_for_fset_participation or lacks_transportation_for_fset_participation or lives_unreasonable_distance_from_fset_program_site or severe_family_crisis_prevents_fset_participation or (temporarily_laid_off_from_job and expected_return_to_work_days <= temporary_layoff_return_to_work_limit_days) or legal_difficulties_preclude_participation or temporary_illness_or_disability_prevents_fset_participation

  - name: fset_participation_barrier_condition_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.811(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "A person who resides in a federally approved geographically excluded area."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "A person who participates in a program described in Section 63-407.23 that has participation requirements exceeding those contained in the FSET Program."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.811
              excerpt: "A person who is unable to participate due to personal circumstances."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_resides_in_federally_approved_geographically_excluded_area or person_participates_in_program_under_section_63_407_23_with_requirements_exceeding_fset_program or fset_participation_unavailable_due_to_personal_circumstances
