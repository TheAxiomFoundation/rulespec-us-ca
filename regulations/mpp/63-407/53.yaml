format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.53
  summary: |-
    For purposes of determining the appropriate disqualification to apply, the CWD shall count any previous sanctions and/or disqualifications imposed on an individual for failing to comply with the provisions of work registration in Section 63-407.4; unemployment, CalWORKs WTW, and other substitute work programs in Section 63-407.54; and voluntary quit and reduction of work effort in Section 63-408. If the individual qualifies for one of the exemptions listed at Section 63-407.21 during the minimum disqualification period identified in Sections 63-407.531, .532 or .533, the disqualification shall end and the individual may reapply and be approved for food stamps if otherwise eligible. The start date of the disqualification period shall begin the first of the month following the month the individual is provided timely notice of adverse action.
rules:
  - name: prior_work_requirement_sanctions_for_disqualification_count
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: MPP 63-407.53, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.53
              excerpt: For purposes of determining the appropriate disqualification to apply, the CWD shall count any previous sanctions and/or disqualifications imposed on an individual for failing to comply with the provisions of work registration in Section 63-407.4; unemployment, CalWORKs WTW, and other substitute work programs in Section 63-407.54; and voluntary quit and reduction of work effort in Section 63-408.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          previous_work_registration_sanctions_or_disqualifications_count
          + previous_unemployment_calworks_wtw_or_substitute_work_program_sanctions_or_disqualifications_count
          + previous_voluntary_quit_or_reduction_of_work_effort_sanctions_or_disqualifications_count
  - name: work_requirement_disqualification_ends_due_to_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.53, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.53
              excerpt: If the individual qualifies for one of the exemptions listed at Section 63-407.21 during the minimum disqualification period identified in Sections 63-407.531, .532 or .533, the disqualification shall end
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_qualifies_for_exemption_under_section_63_407_21
          and individual_is_in_minimum_disqualification_period_under_sections_63_407_531_532_or_533
  - name: food_stamp_reapplication_available_after_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.53, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.53
              excerpt: the disqualification shall end and the individual may reapply and be approved for food stamps if otherwise eligible
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          work_requirement_disqualification_ends_due_to_exemption
          and individual_otherwise_eligible_for_food_stamps
  - name: disqualification_period_starts_on_day
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: MPP 63-407.53, third sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.53
              excerpt: The start date of the disqualification period shall begin the first of the month following the month the individual is provided timely notice of adverse action.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          day_is_first_of_month_following_timely_notice_month
          and individual_was_provided_timely_notice_of_adverse_action_in_previous_month
