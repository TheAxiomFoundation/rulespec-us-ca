format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.81
  summary: |-
    The CWD shall screen each work registrant to determine whether or not the registrant will participate or be deferred from the FSET Program. This requirement shall not apply in counties that are totally geographically excluded as allowed in Section 63-407.842.
rules:
  - name: cwd_must_screen_work_registrant_for_fset_participation_or_deferral
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: MPP 63-407.81
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.81
              excerpt: "The CWD shall screen each work registrant to determine whether or not the registrant will participate or be deferred from the FSET Program."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.81
              excerpt: "This requirement shall not apply in counties that are totally geographically excluded as allowed in Section 63-407.842."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          work_registrant and
          not county_totally_geographically_excluded_under_section_63_407_842
