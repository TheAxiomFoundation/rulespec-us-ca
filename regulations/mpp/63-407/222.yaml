format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.222
  summary: |-
    Those persons who lose their exemption due to a change in circumstances not subject to the reporting requirements of Section 63-505.3 or .5 shall register for employment at their household’s next recertification.
rules:
  - name: employment_registration_required_at_household_next_recertification_after_nonreportable_exemption_loss
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.222
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.222
              excerpt: "Those persons who lose their exemption due to a change in circumstances not subject to the reporting requirements of Section 63-505.3 or .5 shall register for employment at their household’s next recertification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_lost_exemption_due_to_change_in_circumstances and
          not change_in_circumstances_subject_to_reporting_requirements_under_section_63_505_3 and
          not change_in_circumstances_subject_to_reporting_requirements_under_section_63_505_5 and
          period_is_households_next_recertification
