format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.51
  summary: |-
    In determining if good cause existed for failure to comply with any work registration or FSET Program requirements, the CWD shall consider the facts and circumstances, including information submitted by the household member involved and/or the employer. Good cause shall include circumstances beyond the member’s control, such as, but not limited to, illness, illness of another household member requiring the presence of the member, a household emergency, lack of adequate child care for children who have reached age six but are under twelve years of age [see Section 63-408.41(j)], the unavailability of transportation, or problems caused by inability of the work registrant to speak, read or write English.
rules:
  - name: work_registration_or_fset_good_cause_exists
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.51, operative sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.51
              excerpt: Good cause shall include circumstances beyond the member’s control, such as, but not limited to, illness, illness of another household member requiring the presence of the member, a household emergency, lack of adequate child care for children who have reached age six but are under twelve years of age [see Section 63-408.41(j)], the unavailability of transportation, or problems caused by inability of the work registrant to speak, read or write English.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          failed_to_comply_with_work_registration_or_fset_program_requirement and (
            circumstances_beyond_members_control
            or household_member_has_illness
            or another_household_member_illness_requires_members_presence
            or household_emergency
            or adequate_child_care_unavailable_for_child_age_six_to_under_twelve
            or transportation_unavailable
            or english_inability_caused_work_registrant_problem
          )
