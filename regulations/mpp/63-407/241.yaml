format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.241
  summary: |-
    (a) The hours of participation in unpaid community service and work experience shall be limited to the number of hours each month, determined collectively for the CalWORKs assistance unit, equal to the CalWORKs assistance unit’s grant plus the assistance unit’s portion of the food stamp allotment divided by the higher of the state or federal minimum wage. This monthly limit shall be considered to have been met by participation in an average weekly number of hours determined by dividing the monthly amount by 4.33 (average number of weeks per month). FOOD STAMP REGULATIONS HANDBOOK BEGINS HERE (b) The WTW Program regulations are located in MPP Chapter 42-700. See Section 42-716.31(j) for further instructions on hours of participation for community service. See Section 42-716.31(d) for further instructions on hours of participation for work experience. HANDBOOK ENDS HERE
rules:
  - name: calworks_participation_average_weeks_per_month
    kind: parameter
    dtype: Decimal
    source: 63-407.241(a), second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.241
              excerpt: "dividing the monthly amount by 4.33 (average number of weeks per month)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          4.33

  - name: unpaid_community_service_and_work_experience_monthly_hour_limit
    kind: derived
    entity: TanfUnit
    dtype: Decimal
    period: Month
    source: 63-407.241(a), first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.241
              excerpt: "limited to the number of hours each month, determined collectively for the CalWORKs assistance unit, equal to the CalWORKs assistance unit’s grant plus the assistance unit’s portion of the food stamp allotment divided by the higher of the state or federal minimum wage"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (calworks_assistance_unit_grant + assistance_unit_portion_of_food_stamp_allotment) / max(state_minimum_wage, federal_minimum_wage)

  - name: unpaid_community_service_and_work_experience_average_weekly_hours_meeting_monthly_limit
    kind: derived
    entity: TanfUnit
    dtype: Decimal
    period: Month
    source: 63-407.241(a), second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.241
              excerpt: "This monthly limit shall be considered to have been met by participation in an average weekly number of hours determined by dividing the monthly amount by 4.33 (average number of weeks per month)."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          unpaid_community_service_and_work_experience_monthly_hour_limit / calworks_participation_average_weeks_per_month
