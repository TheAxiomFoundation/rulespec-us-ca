format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.724
  summary: |-
    The distance from the member’s home to the place of employment is unreasonable considering the expected wage and the time and cost of commuting. Employment shall not be considered suitable if daily commuting time exceeds two hours per day, not including the transporting of a child to and from a child care facility. Nor shall employment be considered suitable if the distance to the place of employment prohibits walking and neither public nor private transportation is available to transport the member to the jobsite.
rules:
  - name: suitable_employment_daily_commuting_time_limit_hours
    kind: parameter
    dtype: Float
    source: MPP 63-407.724, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.724
              excerpt: "Employment shall not be considered suitable if daily commuting time exceeds two hours per day"
          - path: versions[0].formula
            kind: unit
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.724
              excerpt: "two hours per day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: daily_commuting_time_exceeds_suitable_employment_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: MPP 63-407.724, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.724
              excerpt: "Employment shall not be considered suitable if daily commuting time exceeds two hours per day, not including the transporting of a child to and from a child care facility."
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.724
              excerpt: "two hours per day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          daily_commuting_time_excluding_child_care_transport_hours > suitable_employment_daily_commuting_time_limit_hours

  - name: employment_unsuitable_due_to_transportation_unavailability
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: MPP 63-407.724, third sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.724
              excerpt: "Nor shall employment be considered suitable if the distance to the place of employment prohibits walking and neither public nor private transportation is available to transport the member to the jobsite."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          distance_to_place_of_employment_prohibits_walking
          and
          not public_transportation_available_to_jobsite
          and
          not private_transportation_available_to_jobsite

  - name: employment_unsuitable_due_to_unreasonable_commute
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: MPP 63-407.724, full provision
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.724
              excerpt: "The distance from the member’s home to the place of employment is unreasonable considering the expected wage and the time and cost of commuting."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.724
              excerpt: "Employment shall not be considered suitable if daily commuting time exceeds two hours per day"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.724
              excerpt: "Nor shall employment be considered suitable if the distance to the place of employment prohibits walking and neither public nor private transportation is available"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          distance_from_home_to_employment_unreasonable_considering_expected_wage_and_commute_time_and_cost
          or daily_commuting_time_exceeds_suitable_employment_limit
          or employment_unsuitable_due_to_transportation_unavailability
