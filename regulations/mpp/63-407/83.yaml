format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.83
  summary: |-
    The CWD shall reimburse participants, including volunteers and applicants, for costs that are reasonably necessary and directly related to participation as specified in Sections 63-407.831 and .832. The CWD shall inform each participant that allowable expenses identified in this section shall be reimbursed upon presentation of appropriate documentation.
rules:
