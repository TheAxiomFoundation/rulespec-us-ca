format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.841
  summary: |-
    In accordance with a federally approved state plan, CWDs shall provide any one or more of the following components. The following components shall be allowed to be provided for applicants or recipients: FOOD STAMP REGULATIONS 63-407.841(a) ELIGIBILITY STANDARDS Regulations (a) Job Club/Job Search (1) Job Club (job search workshop), which consists of group training sessions in job finding skills, job interviewing skills, understanding employer expectations and requirements, and in enhancing self-esteem, self-image, and confidence. (2) Supervised job search, which consists of an organized method of seeking work such as access to phone banks, job orders, and direct referrals to employers. (3) Unsupervised job search, which consists of independent efforts by a registrant to look for employment and follow up interviews by staff to determine the adequacy of the job search. (b) Work Components (1) Workfare, which consists of a an unpaid training assignment with a public or private nonprofit agency that provides the registrant an opportunity to develop basic work habits or to practice existing skills. (A) As part of the workfare component, the CWD may establish a job search period of up to 30 days prior to sending the registrant to a workfare site. This job search period may only be established at application or certification, not at recertification. (B) Individuals assigned to workfare shall be provided the same benefits and working conditions provided to employees performing comparable work for comparable hours. (C) A workfare assignment cannot result in the displacement of employed individuals or in the reduction of employment opportunities, such as substituting a workfare person in a vacant position. (2) OJT/Work Experience, which consists of an assignment to provide work experience or training or both to enable participants to move promptly into regular public or private employment. Such assignment shall: (A) Be limited to projects that serve a useful public purpose in fields such as health, social services, environmental protection, etc. FOOD STAMP REGULATIONS Regulations ELIGIBILITY STANDARDS 63-407 (Cont.) (B) Not replace a regular employee who is not participating in the FSET Program. (C) Provide the same benefits and working conditions that are provided at the job site to employees performing comparable work. (c) Education/Training (1) Vocational training which consists of a project, program or experiment, such as supported work program, or a Job Training Partnership Act program (JTPA) or state or local program aimed at accomplishing the purpose of the FSET Program. (2) Education programs designed to improve a participant’s basic skills or employability. Education activities include, but are not limited to, high school or equivalency programs, remedial education programs designed to achieve a basic literacy level, and instruction in English-as-a-Second-Language. (A) Educational components shall be approved only if they directly enhance the employability of FSET Program participants. A direct link between educational components and job readiness shall be established.
rules:
  - name: workfare_job_search_period_max_days
    kind: parameter
    dtype: Integer
    source: 63-407.841(b)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "the CWD may establish a job search period of up to 30 days prior to sending the registrant to a workfare site"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: fset_component_allowed_for_applicant_or_recipient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.841 opening clause and subdivisions (a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "In accordance with a federally approved state plan, CWDs shall provide any one or more of the following components. The following components shall be allowed to be provided for applicants or recipients"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "Job Club/Job Search ... Work Components ... Education/Training"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cwd_acts_in_accordance_with_federally_approved_state_plan
          and person_is_food_stamp_applicant_or_recipient
          and (
            component_is_job_club_job_search_workshop
            or component_is_supervised_job_search
            or component_is_unsupervised_job_search
            or component_is_workfare
            or component_is_ojt_work_experience
            or component_is_vocational_training
            or component_is_education_program
          )

  - name: workfare_job_search_period_may_be_established
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.841(b)(1)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "As part of the workfare component, the CWD may establish a job search period of up to 30 days prior to sending the registrant to a workfare site."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "This job search period may only be established at application or certification, not at recertification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          workfare_component_is_being_used
          and job_search_period_is_prior_to_sending_registrant_to_workfare_site
          and workfare_job_search_period_days <= workfare_job_search_period_max_days
          and (job_search_period_established_at_application or job_search_period_established_at_certification)
          and job_search_period_not_established_at_recertification

  - name: workfare_assignment_meets_required_conditions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.841(b)(1), (B), (C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "Workfare, which consists of a an unpaid training assignment with a public or private nonprofit agency that provides the registrant an opportunity to develop basic work habits or to practice existing skills."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "Individuals assigned to workfare shall be provided the same benefits and working conditions provided to employees performing comparable work for comparable hours."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "A workfare assignment cannot result in the displacement of employed individuals or in the reduction of employment opportunities"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          registrant_assigned_to_workfare
          and workfare_assignment_is_unpaid_training_assignment_with_public_or_private_nonprofit_agency
          and workfare_assignment_provides_opportunity_to_develop_basic_work_habits_or_practice_existing_skills
          and workfare_assigned_individual_receives_same_benefits_and_working_conditions_as_comparable_employees
          and workfare_assignment_does_not_displace_employed_individuals
          and workfare_assignment_does_not_reduce_employment_opportunities

  - name: ojt_work_experience_assignment_meets_required_conditions
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.841(b)(2)(A)-(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "OJT/Work Experience, which consists of an assignment to provide work experience or training or both to enable participants to move promptly into regular public or private employment."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "Be limited to projects that serve a useful public purpose"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "Not replace a regular employee who is not participating in the FSET Program."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "Provide the same benefits and working conditions that are provided at the job site to employees performing comparable work."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ojt_work_experience_assignment_provides_work_experience_or_training
          and ojt_work_experience_assignment_enables_prompt_movement_into_regular_public_or_private_employment
          and ojt_work_experience_project_serves_useful_public_purpose
          and ojt_work_experience_assignment_does_not_replace_regular_employee_not_participating_in_fset_program
          and ojt_work_experience_provides_same_benefits_and_working_conditions_as_comparable_employees

  - name: educational_component_may_be_approved
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-407.841(c)(2)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "Educational components shall be approved only if they directly enhance the employability of FSET Program participants."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.841
              excerpt: "A direct link between educational components and job readiness shall be established."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          component_is_educational
          and educational_component_directly_enhances_employability_of_fset_program_participants
          and direct_link_between_educational_component_and_job_readiness_established
