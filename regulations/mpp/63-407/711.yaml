format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.711
  summary: |-
    a. The applicable federal minimum wage; b. The applicable state minimum wage; c. Eighty percent (80%) of the federal minimum wage if neither the federal nor state minimum wage is applicable.
rules:
  - name: federal_minimum_wage_fallback_rate
    kind: parameter
    dtype: Rate
    source: MPP 63-407.711(c), phrase "Eighty percent (80%)"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.711
              excerpt: "Eighty percent (80%) of the federal minimum wage"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.80

  - name: minimum_wage_amount_under_federal_minimum_wage_branch
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: MPP 63-407.711(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.711
              excerpt: "The applicable federal minimum wage"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if federal_minimum_wage_is_applicable: federal_minimum_wage_amount else: 0

  - name: minimum_wage_amount_under_state_minimum_wage_branch
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: MPP 63-407.711(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.711
              excerpt: "The applicable state minimum wage"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if state_minimum_wage_is_applicable: state_minimum_wage_amount else: 0

  - name: minimum_wage_amount_under_eighty_percent_federal_fallback_branch
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: MPP 63-407.711(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.711
              excerpt: "Eighty percent (80%) of the federal minimum wage if neither the federal nor state minimum wage is applicable"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if (
            not federal_minimum_wage_is_applicable
            and not state_minimum_wage_is_applicable
          ): federal_minimum_wage_fallback_rate * federal_minimum_wage_amount else: 0
