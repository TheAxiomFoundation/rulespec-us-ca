format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-407.821
  summary: |-
    Upon entry into each component the registrant shall be told, either orally or in writing, of the component requirements, what will constitute noncompliance, and the sanctions for noncompliance.
rules:
  - name: component_entry_notice_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-407.821, operative sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.821
              excerpt: Upon entry into each component the registrant shall be told
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-407.821
              excerpt: either orally or in writing, of the component requirements, what will constitute noncompliance, and the sanctions for noncompliance
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not registrant_enters_component
          or (
            (
              registrant_orally_told_component_requirements
              or registrant_told_in_writing_component_requirements
            )
            and (
              registrant_orally_told_what_constitutes_noncompliance
              or registrant_told_in_writing_what_constitutes_noncompliance
            )
            and (
              registrant_orally_told_sanctions_for_noncompliance
              or registrant_told_in_writing_sanctions_for_noncompliance
            )
          )
