format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-411.2
  summary: |-
    CFAP recipients who do not receive CalWORKs must satisfy the Able-Bodied Adult Without Dependents (ABAWD) work requirement defined at Section 63-410.
rules:
  - name: cfap_non_calworks_recipient_subject_to_abawd_work_requirement_under_section_63_410
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-411.2, applicability clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-411.2
              excerpt: "CFAP recipients who do not receive CalWORKs"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cfap_recipient and
          not receives_calworks

  - name: cfap_recipient_must_satisfy_abawd_work_requirement_under_section_63_410
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-411.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-411.2
              excerpt: "CFAP recipients who do not receive CalWORKs must satisfy the Able-Bodied Adult Without Dependents (ABAWD) work requirement defined at Section 63-410."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not cfap_non_calworks_recipient_subject_to_abawd_work_requirement_under_section_63_410)
          or satisfies_abawd_work_requirement_under_section_63_410
