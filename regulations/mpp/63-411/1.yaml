format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-411.1
  summary: |-
    CFAP recipients who are also CalWORKs recipients must comply with Welfare-to-Work (WTW) requirements contained in MPP Chapter 42-700.
rules:
  - name: cfap_calworks_recipient_wtw_compliance_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-411.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-411.1
              excerpt: "CFAP recipients who are also CalWORKs recipients"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-411.1
              excerpt: "must comply with Welfare-to-Work (WTW) requirements contained in MPP Chapter 42-700."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not recipient_receives_cfap) or
          (not recipient_receives_calworks) or
          recipient_complies_with_wtw_requirements_contained_in_mpp_chapter_42_700
