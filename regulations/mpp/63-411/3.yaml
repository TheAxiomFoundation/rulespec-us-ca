format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-411.3
  summary: |-
    Food stamp work registration requirements at Section 63-407 and voluntary quit and reduction of work effort requirements at Section 63-408 apply to CFAP recipients who do not receive CalWORKs.
rules:
  - name: food_stamp_work_registration_requirements_apply_to_cfap_recipient_without_calworks
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-411.3, full text
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-411.3
              excerpt: "Food stamp work registration requirements at Section 63-407 ... apply to CFAP recipients who do not receive CalWORKs."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cfap_recipient and
          not receives_calworks

  - name: voluntary_quit_and_work_effort_reduction_requirements_apply_to_cfap_recipient_without_calworks
    kind: derived
