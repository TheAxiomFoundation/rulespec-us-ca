format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-411.22
  summary: |-
    Effective April 1, 2003, if an ABAWD CFAP recipient begins receiving federal food stamps after reaching his/her five-year residency requirement, CWDs must establish a new 36-month period in accordance with Section 63-410.1 and begin tracking the 36-month calendar on the Medi-Cal Eligibility Data System (MEDS) as specified in Section 63-410.14.
rules:
  - name: abawd_cfap_residency_requirement_years
    kind: parameter
    dtype: Integer
    source: 63-411.22, residency trigger
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-411.22
              excerpt: "after reaching his/her five-year residency requirement"
    versions:
      - effective_from: '2003-04-01'
        formula: |-
          5

  - name: abawd_federal_food_stamp_tracking_period_months
    kind: parameter
    dtype: Integer
    source: 63-411.22, required new period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-411.22
              excerpt: "CWDs must establish a new 36-month period"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-411.22
              excerpt: "begin tracking the 36-month calendar"
    versions:
      - effective_from: '2003-04-01'
        formula: |-
          36

  - name: abawd_cfap_recipient_begins_receiving_federal_food_stamps_after_residency_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-411.22, conditional clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-411.22
              excerpt: "if an ABAWD CFAP recipient begins receiving federal food stamps after reaching his/her five-year residency requirement"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-411.22
              excerpt: "five-year residency requirement"
    versions:
      - effective_from: '2003-04-01'
        formula: |-
          abawd_cfap_recipient
          and recipient_begins_receiving_federal_food_stamps
          and recipient_residency_years >= abawd_cfap_residency_requirement_years

  - name: cwd_abawd_federal_food_stamp_period_tracking_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-411.22, operative requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-411.22
              excerpt: "CWDs must establish a new 36-month period in accordance with Section 63-410.1 and begin tracking the 36-month calendar on the Medi-Cal Eligibility Data System (MEDS) as specified in Section 63-410.14."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-411.22
              excerpt: "if an ABAWD CFAP recipient begins receiving federal food stamps after reaching his/her five-year residency requirement"
    versions:
      - effective_from: '2003-04-01'
        formula: |-
          not abawd_cfap_recipient_begins_receiving_federal_food_stamps_after_residency_requirement
          or (
            cwd_establishes_new_abawd_period_under_section_63_410_1
            and new_abawd_period_months_established == abawd_federal_food_stamp_tracking_period_months
            and cwd_begins_tracking_new_abawd_period_calendar_on_meds_under_section_63_410_14
          )
