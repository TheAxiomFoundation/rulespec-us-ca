            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.45
              excerpt: "When the face-to-face interview is waived or not required, it does not exempt the household from the verification requirements"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not household_face_to_face_interview_waived_or_not_required) or household_meets_verification_requirements

  - name: face_to_face_waiver_certification_period_requirement_satisfied
    kind: derived
