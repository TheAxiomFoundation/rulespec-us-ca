          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.45
              excerpt: "When the face-to-face interview is waived or not required, it shall not affect the length of the household's certification period."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not household_face_to_face_interview_waived_or_not_required) or not certification_period_length_changed_due_to_face_to_face_interview_waiver

  - name: telephone_interview_certification_count_limit_requirement_satisfied
