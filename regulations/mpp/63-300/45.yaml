format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.45
  summary: |-
    The CWD has the option of conducting a telephone interview or a home visit for those households for whom the face-to-face interview is waived or not required. Home visits shall be used only if the time of the visit is scheduled in advance with the household. The CWD shall conduct a face-to-face interview at recertification in accordance with Section 63-300.4 when requested by the household or when the county determines it is necessary to verify conditions of eligibility. When the face-to-face interview is waived or not required, it does not exempt the household from the verification requirements, although special procedures may be used to permit the household to provide verification and thus obtain its benefits in a timely manner, such as substituting a collateral contact in cases where documentary verification would normally be provided. When the face-to-face interview is waived or not required, it shall not affect the length of the household's certification period. There is no limit to how many times a household may be certified based on telephone interviews. However, the case file must be adequately documented each time the face-to-face interview is waived.
rules:
  - name: telephone_interview_option_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-300.45, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.45
              excerpt: "The CWD has the option of conducting a telephone interview or a home visit for those households for whom the face-to-face interview is waived or not required."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not cwd_uses_telephone_interview) or household_face_to_face_interview_waived_or_not_required

  - name: home_visit_option_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-300.45, sentences 1-2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.45
              excerpt: "The CWD has the option of conducting a telephone interview or a home visit for those households for whom the face-to-face interview is waived or not required. Home visits shall be used only if the time of the visit is scheduled in advance with the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not cwd_uses_home_visit) or (
            household_face_to_face_interview_waived_or_not_required
            and home_visit_scheduled_in_advance_with_household
          )

  - name: face_to_face_recertification_interview_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-300.45, sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.45
              excerpt: "The CWD shall conduct a face-to-face interview at recertification in accordance with Section 63-300.4 when requested by the household or when the county determines it is necessary to verify conditions of eligibility."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not household_at_recertification)
          or (
            not household_requests_face_to_face_interview
            and
            not county_determines_face_to_face_interview_necessary_to_verify_conditions_of_eligibility
          )
          or cwd_conducts_face_to_face_interview

