format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.37
  summary: |-
    At the time of application and at recertification the CWD shall provide the household with the FS 8. The notice shall inform the household that the CWD will assist them in obtaining required verification, provided that the household is cooperating with the CWD as specified in Section 63-505.1.
rules:
  - name: fs_8_notice_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.37
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.37
              excerpt: "At the time of application and at recertification the CWD shall provide the household with the FS 8. The notice shall inform the household that the CWD will assist them in obtaining required verification, provided that the household is cooperating with the CWD as specified in Section 63-505.1."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            not day_is_time_of_application
            and
            not day_is_time_of_recertification
          )
          or (
            cwd_provided_household_with_fs_8
            and
            fs_8_notice_informs_household_cwd_will_assist_obtaining_required_verification_if_household_cooperates_under_section_63_505_1
          )
