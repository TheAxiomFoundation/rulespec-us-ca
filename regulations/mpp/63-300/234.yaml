format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.234
  summary: |-
    Providing the requested information, including SSNs of each household member, is voluntary. However, failure to provide this information will result in denial of food stamp benefits to each individual failing to provide a SSN.
rules:
