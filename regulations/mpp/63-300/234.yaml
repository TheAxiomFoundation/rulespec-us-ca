    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.234
              excerpt: "failure to provide this information will result in denial of food stamp benefits to each individual failing to provide a SSN"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_failed_to_provide_ssn
