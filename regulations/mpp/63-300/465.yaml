format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.465
  summary: |-
    CWDs may request households to report for an in-office interview during the certification period, but may not require it. If a mutually acceptable location outside the office cannot be agreed upon by the household and the CWD, the interview shall take place in the office. HANDBOOK BEGINS HERE For example: the CWD may not require households to report en mass for an in-office interview during their certification period to review the household’s case files or for any other reason during the certification period. HANDBOOK ENDS HERE
rules:
  - name: in_office_interview_request_allowed_during_certification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-300.465, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.465
              excerpt: "CWDs may request households to report for an in-office interview during the certification period, but may not require it."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_in_certification_period and cwd_requests_household_to_report_for_in_office_interview

