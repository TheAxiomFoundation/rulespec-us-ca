format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.25
  summary: |-
    Page 99.1 FOOD STAMP REGULATIONS (MR) Recertification of Nonmonthly Reporting Households (MR) Nonmonthly reporting households shall have their Food Stamp eligibility redetermined by using the forms specified in Section 63-300.2. (QR) Recertification of Change Reporting Households (QR) Change reporting households shall have their food stamp eligibility redetermined by using the forms specified in Section 63-300.2.
rules:
  - name: nonmonthly_reporting_recertification_forms_requirement_met
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-300.25 (MR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.25
              excerpt: "Nonmonthly reporting households shall have their Food Stamp eligibility redetermined by using the forms specified in Section 63-300.2."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not nonmonthly_reporting_household) or eligibility_redetermined_using_forms_specified_in_section_63_300_2

  - name: change_reporting_recertification_forms_requirement_met
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-300.25 (QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.25
              excerpt: "Change reporting households shall have their food stamp eligibility redetermined by using the forms specified in Section 63-300.2."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not change_reporting_household) or eligibility_redetermined_using_forms_specified_in_section_63_300_2
