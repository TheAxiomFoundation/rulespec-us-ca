format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.461
  summary: |-
    The CWD shall not deny a household’s application prior to the 30th day after initial application if the household fails to appear for the first scheduled interview. A NOMI must be sent to the household reminding the household to reschedule their interview prior to the 30th day after application. Only after the NOMI is sent and the household fails to reschedule, can the CWD send a denial notice on the 30th day after application.
rules:
  - name: denial_notice_day_after_application
    kind: parameter
    dtype: Integer
    period: Day
    source: 63-300.461, sentences 1-3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.461
              excerpt: "prior to the 30th day after initial application"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.461
              excerpt: "on the 30th day after application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: missed_interview_application_denial_barred_before_denial_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.461, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.461
              excerpt: "The CWD shall not deny a household’s application prior to the 30th day after initial application if the household fails to appear for the first scheduled interview."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_appear_for_first_scheduled_interview and days_after_initial_application < denial_notice_day_after_application

  - name: nomi_required_before_denial_day_after_missed_interview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.461, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.461
              excerpt: "A NOMI must be sent to the household reminding the household to reschedule their interview prior to the 30th day after application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_appear_for_first_scheduled_interview and days_after_initial_application < denial_notice_day_after_application

  - name: missed_interview_denial_notice_allowed_on_denial_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.461, sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.461
              excerpt: "Only after the NOMI is sent and the household fails to reschedule, can the CWD send a denial notice on the 30th day after application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_appear_for_first_scheduled_interview and nomi_sent_to_household and household_failed_to_reschedule_interview and days_after_initial_application == denial_notice_day_after_application
