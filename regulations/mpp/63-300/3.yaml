format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.3
  summary: |-
    Households must file food stamp applications by submitting the forms to the food stamp office either in person, or through an authorized representative, by mail, fax, through an electronic transmission, or through an on-line electronic application. The length of time to deliver benefits is calculated from the date the application is filed with the CWD. Applications signed through the use of electronic signature techniques or applications containing a handwritten signature and then transmitted by fax or other electronic transmission are acceptable.
rules:
  - name: food_stamp_application_filed_with_cwd
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.3, sentences 1-2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.3
              excerpt: "Households must file food stamp applications by submitting the forms to the food stamp office either in person, or through an authorized representative, by mail, fax, through an electronic transmission, or through an on-line electronic application. The length of time to deliver benefits is calculated from the date the application is filed with the CWD."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_submitted_in_person_to_food_stamp_office
          or application_submitted_through_authorized_representative_to_food_stamp_office
          or application_submitted_by_mail_to_food_stamp_office
          or application_submitted_by_fax_to_food_stamp_office
          or application_submitted_through_electronic_transmission_to_food_stamp_office
          or application_submitted_through_online_electronic_application_to_food_stamp_office

  - name: food_stamp_application_signature_acceptable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
