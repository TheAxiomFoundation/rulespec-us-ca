    kind: parameter
    dtype: Count
    source: MPP 63-300.5(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "the CWD shall provide benefits within five working days after the verification is received."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

