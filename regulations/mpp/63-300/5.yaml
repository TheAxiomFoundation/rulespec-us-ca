    kind: parameter
    dtype: Count
    source: MPP 63-300.5(d)(MR), (QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "If the expense cannot be verified within 30 days of the date of application, the CWD shall determine the household's eligibility and benefit level without providing a deduction for the unverified expense."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: noncitizen_documentation_reasonable_opportunity_minimum_days
    kind: parameter
    dtype: Count
    source: MPP 63-300.5(e)(2)(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "A reasonable opportunity must be at least 10 days from the date of the CWD’s request for an acceptable document."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: noncitizen_documentation_application_deadline_days
    kind: parameter
    dtype: Count
    source: MPP 63-300.5(e)(2)(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "The CWD shall provide noncitizen applicants with a reasonable opportunity to submit acceptable documentation of their noncitizen status by the 30th day following the date of application."
    versions:
