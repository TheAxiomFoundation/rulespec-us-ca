format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.5
  summary: |-
    Prior to determining eligibility for applicant households, sufficient information concerning the applicant’s situation must be obtained in order for the EW to make an informed judgement as to the household’s eligibility. The household shall be given at least 10 days from the date of request to provide required verification. If the household does not provide the needed information in the time allotted, the CWD shall issue an adverse notice of action by the 30th day following the application date.
    During the certification period, the CWD may obtain information about changes in a household’s circumstances, other than information reported on the income report, through a third party or the household that the CWD cannot use to clearly determine eligibility and/or benefit amount. The CWD must pursue clarification using the following procedure: (A) The CWD must issue a Request for Information (RFI) which advises the household of the verification it must provide or actions it must take to clarify the household’s circumstances. (B) The CWD must allow the household at least 10 days to respond or to clarify its circumstances either by telephone or by correspondence, as the CWD directs.
    If the household’s certification cannot be completed by the end of its current certification period due to the 10-day time period allowed for submitting verification, the CWD shall provide benefits within five working days after the verification is received. Benefits shall not be prorated from the date verification is received; the household shall receive a full month of benefits.
    If obtaining verification of a deductible expense may delay the household's certification beyond the normal processing time frame, the CWD shall advise the household that its eligibility and benefit level may be determined without providing a deduction for the claimed, but unverified expense.
    If the expense cannot be verified within 30 days of the date of application, the CWD shall determine the household's eligibility and benefit level without providing a deduction for the unverified expense. If the household subsequently provides the missing verification, the CWD shall redetermine the household's benefits, and provide increased benefits, if any. The household shall be entitled to the restoration retroactive to the month of application of benefits denied as a result of the disallowance of the expense, only if the expense could not be verified within the 30-day processing standard because the CWD failed to allow the household sufficient time, as defined in Section 63-301.4, to verify the expense.
    The CWD shall certify the individual pending the results of the investigation for up to six months from the date of the original request for verification. The CWD shall provide noncitizen applicants with a reasonable opportunity to submit acceptable documentation of their noncitizen status by the 30th day following the date of application. A reasonable opportunity must be at least 10 days from the date of the CWD’s request for an acceptable document.
rules:
  - name: applicant_verification_response_minimum_days
    kind: parameter
    dtype: Count
    source: MPP 63-300.5(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "The household shall be given at least 10 days from the date of request to provide required verification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: application_adverse_notice_deadline_days
    kind: parameter
    dtype: Count
    source: MPP 63-300.5(a)(1)
    metadata:
      proof:
        atoms:
