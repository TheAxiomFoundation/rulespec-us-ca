        formula: |-
          30

  - name: certification_period_rfi_response_minimum_days
    kind: parameter
    dtype: Count
    source: MPP 63-300.5(a)(2)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "The CWD must allow the household at least 10 days to respond or to clarify its circumstances either by telephone or by correspondence, as the CWD directs."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

