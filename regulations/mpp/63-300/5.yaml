    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "The CWD shall certify the individual pending the results of the investigation for up to six months from the date of the original request for verification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: applicant_verification_response_period_sufficient
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-300.5(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "The household shall be given at least 10 days from the date of request to provide required verification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          required_application_verification_requested and days_allowed_to_provide_required_application_verification >= applicant_verification_response_minimum_days

  - name: adverse_notice_timely_after_missing_application_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-300.5(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "If the household does not provide the needed information in the time allotted, the CWD shall issue an adverse notice of action by the 30th day following the application date."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_provide_needed_application_verification_in_time_allotted and days_following_application_date <= application_adverse_notice_deadline_days

  - name: certification_period_rfi_response_period_sufficient
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-300.5(a)(2)(A)-(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "The CWD must issue a Request for Information (RFI) ... The CWD must allow the household at least 10 days to respond or to clarify its circumstances"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certification_period_change_information_requires_clarification and request_for_information_issued and days_allowed_to_respond_to_rfi >= certification_period_rfi_response_minimum_days

  - name: late_recertification_benefits_timely_after_verification
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-300.5(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "If the household’s certification cannot be completed by the end of its current certification period due to the 10-day time period allowed for submitting verification, the CWD shall provide benefits within five working days after the verification is received."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certification_cannot_be_completed_by_end_of_current_certification_period_due_to_verification_response_period and verification_received and working_days_after_verification_received <= recertification_verification_benefit_issuance_working_day_limit

  - name: late_recertification_full_month_benefits_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-300.5(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "Benefits shall not be prorated from the date verification is received; the household shall receive a full month of benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          certification_cannot_be_completed_by_end_of_current_certification_period_due_to_verification_response_period and verification_received

  - name: unverified_deductible_expense_excluded_from_initial_benefit_determination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-300.5(c), (d)(MR), (d)(QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "If the expense cannot be verified within 30 days of the date of application, the CWD shall determine the household's eligibility and benefit level without providing a deduction for the unverified expense."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          deductible_expense_claimed and expense_verification_would_delay_certification and expense_not_verified and days_since_application >= deductible_expense_verification_processing_standard_days

  - name: subsequent_expense_verification_retroactive_restoration_due_to_cwd_insufficient_time
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-300.5(d)(MR), (QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "The household shall be entitled to the restoration retroactive to the month of application of benefits denied as a result of the disallowance of the expense, only if the expense could not be verified within the 30-day processing standard because the CWD failed to allow the household sufficient time"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          missing_deductible_expense_verification_subsequently_provided and expense_disallowed_due_to_missing_verification and expense_could_not_be_verified_within_processing_standard_because_cwd_failed_to_allow_sufficient_time

  - name: noncitizen_documentation_opportunity_timely_and_reasonable
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-300.5(e)(2)(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "The CWD shall provide noncitizen applicants with a reasonable opportunity to submit acceptable documentation of their noncitizen status by the 30th day following the date of application. A reasonable opportunity must be at least 10 days from the date of the CWD’s request for an acceptable document."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_noncitizen_applicant and days_following_application_date <= noncitizen_documentation_application_deadline_days and days_allowed_to_submit_acceptable_noncitizen_documentation >= noncitizen_documentation_reasonable_opportunity_minimum_days

  - name: pending_federal_noncitizen_verification_certification_within_limit
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-300.5(e)(2)(D)2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.5
              excerpt: "The CWD shall certify the individual pending the results of the investigation for up to six months from the date of the original request for verification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          federal_agency_verification_request_submitted_for_noncitizen_status and months_since_original_federal_verification_request <= pending_federal_noncitizen_verification_certification_month_limit
