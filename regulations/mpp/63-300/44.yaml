format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.44
  summary: |-
    The CWD shall waive the face-to-face interview and instead allow a telephone interview on a case-by-case basis for any household which is unable to appoint an authorized representative and which has no household members able to come to the interview because of transportation difficulties or similar hardships which the CWD determines warrant a waiver of the interview. These hardship conditions include, but are not limited to: illness, care of a household member, prolonged severe weather, or work hours which preclude a face-to-face interview, lack of transportation, or living in a rural or remote area. The CWD shall determine if the transportation difficulty or hardship reported by a household warrants a waiver of the interview and shall document in the case file why a request for a waiver was granted or denied.
