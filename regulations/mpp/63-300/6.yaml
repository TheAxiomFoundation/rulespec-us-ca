format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.6
  summary: |-
    Upon request, CWDs shall provide a written receipt to any applicant or recipient who hand delivers documents that have been requested by the CWD. Receipts shall only be provided for documents which have been delivered in person to a CWD employee other than the applicant's or recipient's regularly assigned caseworker and to the location in which or through which the caseworker and to the location in which or through which the caseworker conducts his or her business. (Only one receipt is required for monthly income reports and their supporting documents.)
rules:
  - name: monthly_income_report_receipt_required_count
    kind: parameter
    dtype: Count
    period: Month
    source: 63-300.6, parenthetical
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.6
              excerpt: "Only one receipt is required for monthly income reports and their supporting documents."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: written_receipt_required_for_hand_delivered_requested_documents
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 63-300.6, sentences 1-2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.6
              excerpt: "Upon request, CWDs shall provide a written receipt to any applicant or recipient who hand delivers documents that have been requested by the CWD. Receipts shall only be provided for documents which have been delivered in person to a CWD employee other than the applicant's or recipient's regularly assigned caseworker and to the location in which or through which the caseworker and to the location in which or through which the caseworker conducts his or her business."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_requests_written_receipt_for_delivered_documents
          and person_is_applicant_or_recipient
          and person_hand_delivers_documents_requested_by_cwd
          and documents_delivered_in_person_to_cwd_employee
          and cwd_employee_is_not_persons_regularly_assigned_caseworker
          and documents_delivered_to_location_where_caseworker_conducts_business
