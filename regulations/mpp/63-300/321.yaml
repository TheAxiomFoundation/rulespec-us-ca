format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.321
  summary: |-
    Applications contain the penalty of perjury statement and must be signed by one adult household member or authorized representative or a responsible minor when the applicant household is composed entirely of minors and has no adult to act on its behalf.
rules:
  - name: application_signature_requirement_satisfied
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-300.321, signature clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.321
              excerpt: "must be signed by one adult household member or authorized representative or a responsible minor when the applicant household is composed entirely of minors and has no adult to act on its behalf"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_signed_by_one_adult_household_member
          or application_signed_by_authorized_representative
          or (
            application_signed_by_responsible_minor
            and applicant_household_composed_entirely_of_minors
            and
            not applicant_household_has_adult_to_act_on_its_behalf
          )

  - name: application_penalty_perjury_and_signature_requirements_satisfied
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-300.321
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.321
              excerpt: "Applications contain the penalty of perjury statement and must be signed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_contains_penalty_of_perjury_statement
          and application_signature_requirement_satisfied
