format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.623
  summary: |-
    (MR) A CWD which receives monthly income reports and other requested documents which have been mailed by the applicant or recipient shall not be subject to the requirements in this section. (QR) A CWD which receives quarterly income/eligibility reports and other requested documents which have been mailed by the applicant or recipient shall not be subject to the requirements in this section.
