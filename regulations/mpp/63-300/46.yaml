format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.46
  summary: |-
    The CWD shall schedule all interviews as promptly as possible to ensure eligible households receive an opportunity to participate within 30 days after the application is filed. The special circumstances of the household, including households with working members, must be considered to the extent practicable, when interviews are scheduled. If a household misses its scheduled interview, the CWD shall send the household a Notice of Missed Interview (NOMI). The CWD shall reschedule if the household requests another interview within 30 days of the initial application filed.
rules:
  - name: participation_opportunity_window_days
    kind: parameter
    dtype: Integer
    source: 63-300.46, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.46
              excerpt: "eligible households receive an opportunity to participate within 30 days after the application is filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: reschedule_request_window_days
    kind: parameter
    dtype: Integer
    source: 63-300.46, sentence 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.46
              excerpt: "requests another interview within 30 days of the initial application filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: interview_scheduling_participation_deadline_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.46, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.46
              excerpt: "The CWD shall schedule all interviews as promptly as possible to ensure eligible households receive an opportunity to participate within 30 days after the application is filed."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_is_eligible or (household_receives_opportunity_to_participate and days_after_application_filed_when_opportunity_received <= participation_opportunity_window_days)

  - name: interview_scheduling_special_circumstances_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.46, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.46
              excerpt: "The special circumstances of the household, including households with working members, must be considered to the extent practicable, when interviews are scheduled."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not interview_scheduled or (household_special_circumstances_considered_to_extent_practicable and (not household_has_working_members or working_member_circumstances_considered_to_extent_practicable))

  - name: notice_of_missed_interview_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.46, sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.46
              excerpt: "If a household misses its scheduled interview, the CWD shall send the household a Notice of Missed Interview (NOMI)."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_missed_scheduled_interview or cwd_sent_notice_of_missed_interview

  - name: missed_interview_rescheduling_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.46, sentence 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.46
              excerpt: "The CWD shall reschedule if the household requests another interview within 30 days of the initial application filed."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_requests_another_interview or days_after_initial_application_filed_when_another_interview_requested > reschedule_request_window_days or cwd_rescheduled_interview
