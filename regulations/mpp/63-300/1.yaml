format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.1
  summary: |-
    The application process includes filing and completing an application, being interviewed, and having certain information verified. The CWD shall act promptly on all applications and provide food stamp benefits retroactive to the month of application to those households that have completed the application process and have been determined eligible. Expedited service shall be available to households that qualify under the provisions of Section 63-301.5. Specific responsibilities of the household and CWD are detailed below.
rules:
  - name: application_process_completed
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-300.1, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.1
              excerpt: "The application process includes filing and completing an application, being interviewed, and having certain information verified."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_filed_and_completed and household_interviewed and required_information_verified

  - name: food_stamp_benefits_retroactive_to_application_month
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-300.1, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.1
              excerpt: "provide food stamp benefits retroactive to the month of application to those households that have completed the application process and have been determined eligible."
    versions:
