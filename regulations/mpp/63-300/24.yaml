format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.24
  summary: |-
    (MR) Recertification of Monthly Reporting Households Households subject to Food Stamp monthly reporting requirements shall have their Food Stamp eligibility redetermined by using the forms specified in Section 63-300.2 and the CA 7 for the budget month that corresponds to the first month of the new certification period. (QR) Recertification of Quarterly Reporting Households (QR) Households subject to food stamp QR requirements shall have their food stamp eligibility redetermined by using the forms specified in Section 63-300.2 and the QR 7 for the Data Month of the quarter corresponding to the last month of the certification period.
rules:
  - name: monthly_reporting_recertification_requirement_satisfied
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-300.24, MR
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.24
              excerpt: "Households subject to Food Stamp monthly reporting requirements shall have their Food Stamp eligibility redetermined by using the forms specified in Section 63-300.2 and the CA 7 for the budget month that corresponds to the first month of the new certification period."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not household_subject_to_food_stamp_monthly_reporting_requirements) or (
            forms_specified_in_section_63_300_2_used
            and ca_7_used_for_budget_month_corresponding_to_first_month_of_new_certification_period
          )

  - name: quarterly_reporting_recertification_requirement_satisfied
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-300.24, QR
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.24
              excerpt: "Households subject to food stamp QR requirements shall have their food stamp eligibility redetermined by using the forms specified in Section 63-300.2 and the QR 7 for the Data Month of the quarter corresponding to the last month of the certification period."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not household_subject_to_food_stamp_quarterly_reporting_requirements) or (
            forms_specified_in_section_63_300_2_used
            and qr_7_used_for_data_month_of_quarter_corresponding_to_last_month_of_certification_period
          )
