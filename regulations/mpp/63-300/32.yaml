format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.32
  summary: |-
    The household shall also be advised that it does not have to be interviewed before filing the application and may file an incomplete application form as long as the form contains the applicant's name and address, and is signed by a responsible member of the household or the household's authorized representative.
rules:
  - name: application_may_be_filed_before_interview
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: MPP 63-300.32, interview before filing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.32
              excerpt: "does not have to be interviewed before filing the application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          true
  - name: incomplete_application_may_be_filed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: MPP 63-300.32, incomplete application filing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.32
              excerpt: "may file an incomplete application form as long as the form contains the applicant's name and address, and is signed by a responsible member of the household or the household's authorized representative"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          incomplete_application_form_contains_applicant_name
          and incomplete_application_form_contains_applicant_address
          and (
            incomplete_application_form_signed_by_responsible_household_member
            or incomplete_application_form_signed_by_authorized_representative
          )
