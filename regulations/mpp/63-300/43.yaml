format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.43
  summary: |-
    The face-to-face interview shall be waived at initial certification and at recertification for any household in which all the household members are 60 years of age or older, or physically disabled The face-to-face interview shall also be waived if requested by any household which is unable to appoint an authorized representative and lives in a location which is not served by a certification office. For those households that are not required to have a face-to-face interview, the CWD shall conduct an interview by telephone, in accordance with Section 63-300.45. CALIFORNIA-DSS-MANUAL-FS-08-02 FOOD STAMP REGULATIONS
rules:
  - name: elderly_or_disabled_household_face_to_face_interview_waiver_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-300.43, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.43
              excerpt: "The face-to-face interview shall be waived at initial certification and at recertification for any household in which all the household members are 60 years of age or older, or physically disabled"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (interview_is_for_initial_certification or interview_is_for_recertification) and all_household_members_are_60_or_older_or_physically_disabled

