format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.42
  summary: |-
    The CWD shall screen applicants for the need to have face-to-face interviews as part of the application and recertification process. If mutually acceptable face-to-face interview accommodations between the county and applicant/recipient cannot be made, the county shall then evaluate whether the household qualifies for an exemption as specified in Sections 63-300.43 and .44.
rules:
  - name: face_to_face_interview_exemption_evaluation_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-300.42, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.42
              excerpt: "If mutually acceptable face-to-face interview accommodations between the county and applicant/recipient cannot be made, the county shall then evaluate whether the household qualifies for an exemption as specified in Sections 63-300.43 and .44."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_in_application_or_recertification_process and mutually_acceptable_face_to_face_interview_accommodations_between_county_and_applicant_or_recipient_cannot_be_made
