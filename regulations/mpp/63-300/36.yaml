format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.36
  summary: |-
    The household may voluntarily withdraw its application at any time prior to the determination of eligibility. The CWD shall document in the case file the reason for withdrawal, if any was stated by the household, and that contact was made with the household to confirm the withdrawal. The household shall be advised of its right to reapply at any time subsequent to a withdrawal.
rules:
  - name: voluntary_application_withdrawal_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.36, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.36
              excerpt: "The household may voluntarily withdraw its application at any time prior to the determination of eligibility."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_application and eligibility_determination_not_made

  - name: reapplication_right_after_withdrawal
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.36, sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.36
              excerpt: "The household shall be advised of its right to reapply at any time subsequent to a withdrawal."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_application_withdrawn and period_is_subsequent_to_withdrawal
