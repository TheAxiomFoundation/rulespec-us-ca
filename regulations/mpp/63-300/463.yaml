format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.463
  summary: |-
    HANDBOOK BEGINS HERE Example 1: The household applies on March 1 and is scheduled for an interview by the CWD on March 5. The household misses the first scheduled interview. The household is sent a NOMI and asked to reschedule their interview appointment. They reschedule within 30 days of the application date on March 10. The household keeps their March 10 appointment. The case is processed for eligibility. If eligible, the case is granted as soon as administratively possible and benefits are issued from the date of application. If the household is found to be ineligible for benefits, the case is denied on the 30th day after application. Example 2: The household applies on April 5 and is scheduled for an interview by the CWD on April 6. The household fails to appear for the first scheduled interview. The CWD sends a NOMI as soon as administratively possible. The household reschedules a second interview within 30 days of the application date, but fails to appear. The CWD must deny the household on the 30th day following the date of application. The NOMI process will not impact the recertification process. HANDBOOK ENDS HERE FOOD STAMP REGULATIONS
