  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.381
  summary: |-
    In the event the CWD is closed during the regular eight hours of a working day as defined in Sections 11-601.214 and .215, and an application for Food Stamp benefits is deposited in a drop box, mail slot, or other reasonable accommodation in accordance with Section 11-601.311(b), the "date of application" shall be the date the application is deposited.
