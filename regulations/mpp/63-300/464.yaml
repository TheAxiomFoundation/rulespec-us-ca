format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-300.464
  summary: |-
    (a) As part of the recertification process, the CWD must conduct a face-to-face interview with a member of the household or its authorized representative at least once every 12 months for households certified for 12 months or less. The requirement for a face-to-face interview once every 12 months may be waived in accordance with Sections 63-300.43 and .44 or not required in accordance with Section 63-300.41(QR). (b) If a household receives PA/GA and will be recertified for food stamps more than once in a 12-month period, the CWD may choose to conduct an in-office face-to-face interview with that household only once during that period. At any other recertification during that year period, the CWD may interview the household by telephone, conduct a home visit, or recertify the household by mail. (c) CWDs shall schedule interviews so that the household has at least 10 days after the interview in which to provide verification before the certification period expires.
rules:
  - name: face_to_face_interview_interval_months
    kind: parameter
    dtype: Count
    period: Day
    source: 63-300.464(a), sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.464
              excerpt: "at least once every 12 months for households certified for 12 months or less"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: pa_ga_multiple_recertification_period_months
    kind: parameter
    dtype: Count
    period: Day
    source: 63-300.464(b), sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.464
              excerpt: "more than once in a 12-month period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: verification_period_after_interview_days
    kind: parameter
    dtype: Count
    period: Day
    source: 63-300.464(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.464
              excerpt: "at least 10 days after the interview in which to provide verification before the certification period expires"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: face_to_face_recertification_interview_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.464(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.464
              excerpt: "As part of the recertification process, the CWD must conduct a face-to-face interview with a member of the household or its authorized representative at least once every 12 months for households certified for 12 months or less."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.464
              excerpt: "The requirement for a face-to-face interview once every 12 months may be waived in accordance with Sections 63-300.43 and .44 or not required in accordance with Section 63-300.41(QR)."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_process and
          household_certification_period_months <= face_to_face_interview_interval_months and
          not face_to_face_interview_requirement_waived_under_section_63_300_43 and
          not face_to_face_interview_requirement_waived_under_section_63_300_44 and
          not face_to_face_interview_not_required_under_section_63_300_41_qr

  - name: pa_ga_in_office_face_to_face_once_option_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.464(b), sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.464
              excerpt: "If a household receives PA/GA and will be recertified for food stamps more than once in a 12-month period, the CWD may choose to conduct an in-office face-to-face interview with that household only once during that period."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_receives_pa_ga and
          food_stamp_recertification_count_in_pa_ga_period > 1 and
          pa_ga_recertification_period_months == pa_ga_multiple_recertification_period_months

  - name: pa_ga_other_recertification_methods_available
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.464(b), sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.464
              excerpt: "At any other recertification during that year period, the CWD may interview the household by telephone, conduct a home visit, or recertify the household by mail."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          pa_ga_in_office_face_to_face_once_option_available and
          recertification_is_other_than_in_office_face_to_face_once_during_period

  - name: recertification_interview_schedule_allows_verification_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-300.464(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-300.464
              excerpt: "CWDs shall schedule interviews so that the household has at least 10 days after the interview in which to provide verification before the certification period expires."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          recertification_interview_scheduled and
          days_after_interview_for_verification_before_certification_period_expires >= verification_period_after_interview_days
