format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.72
  summary: |-
    The eligibility factors which shall be accepted for food stamp eligibility without verification are the resource, gross and net income limits; social security number information; sponsored alien information; and residency.
