format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.821
  summary: |-
    (a) The GA program must have income criteria equal to, or more restrictive than, the food stamp gross income test; and (b) The GA program must provide benefits as defined in Section 63-102g.(1)(A) and must not provide only one-time emergency payments; and (c) A signed certification that the county's GA program is appropriate for categorical eligibility is on file with the CDSS; or FOOD STAMP REGULATIONS (d) The GA program has been certified by FNS as an appropriate program.
rules:
  - name: ga_program_appropriate_for_categorical_eligibility
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-301.821(a)-(d)
