format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.633
  summary: |-
    (a) If a PA payment will not be received until a subsequent month, the CWD shall vary the household's benefit level according to the anticipated receipt of the payment and send the household a notice of action. (b) If the amount or date of receipt of the initial PA payment cannot be anticipated with reasonable certainty at the time of the Food Stamp eligibility determination, the PA payment shall be handled as a change in circumstances. However, the CWD is not required to send a notice of action if the receipt of the PA grant reduces, suspends or terminates the household's Food Stamp benefits, provided the household is notified in advance that this may occur when the grant is received. Termination of the case shall be permitted if the household is not categorically eligible.
rules:
  - name: delayed_pa_payment_benefit_level_variation_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-301.633(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.633
              excerpt: "If a PA payment will not be received until a subsequent month, the CWD shall vary the household's benefit level according to the anticipated receipt of the payment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          pa_payment_will_not_be_received_until_subsequent_month

