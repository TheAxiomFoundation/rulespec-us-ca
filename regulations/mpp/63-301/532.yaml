format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.532
  summary: |-
    If a household mails an application and it contains sufficient information to indicate that the household is entitled to expedited service and out of office certification, the CWD shall conduct the interview (unless the household cannot be reached), and complete the application process within the expedited service standards, as specified in Section 63-301.5. The first day of the count is the first calendar day following the filing of the application. If the application is not complete, and the CWD conducts a telephone interview of the applicant, the CWD shall mail the application to the household for signature. The mailing time involved shall not be calculated in the expedited service standards. Mailing time shall only include the days the application is in the mail to and from the household and the days the application is in the household's possession pending signature and return mailing.
