format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.632
  summary: |-
    (a) The CWD shall not reinterview the household but shall: (1) Use any available information to update the application; and (2) Contact the household or its authorized representative by mail or telephone to explain and confirm changes made by the CWD and to determine if any other changes in circumstances have occurred. (b) If any information obtained from the household differs from that which the CWD obtained from available information or the household provided additional changes in information, the CWD shall arrange for the household or its authorized representative to: (1) Initial all changes; (2) Re-sign and date the updated application; and (3) Provide necessary verification. FOOD STAMP REGULATIONS (c) Benefits for the initial month shall be prorated from the date the PA benefits are effective, or the date of the original food stamp application, whichever is later. (d) The CWD shall act on reevaluating the original application either at the household's request, or when it becomes otherwise aware of the household's PA eligibility. For example, the CWD normally becomes aware when the PA benefits are approved.
rules:
  - name: initial_month_proration_uses_pa_effective_date
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-301.632(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
