format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.42
  summary: |-
    If by the 30th day of the application processing period, the CWD cannot take further action on the application due to the fault of the household, the household shall lose its entitlement to benefits for the month of application. The CWD has the option either to deny or pend the application and to notify the household of the action taken by sending the household a notice of action either denying or pending the application. The option chosen by the CWD shall apply to all households within the county. If the application is to be denied, the CWD must send a notice of denial on the 30th day after application for missed interview, or by the 30th day if verification has not been received, to be effective on the 30th day. If the application is held pending, the CWD shall send the household a notice of pending status on the 30th day after application.
rules:
  - name: application_processing_deadline_day
    kind: parameter
    dtype: Integer
    period: Month
    source: 63-301.42, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.42
              excerpt: "If by the 30th day of the application processing period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: application_month_benefits_entitlement_lost_due_to_household_fault
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-301.42, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.42
              excerpt: "If by the 30th day of the application processing period, the CWD cannot take further action on the application due to the fault of the household, the household shall lose its entitlement to benefits for the month of application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          period_is_month_of_application
          and application_processing_period_day >= application_processing_deadline_day
          and cwd_cannot_take_further_action_on_application_due_to_household_fault
