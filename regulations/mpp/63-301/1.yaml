format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.1
  summary: |-
    The CWD shall provide eligible households that complete the initial application process an opportunity to participate as soon as possible, but not later than 30 calendar days following the date the application was filed. See Table I. An application is filed the day the appropriate food stamp office receives an application containing the applicant's name and address, which is signed by either a responsible member of the household or the household's authorized representative. Households entitled to expedited processing are specified in Section 63-301.5.
rules:
  - name: initial_application_participation_deadline_calendar_days
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.1, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.1
              excerpt: "not later than 30 calendar days following the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: application_filed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.1, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.1
              excerpt: "An application is filed the day the appropriate food stamp office receives an application containing the applicant's name and address, which is signed by either a responsible member of the household or the household's authorized representative."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          appropriate_food_stamp_office_receives_application_with_applicant_name_and_address and application_signed_by_responsible_household_member_or_authorized_representative

  - name: initial_application_participation_opportunity_requirement_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.1, sentences 1-2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.1
              excerpt: "The CWD shall provide eligible households that complete the initial application process an opportunity to participate as soon as possible, but not later than 30 calendar days following the date the application was filed."
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.1
              excerpt: "An application is filed the day the appropriate food stamp office receives an application containing the applicant's name and address, which is signed by either a responsible member of the household or the household's authorized representative."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not eligible_household
          or not household_completed_initial_application_process
          or not application_filed
          or (
            cwd_provided_initial_application_participation_opportunity
            and calendar_days_following_application_filed_to_initial_application_participation_opportunity <= initial_application_participation_deadline_calendar_days
          )
