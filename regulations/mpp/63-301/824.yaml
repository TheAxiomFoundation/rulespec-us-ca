format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.824
  summary: |-
    (a) The household refuses to cooperate in providing information to the CWD that is necessary for making an eligibility determination or for completing any subsequent review of eligibility; (b) The household is disqualified because the head of household fails to comply with a work requirement as specified in Section 63-407.1; (c) The household is ineligible under the striker provisions as specified in Section 63-402.8; or (d) The household is ineligible because they knowingly transferred resources for the purpose of qualifying or attempting to qualify for the program as specified in Section 63-501.6.
