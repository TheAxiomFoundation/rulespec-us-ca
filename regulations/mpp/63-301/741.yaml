format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.741
  summary: |-
    . 742 Section 63-301.742(MR) shall become inoperative and Section 63-301.742(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director's QR/PB Declaration. (MR) The household fails to comply with the monthly reporting requirements specified in Section 63-504.32, and Sections 63-505.2, .3, and .4; (QR) The household fails to comply with the QR requirements specified in Sections 63-508.4 and .613;
rules:
  - name: household_fails_reporting_requirements
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.741, MR and QR clauses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.741
              excerpt: "Section 63-301.742(MR) shall become inoperative and Section 63-301.742(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director's QR/PB Declaration."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.741
              excerpt: "(MR) The household fails to comply with the monthly reporting requirements specified in Section 63-504.32, and Sections 63-505.2, .3, and .4;"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.741
              excerpt: "(QR) The household fails to comply with the QR requirements specified in Sections 63-508.4 and .613;"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (qr_pb_effective_in_county_pursuant_to_directors_qr_pb_declaration and household_fails_to_comply_with_qr_requirements_under_sections_63_508_4_and_63_508_613) or ((not qr_pb_effective_in_county_pursuant_to_directors_qr_pb_declaration) and household_fails_to_comply_with_monthly_reporting_requirements_under_sections_63_504_32_63_505_2_63_505_3_and_63_505_4)
