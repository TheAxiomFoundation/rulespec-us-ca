format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.422
  summary: |-
    (a) If verification has not been provided, the CWD has the option of pending the application for only 30 days following the date of the initial request for the particular verification that is missing. (b) If the household fails to take the required action by the date specified on the notice of action, the CWD shall deny the application without providing further notice to the household.
rules:
  - name: missing_verification_pending_limit_days
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.422(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.422
              excerpt: "the CWD has the option of pending the application for only 30 days following the date of the initial request for the particular verification that is missing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: missing_verification_application_pending_option
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.422(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.422
              excerpt: "If verification has not been provided, the CWD has the option of pending the application for only 30 days following the date of the initial request for the particular verification that is missing."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_has_not_been_provided
          and particular_verification_is_missing
          and days_following_initial_request_for_missing_verification <= missing_verification_pending_limit_days

  - name: application_denial_without_further_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.422(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.422
              excerpt: "If the household fails to take the required action by the date specified on the notice of action, the CWD shall deny the application without providing further notice to the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_take_required_action
          and action_deadline_specified_on_notice_of_action_has_passed
