format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.33
  summary: |-
    .34 HANDBOOK BEGINS HERE NORMAL PROCESSING AND DENYING THE APPLICATION Filing of Application Starts 30 day process Action Action in Second 30 Day Period Original Month of Application Benefits o HH completed application, was interviewed, supplied necessary verification, regis- tered for work as appropriate. Determine eligibility for month of application and ongoing If eligible certify and issue benefits by 28th day. . . . . . . . . . . . . . . . . One/two month certs, issue NEC/approval. Eligibility continues . . . . . . . . . . . . . . . . (One/two month certs have reapplied timely and were processed.) Yes, if eligible HANDBOOK CONTINUES FOOD STAMP REGULATIONS Regulations APPLICATION PROCESS 63-301 (Cont.) HANDBOOK CONTINUES o HH fails to show for first scheduled interview and does not contact agency to reschedule within 30 days of app. o HH schedules 2nd interview within 30 days of app. and is determined eligible. o HH fails to show for 2nd interview. o Request for verifica- tion on day applica- tion is filed, HH does not provide verification. Verifi- cation not received within 10 days of request. NOMI must be sent to HH. If HH does not reschedule, denial notice must be sent on 30th day. Issue prorated benefits from date of appli-cation. Denial notice when administratively possible, but not before the 30th day of application. Send denial notice on or before 30th day to be effective 30th day after application. HH must reapply. Issue benefits. Case is reopened with- out a new application if action taken within 30 days of denial. HH loses entitlement to benefits for 1st 30 days. Case reopened without new application if required action taken within 60 days of date of application. No. Yes. No. No. HANDBOOK ENDS HERE Page 126.1 FOOD STAMP REGULATIONS
rules:
  - name: application_processing_period_days
    kind: parameter
    dtype: Count
    source: 63-301 handbook chart, filing starts process
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "Filing of Application Starts 30 day process"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: normal_application_issuance_deadline_day
    kind: parameter
    dtype: Count
    source: 63-301 handbook chart, normal processing row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "If eligible certify and issue benefits by 28th day."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          28

  - name: verification_response_period_days
    kind: parameter
    dtype: Count
    source: 63-301 handbook chart, verification row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "Verification not received within 10 days of request."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: application_denial_notice_deadline_day
    kind: parameter
    dtype: Count
    source: 63-301 handbook chart, denial notice rows
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "denial notice must be sent on 30th day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: post_denial_reopen_period_days
    kind: parameter
    dtype: Count
    source: 63-301 handbook chart, second interview row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "Case is reopened without a new application if action taken within 30 days of denial."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: initial_entitlement_loss_period_days
    kind: parameter
    dtype: Count
    source: 63-301 handbook chart, second interview row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "HH loses entitlement to benefits for 1st 30 days."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: post_application_reopen_period_days
    kind: parameter
    dtype: Count
    source: 63-301 handbook chart, verification row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "Case reopened without new application if required action taken within 60 days of date of application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: normal_application_certification_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301 handbook chart, normal processing row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "HH completed application, was interviewed, supplied necessary verification, registered for work as appropriate. Determine eligibility for month of application and ongoing If eligible certify and issue benefits by 28th day."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_completed_application
          and household_was_interviewed
          and household_supplied_necessary_verification
          and household_registered_for_work_as_appropriate
          and household_eligible

  - name: missed_first_interview_nomi_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301 handbook chart, missed first interview row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "HH fails to show for first scheduled interview and does not contact agency to reschedule within 30 days of app. NOMI must be sent to HH."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_first_scheduled_interview
          and not household_contacted_agency_to_reschedule_within_application_processing_period

  - name: missed_first_interview_denial_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301 handbook chart, missed first interview row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "If HH does not reschedule, denial notice must be sent on 30th day."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_first_scheduled_interview
          and not household_contacted_agency_to_reschedule_within_application_processing_period
          and not household_rescheduled_after_nomi

  - name: missed_first_interview_reapplication_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301 handbook chart, missed first interview row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "HH must reapply."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_first_scheduled_interview
          and not household_contacted_agency_to_reschedule_within_application_processing_period
          and not household_rescheduled_after_nomi

  - name: second_interview_prorated_benefits_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301 handbook chart, second interview scheduled row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "HH schedules 2nd interview within 30 days of app. and is determined eligible. Issue prorated benefits from date of application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_scheduled_second_interview_within_application_processing_period
          and household_determined_eligible

  - name: missed_second_interview_denial_notice_available_after_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301 handbook chart, missed second interview row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "HH fails to show for 2nd interview. Denial notice when administratively possible, but not before the 30th day of application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_second_interview

  - name: missed_second_interview_case_reopened_without_new_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301 handbook chart, missed second interview row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "Case is reopened without a new application if action taken within 30 days of denial."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_second_interview
          and household_took_required_action_within_post_denial_reopen_period

  - name: missed_second_interview_initial_entitlement_lost
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301 handbook chart, missed second interview row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "HH loses entitlement to benefits for 1st 30 days."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_second_interview

  - name: verification_failure_denial_notice_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301 handbook chart, verification row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "Request for verification on day application is filed, HH does not provide verification. Verification not received within 10 days of request. Send denial notice on or before 30th day to be effective 30th day after application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_requested_on_application_filing_day
          and not household_provided_requested_verification_within_response_period

  - name: verification_failure_case_reopened_without_new_application
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301 handbook chart, verification row
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.33
              excerpt: "Case reopened without new application if required action taken within 60 days of date of application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          verification_requested_on_application_filing_day
          and not household_provided_requested_verification_within_response_period
          and household_took_required_action_within_post_application_reopen_period
