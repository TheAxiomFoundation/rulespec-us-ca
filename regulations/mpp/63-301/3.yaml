format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.3
  summary: |-
    Households determined to be ineligible shall be sent a notice of action denying their application as soon as possible but not later than 30 days following the date the application was filed.
rules:
  - name: application_denial_notice_deadline_days
    kind: parameter
    dtype: Integer
    period: Day
    source: 63-301.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.3
              excerpt: "not later than 30 days following the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: ineligible_household_denial_notice_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.3
              excerpt: "Households determined to be ineligible shall be sent a notice of action denying their application as soon as possible but not later than 30 days following the date the application was filed."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_determined_ineligible
          or (
            notice_of_action_denying_application_sent
            and notice_of_action_denying_application_sent_as_soon_as_possible
            and days_following_application_filing_when_denial_notice_sent <= application_denial_notice_deadline_days
          )
