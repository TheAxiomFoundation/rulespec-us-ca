format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.63
  summary: |-
    When all members of a household apply for both Food Stamps and PA, the application shall be made on the SAWS 1 CA1/DFA 285-A1 and BC JA 2 CA 2/DFA 285-A2. PA applicant households not applying for Food Stamps shall enter a signed statement to this effect on the SAWS 1 CA1/DFA 285-A1 or check the appropriate box on the BC JA 2 CA 2/DFA 285-A2. If a PA applicant household does not check the box marked Food Stamps or specifically indicate that they do not wish Food Stamps, the household's application shall be considered a request for both PA and Food Stamps unless it is determined otherwise during the interview.
rules:
  - name: pa_application_defaulted_to_request_for_both_pa_and_food_stamps
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.63, sentence 3
    metadata:
      proof:
        atoms:
