format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.533
  summary: |-
    If the prescreening required in Section 63-301.52 fails to identify a household as being entitled to expedited service and the CWD subsequently discovers that the household is entitled to expedited service, the CWD shall provide expedited service to the households within the processing standards described in 63-301.531, except that the processing standards shall be calculated from the date the CWD discovers the household is entitled to expedited service and not the date the application was filed. FOOD STAMP REGULATIONS
rules:
  - name: expedited_service_subsequent_discovery_requirement_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.533, antecedent clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.533
              excerpt: "If the prescreening required in Section 63-301.52 fails to identify a household as being entitled to expedited service and the CWD subsequently discovers that the household is entitled to expedited service"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          section_63_301_52_prescreening_failed_to_identify_household_entitled_to_expedited_service and cwd_subsequently_discovers_household_entitled_to_expedited_service

  - name: expedited_service_subsequent_discovery_processing_standard_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.533, operative clause
    metadata:
      proof:
