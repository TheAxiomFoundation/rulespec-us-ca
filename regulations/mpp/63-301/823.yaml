format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.823
  summary: |-
    (a) Where household composition is questionable, the CWD shall determine that the household meets the definition of household as specified in Section 63-402 and contains no individuals disqualified as specified in Section 63-301.825.
rules:
  - name: questionable_household_composition_determination_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.823(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.823
              excerpt: "Where household composition is questionable"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.823
              excerpt: "the CWD shall determine that the household meets the definition of household as specified in Section 63-402"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.823
              excerpt: "and contains no individuals disqualified as specified in Section 63-301.825."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not household_composition_is_questionable) or (
            cwd_determines_household_meets_definition_under_section_63_402 and
            cwd_determines_household_contains_no_individuals_disqualified_under_section_63_301_825
          )
