format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.411
  summary: |-
    (a) For households that have failed to complete the application form, the CWD must have offered, or attempted to offer, assistance in its completion. (b) In cases where verification is incomplete, the CWD must have provided the household with the FS 8; assistance when required, as specified in Section 63-300.55; and sufficient time to provide the missing verification. Sufficient time shall be at least 10 days from the date of the initial request for the particular verification that was missing. (c) For households that have failed to appear for an interview, the CWD must have attempted to reschedule the initial inteview within 30 days of the date the application was filed. However, if the household has failed to appear for the first interview and a subsequent interview is postponed at the household's request or cannot otherwise be rescheduled until after the 20th day, but before the 30th day following the date the application was filed, the household must appear for the interview, bring verification, and register members for work by the 30th day; otherwise the delay shall be the fault of the household. If the household has failed to appear for the first interview and a subsequent interview is postponed at the household's request until after the 30th day following the date the application was filed, the delay shall be the fault of the household. If the household has missed both scheduled interviews and requests another interview, any delay shall be the fault of the household.
rules:
  - name: missing_verification_minimum_response_days
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.411(b), sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "Sufficient time shall be at least 10 days from the date of the initial request for the particular verification that was missing."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: initial_interview_reschedule_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.411(c), sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "the CWD must have attempted to reschedule the initial inteview within 30 days of the date the application was filed."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: subsequent_interview_late_window_start_day
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.411(c), sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "until after the 20th day, but before the 30th day following the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: subsequent_interview_late_window_end_day
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.411(c), sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "until after the 20th day, but before the 30th day following the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: interview_actions_deadline_day
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.411(c), sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "the household must appear for the interview, bring verification, and register members for work by the 30th day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: household_requested_post_deadline_interview_threshold_day
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.411(c), sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "a subsequent interview is postponed at the household's request until after the 30th day following the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: application_completion_assistance_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.411(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "For households that have failed to complete the application form, the CWD must have offered, or attempted to offer, assistance in its completion."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_failed_to_complete_application_form
          or cwd_offered_or_attempted_application_completion_assistance

  - name: missing_verification_process_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.411(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "In cases where verification is incomplete, the CWD must have provided the household with the FS 8; assistance when required, as specified in Section 63-300.55; and sufficient time to provide the missing verification."
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "Sufficient time shall be at least 10 days from the date of the initial request for the particular verification that was missing."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_verification_incomplete
          or (
            cwd_provided_fs_8
            and (
              not assistance_required_under_section_63_300_55
              or cwd_provided_assistance_required_under_section_63_300_55
            )
            and household_missing_verification_response_days_provided >= missing_verification_minimum_response_days
          )

  - name: initial_interview_reschedule_attempt_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.411(c), sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "For households that have failed to appear for an interview, the CWD must have attempted to reschedule the initial inteview within 30 days of the date the application was filed."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_failed_to_appear_for_initial_interview
          or (
            cwd_attempted_to_reschedule_initial_interview
            and initial_interview_reschedule_attempt_day_after_application_filing <= initial_interview_reschedule_deadline_days
          )

  - name: late_pre_deadline_interview_household_delay_fault
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.411(c), sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "if the household has failed to appear for the first interview and a subsequent interview is postponed at the household's request or cannot otherwise be rescheduled until after the 20th day, but before the 30th day following the date the application was filed, the household must appear for the interview, bring verification, and register members for work by the 30th day; otherwise the delay shall be the fault of the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_appear_for_initial_interview
          and (
            subsequent_interview_postponed_at_household_request
            or subsequent_interview_cannot_otherwise_be_rescheduled
          )
          and subsequent_interview_rescheduled_day_after_application_filing > subsequent_interview_late_window_start_day
          and subsequent_interview_rescheduled_day_after_application_filing < subsequent_interview_late_window_end_day
          and (
            not household_appeared_for_interview_by_interview_actions_deadline
            or not household_brought_verification_by_interview_actions_deadline
            or not household_registered_members_for_work_by_interview_actions_deadline
          )

  - name: post_deadline_household_requested_interview_delay_fault
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.411(c), sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "If the household has failed to appear for the first interview and a subsequent interview is postponed at the household's request until after the 30th day following the date the application was filed, the delay shall be the fault of the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_appear_for_initial_interview
          and subsequent_interview_postponed_at_household_request
          and subsequent_interview_rescheduled_day_after_application_filing > household_requested_post_deadline_interview_threshold_day

  - name: missed_two_interviews_additional_request_household_delay_fault
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.411(c), sentence 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.411
              excerpt: "If the household has missed both scheduled interviews and requests another interview, any delay shall be the fault of the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_missed_both_scheduled_interviews
          and household_requested_another_interview_after_missing_both
