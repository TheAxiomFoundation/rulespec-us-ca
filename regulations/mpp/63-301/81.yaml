format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.81
  summary: |-
    CWDs shall advise all GA applicant households of their potential categorical eligibility for Food Stamp benefits and provide these households with a DFA 285-A1 and DFA 285-A2 or the joint application forms. GA households shall not be considered categorically eligible for Food Stamp benefits unless they receive, or are authorized to receive, benefits from a GA program appropriate for categorical eligibility as specified in Section 63-301.82.
rules:
  - name: ga_program_condition_for_categorical_food_stamp_eligibility
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.81, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
