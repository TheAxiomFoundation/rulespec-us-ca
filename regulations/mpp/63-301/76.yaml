format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.76
  summary: |-
    For purposes of work registration, the exemptions specified in Section 63-407.2 shall apply to individuals in PA categorically eligible households. Any individual who is not exempt from work registration is subject to the work requirements specified in Section 63-407.
rules:
  - name: pa_categorically_eligible_household_work_registration_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-301.76, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.76
              excerpt: "the exemptions specified in Section 63-407.2 shall apply to individuals in PA categorically eligible households"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.76
              excerpt: "For purposes of work registration, the exemptions specified in Section 63-407.2 shall apply"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_in_pa_categorically_eligible_household and work_registration_exemption_applies_under_section_63_407_2

  - name: individual_subject_to_work_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-301.76, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.76
              excerpt: "Any individual who is not exempt from work registration"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.76
              excerpt: "is subject to the work requirements specified in Section 63-407"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not individual_exempt_from_work_registration
