format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.543
  summary: |-
    (a) Households which apply for benefits after the 15th day of the month and have been determined eligible to receive benefits for the initial month and the subsequent month shall receive both allotments at the same time, in accordance with Section 63-503.16.
rules:
  - name: initial_and_subsequent_month_allotments_received_at_same_time
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-301.543(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.543
              excerpt: "Households which apply for benefits after the 15th day of the month and have been determined eligible to receive benefits for the initial month and the subsequent month shall receive both allotments at the same time"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_applied_for_benefits_after_fifteenth_day_of_month
          and household_determined_eligible_to_receive_benefits_for_initial_month
          and household_determined_eligible_to_receive_benefits_for_subsequent_month
