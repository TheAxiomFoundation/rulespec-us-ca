format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.544
  summary: |-
    (a) One-Month Certification Section 63-301.544(a)(MR) shall become inoperative and Section 63-301.544(a)(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director's QR/PB Declaration. (MR) Nonmonthly reporting households that apply on or before the 15th day of the calendar or fiscal month shall be certified for one month only. (1) Benefits for the initial month shall be prorated from the date the application was filed to the end of that calendar or fiscal month. (2) Households shall reapply and complete the verification which was postponed, unless they have been certified under normal processing standards since the last expedited certification. (QR) Change reporting households that apply on or before the 15th day of the calendar or fiscal month shall be certified for one month only. (b) Longer Than One-Month Certification (1) Section 63-301.544(b)(1)(MR) shall become inoperative and Section 63-301.544(b)(1)(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director’s QR/PB Declaration. (MR) Nonmonthly reporting households applying after the 15th day of the calendar or fiscal month shall be certified only for the month of application, and the subsequent month. (QR) Change reporting households applying after the 15th day of the calendar or fiscal month shall be certified only for the month of application, and the subsequent month. (2) Section 63-301.544(b)(2)(MR) shall become inoperative and Section 63-301.544(b)(2)(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director’s QR/PB Declaration. (MR) Monthly reporting households shall be assigned a normal certification period as specified in Section 63-504.1. (QR) QR households shall be assigned a normal certification period as specified in Section 63-504.1.
rules:
  - name: one_month_application_filing_day_cutoff
    kind: parameter
    dtype: Integer
    period: Month
    source: 63-301.544(a)(MR), (a)(QR), (b)(1)(MR), (b)(1)(QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.544
              excerpt: "households that apply on or before the 15th day of the calendar or fiscal month"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.544
              excerpt: "households applying after the 15th day of the calendar or fiscal month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15

  - name: one_month_certification_period_month_count
    kind: parameter
    dtype: Count
    period: Month
    source: 63-301.544(a)(MR), (a)(QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.544
              excerpt: "shall be certified for one month only"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: application_and_subsequent_month_certification_period_month_count
    kind: parameter
    dtype: Count
    period: Month
    source: 63-301.544(b)(1)(MR), (b)(1)(QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.544
              excerpt: "shall be certified only for the month of application, and the subsequent month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: one_month_certification_required
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-301.544(a)(MR), (a)(QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.544
              excerpt: "Section 63-301.544(a)(MR) shall become inoperative and Section 63-301.544(a)(QR) shall become operative in a county on the date QR/PB becomes effective in that county"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.544
              excerpt: "(MR) Nonmonthly reporting households that apply on or before the 15th day of the calendar or fiscal month shall be certified for one month only."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.544
              excerpt: "(QR) Change reporting households that apply on or before the 15th day of the calendar or fiscal month shall be certified for one month only."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_day_of_calendar_or_fiscal_month <= one_month_application_filing_day_cutoff
          and (
            (
              not county_qr_pb_effective_pursuant_to_directors_declaration
              and household_is_nonmonthly_reporting
            )
            or (
              county_qr_pb_effective_pursuant_to_directors_declaration
              and household_is_change_reporting
            )
          )

  - name: one_month_certification_period_months
    kind: derived
    entity: SnapUnit
    dtype: Count
    period: Month
    source: 63-301.544(a)(MR), (a)(QR)
    metadata:
