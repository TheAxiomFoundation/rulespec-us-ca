    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.61, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.61
              excerpt: "The CWD shall conduct a single interview at initial application for both public assistance and food stamp purposes"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.61
              excerpt: "except as provided in Section 63-301.611."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
