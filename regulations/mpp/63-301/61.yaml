format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.61
  summary: |-
    The CWD shall conduct a single interview at initial application for both public assistance and food stamp purposes, except as provided in Section 63-301.611. PA households shall not be required to see a different eligibility worker or otherwise be subjected to two interview requirements to obtain the benefits of both programs. Following the single interview, the application may be processed by separate workers to determine eligibility and benefit levels for food stamps and public assistance. A household's eligibility for food stamp out-of-office interview provisions in 63-300.42 and .43 does not relieve the household of any responsibility for a face-to-face interview to be certified for PA.
rules:
