format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.511
  summary: |-
    Households with less than $150 in monthly gross income as defined in Section 63-502.1 provided their liquid resources as defined in Section 63-501.11 do not exceed $100;
rules:
  - name: low_gross_income_monthly_threshold
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: 63-301.511, monthly gross income clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.511
              excerpt: "Households with less than $150 in monthly gross income as defined in Section 63-502.1"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          150

  - name: low_gross_income_liquid_resource_limit
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: 63-301.511, liquid resources clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.511
              excerpt: "provided their liquid resources as defined in Section 63-501.11 do not exceed $100"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100

  - name: household_has_low_gross_income_and_limited_liquid_resources
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-301.511
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.511
              excerpt: "Households with less than $150 in monthly gross income as defined in Section 63-502.1"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.511
              excerpt: "provided their liquid resources as defined in Section 63-501.11 do not exceed $100"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          monthly_gross_income_as_defined_under_section_63_502_1 < low_gross_income_monthly_threshold and liquid_resources_as_defined_under_section_63_501_11 <= low_gross_income_liquid_resource_limit
