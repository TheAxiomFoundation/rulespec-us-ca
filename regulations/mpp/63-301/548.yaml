format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.548
  summary: |-
    There is no limit to the number of times a household can be certified under expedited service procedures, as long as prior to each expedited certification, the household either completes the verification requirements that were postponed at the last expedited certification or was certified under normal processing standards since the last expedited certification.
rules:
  - name: repeat_expedited_certification_frequency_condition_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: MPP 63-301.548
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.548
              excerpt: "as long as prior to each expedited certification, the household either completes the verification requirements that were postponed at the last expedited certification or was certified under normal processing standards since the last expedited certification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_completed_verification_requirements_postponed_at_last_expedited_certification
          or household_was_certified_under_normal_processing_standards_since_last_expedited_certification
