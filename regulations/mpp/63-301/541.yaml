    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.541
              excerpt: "If a household eligible for expedited services reapplies after 95 days"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.541
              excerpt: "or reapplies after seven months"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.541
              excerpt: "the CWD shall issue one month's benefits"
    versions:
