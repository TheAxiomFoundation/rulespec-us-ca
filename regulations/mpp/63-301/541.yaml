        formula: |-
          household_eligible_for_expedited_services and household_reapplies_for_expedited_services and ((household_refused_to_cooperate_with_nonfederal_qc_reviewer and days_since_end_of_annual_review_period_for_nonfederal_qc_refusal > nonfederal_qc_refusal_reapplication_waiting_period_days) or (household_refused_to_cooperate_with_federal_qc_reviewer and months_since_end_of_annual_review_period_for_federal_qc_refusal > federal_qc_refusal_reapplication_waiting_period_months))

