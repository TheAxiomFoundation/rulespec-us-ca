format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.541
  summary: |-
    (a) In all cases, the identity of the individual making application shall be verified through a collateral contact or readily available documentary evidence as specified in Section 63-300.51(c). (b) All reasonable efforts shall be made to verify within the expedited processing standards, the household's residency, as specified in Section 63-300.515, income statement (including a statement that the household has no income), liquid resources, and all other factors required by Section 63-300.51 through collateral contacts or readily available documentary evidence. However, benefits shall not be delayed beyond the delivery standards prescribed in 63-301.53 solely because these eligibility factors have not been verified. Verification of these eligibility factors shall be postponed if unobtainable within the expedited processing standards. (1) If a household eligible for expedited services reapplies after 95 days from the end of the annual review period in which the household had refused to cooperate with a nonfederal QC reviewer or reapplies after seven months from the end of the annual review period in which the household had refused to cooperate with a federal QC reviewer, the CWD shall issue one month's benefits in accordance with the processing standards and procedures in Section 63-301.53. Before a second month's benefits are issued, the household shall provide verification of all household circumstances that could affect eligibility as specified in Section 63-505.11. (c) Households entitled to expedited service shall be subject to the social security number provisions of Section 63-404.2. (d) The applicant and all other household members shall be registered for work prior to certification unless exempt from this requirement per Section 63-407.2. The CWD shall attempt to verify questionable work registration exemptions, but shall postpone these efforts if they cannot be accomplished within expedited service time frames.
rules:
  - name: nonfederal_qc_refusal_reapplication_waiting_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.541(b)(1), nonfederal QC reviewer clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.541
              excerpt: "reapplies after 95 days from the end of the annual review period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          95

  - name: federal_qc_refusal_reapplication_waiting_period_months
    kind: parameter
    dtype: Count
    period: Month
    source: 63-301.541(b)(1), federal QC reviewer clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.541
              excerpt: "reapplies after seven months from the end of the annual review period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7

  - name: identity_verification_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 63-301.541(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.541
              excerpt: "identity of the individual making application shall be verified through a collateral contact or readily available documentary evidence"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_identity_verified_through_collateral_contact or applicant_identity_verified_through_readily_available_documentary_evidence

  - name: expedited_benefits_delivery_without_factor_verification_required
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Day
    source: 63-301.541(b), no-delay sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.541
              excerpt: "benefits shall not be delayed beyond the delivery standards prescribed in 63-301.53 solely because these eligibility factors have not been verified"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_entitled_to_expedited_service and eligibility_factors_required_by_section_63_300_51_not_verified

  - name: expedited_factor_verification_postponement_required
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Day
