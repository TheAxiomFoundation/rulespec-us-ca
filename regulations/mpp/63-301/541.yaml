              corpus_citation_path: us-ca/regulation/mpp/63-301.541
              excerpt: "Verification of these eligibility factors shall be postponed if unobtainable within the expedited processing standards."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_entitled_to_expedited_service and eligibility_factors_unobtainable_within_expedited_processing_standards

  - name: qc_refusal_reapplication_initial_benefit_required
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
