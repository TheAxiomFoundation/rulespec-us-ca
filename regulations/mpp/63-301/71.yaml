format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.71
  summary: |-
    (MR) Households subject to retrospective budgeting that have been suspended for PA purposes or that receive zero benefits. (QR) Households subject to QR that receive zero benefits.
rules:
  - name: zero_benefit_or_pa_suspended_reporting_household
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-301.71 (MR), (QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.71
              excerpt: "(MR) Households subject to retrospective budgeting that have been suspended for PA purposes or that receive zero benefits."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.71
              excerpt: "(QR) Households subject to QR that receive zero benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (household_subject_to_retrospective_budgeting and (household_suspended_for_pa_purposes or household_receives_zero_benefits)) or (household_subject_to_quarterly_reporting and household_receives_zero_benefits)
