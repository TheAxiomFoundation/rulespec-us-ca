format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.62
  summary: |-
    For households applying for both public assistance and food stamps, the verification procedures described in Section 63-300.5 shall be followed for those factors of eligibility which are needed solely for purposes of determining the household's eligibility for food stamps. For those factors of eligibility which are needed to determine both PA eligibility and food stamp eligibility the CWD may use the PA verification rules. However, the CWD shall not delay the household's food stamp benefits if, at the end of 30 days following the date the application was filed, the CWD has sufficient verification to meet the verification requirements of Section 63-300.5 but does not have sufficient verification to meet the PA verification rules. MANUAL LETTER NO. FS-90-01 Issued 7/1/90 FOOD STAMP REGULATIONS
rules:
  - name: food_stamp_benefit_delay_limit_days
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.62, sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.62
              excerpt: "at the end of 30 days following the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: food_stamp_only_factor_uses_food_stamp_verification_procedures
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.62, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.62
              excerpt: "For households applying for both public assistance and food stamps, the verification procedures described in Section 63-300.5 shall be followed for those factors of eligibility which are needed solely for purposes of determining the household's eligibility for food stamps."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_applies_for_both_public_assistance_and_food_stamps and eligibility_factor_needed_solely_for_food_stamp_eligibility

  - name: shared_factor_pa_verification_rules_may_be_used
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.62, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.62
              excerpt: "For those factors of eligibility which are needed to determine both PA eligibility and food stamp eligibility the CWD may use the PA verification rules."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_applies_for_both_public_assistance_and_food_stamps and eligibility_factor_needed_for_both_public_assistance_and_food_stamp_eligibility

  - name: food_stamp_benefit_delay_bar_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.62, sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.62
              excerpt: "the CWD shall not delay the household's food stamp benefits if, at the end of 30 days following the date the application was filed, the CWD has sufficient verification to meet the verification requirements of Section 63-300.5 but does not have sufficient verification to meet the PA verification rules."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_applies_for_both_public_assistance_and_food_stamps and
          days_following_application_filing >= food_stamp_benefit_delay_limit_days and
          cwd_has_sufficient_verification_to_meet_requirements_under_section_63_300_5 and
          not cwd_has_sufficient_verification_to_meet_pa_verification_rules
