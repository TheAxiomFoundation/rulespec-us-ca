format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.825
  summary: |-
    (a) Is disqualified for intentional Program violation; (b) Is not the head of household and disqualified for failure to comply with the work requirements specified in Section 63-407.1; (c) Fails to provide or apply for a social security number; (d) Is an ineligible alien; (e) Is an ineligible student; (f) Is an SSI recipient; or (g) Is institutionalized in a nonexempt facility as specified in Section 63-402.4.
rules:
  - name: non_head_work_requirement_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-301.825(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.825
              excerpt: "(b) Is not the head of household and disqualified for failure to comply with the work requirements specified in Section 63-407.1"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_not_head_of_household and person_disqualified_for_failure_to_comply_with_work_requirements_under_section_63_407_1

  - name: person_has_disqualifying_or_ineligible_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-301.825(a)-(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.825
              excerpt: "(a) Is disqualified for intentional Program violation; (b) Is not the head of household and disqualified for failure to comply with the work requirements specified in Section 63-407.1; (c) Fails to provide or apply for a social security number; (d) Is an ineligible alien; (e) Is an ineligible student; (f) Is an SSI recipient; or (g) Is institutionalized in a nonexempt facility as specified in Section 63-402.4."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_disqualified_for_intentional_program_violation or non_head_work_requirement_disqualification or person_fails_to_provide_or_apply_for_social_security_number or person_is_ineligible_alien or person_is_ineligible_student or person_is_ssi_recipient or person_is_institutionalized_in_nonexempt_facility_under_section_63_402_4
