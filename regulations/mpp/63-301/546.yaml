format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.546
  summary: |-
    HANDBOOK BEGINS HERE a) When a household has provided the required postponed verification, the CWD hall issue the third month’s benefits within five working days from receipt of the verification or by the first day of the third month, whichever is later. For staggered issuance this shall be the first working day of the third month. If verification is not provided before the end of the third month, the CWD shall terminate the household’s participation and shall issue no further benefits. This shall also apply to migrant farmworker households needing out-of-state verification as outlined in Section 63-301.545(a)(1). HANDBOOK ENDS HERE
rules:
  - name: postponed_verification_issuance_deadline_working_days
    kind: parameter
    dtype: Count
    source: 63-301.546(a), sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.546
              excerpt: "within five working days from receipt of the verification"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          5

  - name: postponed_verification_month_number
    kind: parameter
    dtype: Integer
    source: 63-301.546(a), sentences 1 and 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.546
              excerpt: "the third month’s benefits"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.546
              excerpt: "before the end of the third month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: postponed_verification_standard_third_month_issuance_day
    kind: parameter
    dtype: Integer
    source: 63-301.546(a), sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.546
              excerpt: "by the first day of the third month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: postponed_verification_staggered_third_month_issuance_working_day
    kind: parameter
    dtype: Integer
    source: 63-301.546(a), sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.546
              excerpt: "For staggered issuance this shall be the first working day of the third month."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: postponed_verification_third_month_rules_apply
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.546(a), sentences 1 and 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.546
              excerpt: "When a household has provided the required postponed verification"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.546
              excerpt: "This shall also apply to migrant farmworker households needing out-of-state verification as outlined in Section 63-301.545(a)(1)."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_subject_to_required_postponed_verification or household_is_migrant_farmworker_needing_out_of_state_verification_under_section_63_301_545_a_1

  - name: third_month_benefits_issuance_timing_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.546(a), sentences 1-2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.546
              excerpt: "When a household has provided the required postponed verification, the CWD hall issue the third month’s benefits within five working days from receipt of the verification or by the first day of the third month, whichever is later."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.546
              excerpt: "For staggered issuance this shall be the first working day of the third month."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not (
            postponed_verification_third_month_rules_apply
            and household_has_provided_required_postponed_verification
          )
          or (
            household_uses_staggered_issuance
            and cwd_issues_third_month_benefits_by_first_working_day_of_third_month
          )
          or (
            not household_uses_staggered_issuance
            and cwd_issues_third_month_benefits_within_five_working_days_from_receipt_of_verification_or_by_first_day_of_third_month_whichever_is_later
          )

  - name: participation_termination_and_no_further_benefits_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.546(a), sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.546
              excerpt: "If verification is not provided before the end of the third month, the CWD shall terminate the household’s participation and shall issue no further benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          postponed_verification_third_month_rules_apply
          and household_has_not_provided_verification_before_end_of_third_month
