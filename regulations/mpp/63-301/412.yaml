format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.412
  summary: |-
    Delays that are the fault of the CWD include, but are not limited to, those cases where the CWD failed to take the action described above in Sections 63-301.411 (a through c).
rules:
  - name: cwd_fault_delay_for_failed_processing_actions
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.412
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.412
              excerpt: "Delays that are the fault of the CWD include, but are not limited to, those cases where the CWD failed to take the action described above in Sections 63-301.411 (a through c)."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          application_processing_delay_occurred and cwd_failed_to_take_action_described_under_section_63_301_411_a_through_c
