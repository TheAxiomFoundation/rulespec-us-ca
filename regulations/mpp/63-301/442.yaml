format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.442
  summary: |-
    (a) The CWD shall allow the household at least 10 days to take the required action specified on the notice of action informing them of the pending status of their application. However, if the CWD has chosen the option of holding the application pending only until 30 days following the date of the initial request for the particular verification that was missing, and verification is not received by that 30th day, the CWD may deny the application without further notice to the household. (b) If the household fails to take the required action specified on the notice of action informing them of the pending status of their application, the CWD shall deny the application without further notice to the household.
rules:
  - name: pending_notice_required_action_minimum_days
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.442(a), sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.442
              excerpt: "The CWD shall allow the household at least 10 days to take the required action specified on the notice of action informing them of the pending status of their application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: missing_verification_pending_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.442(a), sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.442
              excerpt: "if the CWD has chosen the option of holding the application pending only until 30 days following the date of the initial request for the particular verification that was missing"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: pending_status_notice_allows_required_action_period
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.442(a), sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.442
              excerpt: "The CWD shall allow the household at least 10 days to take the required action specified on the notice of action informing them of the pending status of their application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          days_allowed_to_take_required_action_on_pending_status_notice >= pending_notice_required_action_minimum_days

  - name: application_may_be_denied_without_further_notice_after_missing_verification_deadline
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.442(a), sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.442
              excerpt: "if the CWD has chosen the option of holding the application pending only until 30 days following the date of the initial request for the particular verification that was missing, and verification is not received by that 30th day, the CWD may deny the application without further notice to the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cwd_chose_option_to_hold_application_pending_only_until_missing_verification_deadline and
          days_following_initial_request_for_missing_verification >= missing_verification_pending_deadline_days and
          not missing_verification_received_by_deadline

  - name: application_must_be_denied_without_further_notice_for_failure_to_act
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.442(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.442
              excerpt: "If the household fails to take the required action specified on the notice of action informing them of the pending status of their application, the CWD shall deny the application without further notice to the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_fails_to_take_required_action_specified_on_pending_status_notice
