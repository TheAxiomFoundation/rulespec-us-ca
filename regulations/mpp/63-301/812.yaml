    corpus_citation_path: us-ca/regulation/mpp/63-301.812
  summary: |-
    The procedural and timeliness requirements that apply to the non-PA application process shall begin when the Food Stamp office receives the application. Since there may be a delay involved in the transferring of applications from GA offices to food stamp offices, households shall be advised that they may receive faster service if they take the application directly to the Food Stamp office.
