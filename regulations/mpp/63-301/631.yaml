format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.631
  summary: |-
    (a) If the PA determination is made within the 30-day processing standard and the household is considered categorically eligible as specified in Section 63-301.7, the CWD shall provide food stamp benefits for the initial month from the date of the food stamp application. (1) Benefits shall not be provided for any month in which a household is determined ineligible for receipt of PA benefits, unless the household is eligible to participate as a nonassistance (NA) case. (b) If the PA determination of eligibility is not made by the 30th day, the CWD shall process the application as a NA case using all food stamp eligibility and benefit criteria. However, the CWD shall not deny a potentially categorically eligible household until the 30th day. (1) If the NA case is denied, the notice of action shall inform the household to notify the CWD if its PA benefits are approved. (2) The CWD shall ensure that the denied application of a potentially categorically eligible household is easily retrievable in the event that PA benefits are subsequently approved.
rules:
  - name: pa_application_processing_standard_days
    kind: parameter
    dtype: Count
    period: Month
    source: 63-301.631(a), (b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.631
              excerpt: "If the PA determination is made within the 30-day processing standard"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.631
              excerpt: "If the PA determination of eligibility is not made by the 30th day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: pa_ineligible_month_food_stamp_benefits_prohibited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-301.631(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.631
              excerpt: "Benefits shall not be provided for any month in which a household is determined ineligible for receipt of PA benefits, unless the household is eligible to participate as a nonassistance (NA) case."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_determined_ineligible_for_pa_benefits_for_month
          and
          not household_eligible_to_participate_as_nonassistance_case_for_month

  - name: initial_month_food_stamp_benefits_from_application_date_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-301.631(a), (a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.631
              excerpt: "If the PA determination is made within the 30-day processing standard and the household is considered categorically eligible as specified in Section 63-301.7, the CWD shall provide food stamp benefits for the initial month from the date of the food stamp application."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.631
              excerpt: "Benefits shall not be provided for any month in which a household is determined ineligible for receipt of PA benefits, unless the household is eligible to participate as a nonassistance (NA) case."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_food_stamp_application
          and month_is_initial_month_from_date_of_food_stamp_application
          and pa_determination_days_after_food_stamp_application <= pa_application_processing_standard_days
          and household_considered_categorically_eligible_under_section_63_301_7
          and
          not pa_ineligible_month_food_stamp_benefits_prohibited

  - name: application_processed_as_nonassistance_case_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-301.631(b), sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.631
              excerpt: "If the PA determination of eligibility is not made by the 30th day, the CWD shall process the application as a NA case using all food stamp eligibility and benefit criteria."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_food_stamp_application
          and
          not pa_determination_of_eligibility_made_by_processing_standard_day

  - name: potentially_categorically_eligible_application_denial_prohibited_before_processing_standard_day
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-301.631(b), sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.631
              excerpt: "However, the CWD shall not deny a potentially categorically eligible household until the 30th day."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_food_stamp_application
          and potentially_categorically_eligible_household
          and current_food_stamp_application_processing_day_count < pa_application_processing_standard_days
