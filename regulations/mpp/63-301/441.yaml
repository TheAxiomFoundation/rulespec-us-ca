format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.441
  summary: |-
    (a) If the household is determined eligible, the CWD shall provide benefits to the household as follows: (1) If the CWD was at fault for the delay in the initial 30-day period, the household shall receive benefits retroactive to the date of application. (2) If the initial delay was the household's fault, the household shall receive benefits retroactive only to the date the CWD received verification that the household completed the required action. (b) If the household is determined ineligible, the CWD shall deny the application and provide the household with a notice of action denying their application.
rules:
  - name: initial_application_delay_period_days
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.441(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.441
              excerpt: "If the CWD was at fault for the delay in the initial 30-day period, the household shall receive benefits retroactive to the date of application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: benefits_retroactive_to_application_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
