format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.512
  summary: |-
    Migrant or seasonal farmworker households who are destitute as defined in Section 63-503.43 provided their liquid resources as defined in Section 63-501.11 do not exceed $100; or
rules:
  - name: migrant_or_seasonal_farmworker_liquid_resource_limit
    kind: parameter
    dtype: Money
    period: Day
    unit: USD
    source: 63-301.512, liquid resources clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.512
              excerpt: "provided their liquid resources as defined in Section 63-501.11 do not exceed $100"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100

  - name: destitute_migrant_or_seasonal_farmworker_household_liquid_resources_limited
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.512
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.512
              excerpt: "Migrant or seasonal farmworker households who are destitute as defined in Section 63-503.43"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.512
              excerpt: "provided their liquid resources as defined in Section 63-501.11 do not exceed $100"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (household_is_migrant_farmworker or household_is_seasonal_farmworker)
          and household_is_destitute_under_section_63_503_43
          and household_liquid_resources_under_section_63_501_11 <= migrant_or_seasonal_farmworker_liquid_resource_limit
