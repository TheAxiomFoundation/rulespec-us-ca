format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.547
  summary: |-
    (a) The CWD shall grant a postponement of the out-of-state verification for only the initial month, if a migrant farmworker household requesting expedited service has already received this exception during the current migrant farm season. (b) For purposes of this section, a migrant farm season is defined as having a clear beginning point and ending point between which migrant farmworkers travel. When they are not migrating to work they are residing at one location which they regard as home. In this case, the season would be the period during which the migrants are traveling to work. If a migrant farmworker travels constantly with no break period, the season shall be considered the calendar year.
