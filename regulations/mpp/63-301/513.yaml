format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.513
  summary: |-
    Households whose combined monthly gross income and liquid resources are less than the household's monthly rent or mortgage, and utilities.
rules:
  - name: combined_income_and_liquid_resources_below_shelter_costs
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: MPP 63-301.513
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.513
              excerpt: "Households whose combined monthly gross income and liquid resources are less than the household's monthly rent or mortgage, and utilities."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          monthly_gross_income + liquid_resources < monthly_rent_or_mortgage + monthly_utilities
