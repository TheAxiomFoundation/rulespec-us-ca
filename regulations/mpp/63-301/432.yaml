format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.432
  summary: |-
    If the household is determined eligible during the second 30-day period, the CWD shall provide benefits retroactive to the date of the application. If the household is determined ineligible during the second 30-day processing period the application shall be denied and the CWD shall provide the household with a notice of action denying their application.
rules:
  - name: retroactive_benefits_from_application_date_required
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.432, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.432
              excerpt: "If the household is determined eligible during the second 30-day period, the CWD shall provide benefits retroactive to the date of the application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_determined_eligible and determination_occurs_during_second_30_day_processing_period

