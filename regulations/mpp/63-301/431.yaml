format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.431
  summary: |-
    (a) If the case file is not complete enough to determine eligibility, the pending status notice of action shall indicate any action necessary by the household to complete the application process. FOOD STAMP REGULATIONS Regulations APPLICATION PROCESS 63-301 (Cont.) (b) If the household fails to respond, the CWD shall take action on the application during the second 30-day processing period as provided in Sections 63-301.422(a) and (b).
rules:
  - name: pending_status_notice_action_instruction_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.431(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.431
              excerpt: "If the case file is not complete enough to determine eligibility, the pending status notice of action shall indicate any action necessary by the household to complete the application process."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not case_file_not_complete_enough_to_determine_eligibility or pending_status_notice_indicates_any_household_action_necessary_to_complete_application_process

  - name: application_action_after_household_nonresponse_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.431(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.431
              excerpt: "If the household fails to respond, the CWD shall take action on the application during the second 30-day processing period as provided in Sections 63-301.422(a) and (b)."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_fails_to_respond or cwd_takes_action_on_application_during_required_second_processing_period
