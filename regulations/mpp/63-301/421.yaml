format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.421
  summary: |-
    (a) If the household fails to take the required action within 60 days following the date the application was filed, no further notice shall be provided by the CWD. FOOD STAMP REGULATIONS
rules:
  - name: required_action_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.421(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.421
              excerpt: "within 60 days following the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: cwd_no_further_notice_after_required_action_failure
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.421(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.421
              excerpt: "If the household fails to take the required action within 60 days following the date the application was filed, no further notice shall be provided by the CWD."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_failed_to_take_required_action and days_following_application_filed > required_action_deadline_days
