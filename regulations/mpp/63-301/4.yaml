format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.4
  summary: |-
    If the county welfare department does not determine a household's eligibility and provide an opportunity to participate within 30 days of the date the application was filed, the county welfare department shall take the following action:
rules:
  - name: application_processing_deadline_days
    kind: parameter
    dtype: Count
    period: Day
    source: 63-301.4, introductory clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.4
              excerpt: "within 30 days of the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: application_processing_deadline_missed
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.4, introductory clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.4
              excerpt: "If the county welfare department does not determine a household's eligibility and provide an opportunity to participate within 30 days of the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_application_filed
          and days_since_application_filed > application_processing_deadline_days
          and (
            not household_eligibility_determined
            or not opportunity_to_participate_provided
          )
