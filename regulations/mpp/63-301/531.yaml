format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.531
  summary: |-
    (a) For households entitled to expedited service at initial application, the CWD shall make the authorization document, access device or coupons available to the recipient either by mail or for pickup at the household's request, no later than the third calendar day following the date the application was filed. For purposes of this section, a weekend (Saturday and Sunday) shall be considered one calendar day. However, if the third calendar day is a nonworking day when coupons cannot be issued, the CWD shall make coupons available on or before the working day immediately preceding the nonworking day. Whatever system a CWD uses to ensure meeting this delivery standard shall be designed to allow a reasonable opportunity for redemption of an authorization document or use of an access device no later than the third calendar day following the day the application was filed.
    (b) For households that are being recertified or applying after less than a one-month break in certification and which are entitled to expedited service, the CWD shall make the authorization document, access device or coupons available to the recipient either by mail or for pick up at the household's request, no later than the third calendar day following the date the application is filed or by the household's normal issuance cycle in the new certification period, whichever is later. The third calendar day shall be determined in accordance with Section 63-301.531(a).
