format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.2
  summary: |-
    An opportunity to participate consists of providing households with coupons, an authorization document, or an access device and having an issuance facility open and available for the household to obtain its allotment. If the coupons, authorization document or access device are mailed, the CWD shall assure that the benefits can be transacted or the coupons are available for use after receipt but before the 30-day standard expires (see Section 63-102c.(5)). A household has not been provided an opportunity to participate if the coupons, authorization document or access device are mailed on the 29th or 30th day. Nor has an opportunity to participate been provided if the authorization document or access device is mailed on the 28th day but no issuance facility is open on the 30th day.
rules:
  - name: opportunity_to_participate_basic_requirements_met
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.2, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.2
              excerpt: "An opportunity to participate consists of providing households with coupons, an authorization document, or an access device and having an issuance facility open and available for the household to obtain its allotment."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (household_provided_coupons or household_provided_authorization_document or household_provided_access_device) and issuance_facility_open_and_available_for_household_to_obtain_allotment

  - name: mailing_timing_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.2, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.2
              excerpt: "If the coupons, authorization document or access device are mailed, the CWD shall assure that the benefits can be transacted or the coupons are available for use after receipt but before the 30-day standard expires"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not coupons_authorization_document_or_access_device_mailed) or benefits_can_be_transacted_after_receipt_before_30_day_standard_expires or coupons_available_for_use_after_receipt_before_30_day_standard_expires

  - name: authorization_or_access_day_28_no_day_30_facility_precludes_opportunity_to_participate
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.2, sentence 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.2
              excerpt: "Nor has an opportunity to participate been provided if the authorization document or access device is mailed on the 28th day but no issuance facility is open on the 30th day."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          authorization_document_or_access_device_mailed_on_28th_day and no_issuance_facility_open_on_30th_day

  - name: opportunity_to_participate_provided
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-301.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.2
              excerpt: "An opportunity to participate consists of providing households with coupons, an authorization document, or an access device and having an issuance facility open and available for the household to obtain its allotment."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.2
              excerpt: "If the coupons, authorization document or access device are mailed, the CWD shall assure that the benefits can be transacted or the coupons are available for use after receipt but before the 30-day standard expires"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.2
              excerpt: "A household has not been provided an opportunity to participate if the coupons, authorization document or access device are mailed on the 29th or 30th day."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.2
              excerpt: "Nor has an opportunity to participate been provided if the authorization document or access device is mailed on the 28th day but no issuance facility is open on the 30th day."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          opportunity_to_participate_basic_requirements_met
          and mailing_timing_requirement_satisfied
          and not coupons_authorization_document_or_access_device_mailed_on_29th_or_30th_day
          and not authorization_or_access_day_28_no_day_30_facility_precludes_opportunity_to_participate
