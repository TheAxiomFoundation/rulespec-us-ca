format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-301.733
  summary: |-
    The household shall include all persons who purchase and prepare food together in one food stamp household regardless of whether or not they are separate units for PA purposes.
rules:
  - name: person_included_in_food_stamp_household_when_purchasing_and_preparing_together
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-301.733
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-301.733
              excerpt: "The household shall include all persons who purchase and prepare food together in one food stamp household regardless of whether or not they are separate units for PA purposes."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_purchases_and_prepares_food_together_in_one_food_stamp_household and (person_is_separate_unit_for_pa_purposes or not person_is_separate_unit_for_pa_purposes)
