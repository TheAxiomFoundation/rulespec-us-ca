format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.211
  summary: |-
    (a) The food stamp recipient shall submit documentation verifying the number of hours worked. Section 63-410.211(a)(1)(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director's QR/PB Declaration. (QR) (1) A food stamp recipient who is satisfying the ABAWD work requirement through employment must report within 10 days when hours of work drop to below 20 hours per week or 80 hours per month. This mandatory recipient mid-quarter reporting requirement does not apply to persons who meet one of the exemptions at Section 63-410.3 or live in a county with an approved ABAWD waiver. Persons who are satisfying the ABAWD work requirement through a combination of education/training and employment of less than 20 hours per week are not subject to the mid-quarter requirement when hours of employment are reduced. (b) Hours worked for in-kind income shall count toward the 20-hour weekly minimum if the food stamp recipient provides documentation, such as pay stubs, verifying that the in-kind income being reported was an actual benefit received from the employer.
rules:
  - name: abawd_work_hours_drop_report_deadline_days
    kind: parameter
    dtype: Integer
    source: 63-410.211(a)(1)(QR), report deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.211
              excerpt: "must report within 10 days when hours of work drop to below 20 hours per week or 80 hours per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: abawd_weekly_work_hours_minimum
    kind: parameter
    dtype: Integer
    source: 63-410.211(a)(1)(QR), (b), weekly hours minimum
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.211
              excerpt: "below 20 hours per week"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.211
              excerpt: "Hours worked for in-kind income shall count toward the 20-hour weekly minimum"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: abawd_monthly_work_hours_minimum
    kind: parameter
    dtype: Integer
    source: 63-410.211(a)(1)(QR), monthly hours minimum
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.211
              excerpt: "below 20 hours per week or 80 hours per month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          80

  - name: abawd_combination_education_training_employment_reduction_mid_quarter_reporting_exception
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 63-410.211(a)(1)(QR), education/training and employment exception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.211
              excerpt: "Persons who are satisfying the ABAWD work requirement through a combination of education/training and employment of less than 20 hours per week are not subject to the mid-quarter requirement when hours of employment are reduced."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_satisfies_abawd_work_requirement_through_combination_of_education_training_and_employment
          and hours_of_employment_are_reduced
          and weekly_employment_hours_after_drop < abawd_weekly_work_hours_minimum

  - name: abawd_employment_hours_drop_mid_quarter_report_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 63-410.211(a)(1)(QR), mandatory mid-quarter reporting requirement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.211
              excerpt: "Section 63-410.211(a)(1)(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director's QR/PB Declaration."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.211
              excerpt: "A food stamp recipient who is satisfying the ABAWD work requirement through employment must report within 10 days when hours of work drop to below 20 hours per week or 80 hours per month."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.211
              excerpt: "This mandatory recipient mid-quarter reporting requirement does not apply to persons who meet one of the exemptions at Section 63-410.3 or live in a county with an approved ABAWD waiver."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.211
              excerpt: "Persons who are satisfying the ABAWD work requirement through a combination of education/training and employment of less than 20 hours per week are not subject to the mid-quarter requirement when hours of employment are reduced."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          qr_pb_effective_in_county_under_directors_declaration
          and food_stamp_recipient_satisfying_abawd_work_requirement_through_employment
          and hours_of_work_dropped
          and ((weekly_employment_hours_after_drop < abawd_weekly_work_hours_minimum) or (monthly_work_hours_after_drop < abawd_monthly_work_hours_minimum))
          and not person_meets_exemption_under_section_63_410_3
          and not county_has_approved_abawd_waiver
          and not abawd_combination_education_training_employment_reduction_mid_quarter_reporting_exception

  - name: abawd_employment_hours_drop_mid_quarter_reporting_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 63-410.211(a)(1)(QR), report within deadline
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.211
              excerpt: "A food stamp recipient who is satisfying the ABAWD work requirement through employment must report within 10 days when hours of work drop to below 20 hours per week or 80 hours per month."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.211
              excerpt: "This mandatory recipient mid-quarter reporting requirement does not apply to persons who meet one of the exemptions at Section 63-410.3 or live in a county with an approved ABAWD waiver."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not abawd_employment_hours_drop_mid_quarter_report_required
          or days_after_work_hours_drop_recipient_reported <= abawd_work_hours_drop_report_deadline_days

  - name: in_kind_income_hours_count_toward_abawd_weekly_minimum
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: 63-410.211(b), in-kind income hours
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.211
              excerpt: "Hours worked for in-kind income shall count toward the 20-hour weekly minimum if the food stamp recipient provides documentation, such as pay stubs, verifying that the in-kind income being reported was an actual benefit received from the employer."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          food_stamp_recipient_has_hours_worked_for_in_kind_income
          and food_stamp_recipient_provides_documentation_verifying_in_kind_income_actual_benefit_received_from_employer
