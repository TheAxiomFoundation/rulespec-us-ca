format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.14
  summary: |-
    FOOD STAMP REGULATIONS ADULTS WITHOUT DEPENDENTS (ABAWD) (Continued) HANDBOOK BEGINS HERE Example - An individual applies for food stamps for the first time in March 1997 and is determined exempt from the ABAWD work requirement. The individual’s exemption ends during December 1997 and he becomes subject to the ABAWD work requirement as of January 1, 1998. The county would track the individual’s ABAWD compliance or exemption status for all months food stamps are received during the 36-month period which began January 1, 1998 and ends December 31, 2000. HANDBOOK ENDS HERE
rules:
  - name: abawd_tracking_period_length_months
    kind: parameter
    dtype: Integer
    source: MPP 63-410.14, handbook example
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.14
              excerpt: "The county would track the individual’s ABAWD compliance or exemption status for all months food stamps are received during the 36-month period which began January 1, 1998 and ends December 31, 2000."
    versions:
      - effective_from: '1998-01-01'
        formula: |-
          36

  - name: county_tracks_abawd_compliance_or_exemption_status_for_food_stamp_month
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-410.14, handbook example
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.14
              excerpt: "The county would track the individual’s ABAWD compliance or exemption status for all months food stamps are received during the 36-month period which began January 1, 1998 and ends December 31, 2000."
    versions:
