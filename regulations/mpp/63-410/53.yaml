format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.53
  summary: |-
    Notwithstanding any other provision of this section, when an individual fails without good cause to comply with an ABAWD work requirement and the noncompliance is a sanctionable action under Section 63-407 or Section 63-408, the individual may not reestablish eligibility until the minimum sanction period identified in Section 63-407.53 is completed.
rules:
  - name: abawd_sanction_blocks_eligibility_reestablishment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-410.53, operative sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.53
              excerpt: Notwithstanding any other provision of this section, when an individual fails without good cause to comply with an ABAWD work requirement and the noncompliance is a sanctionable action under Section 63-407 or Section 63-408, the individual may not reestablish eligibility until the minimum sanction period identified in Section 63-407.53 is completed.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_failed_without_good_cause_to_comply_with_abawd_work_requirement
          and (
            noncompliance_is_sanctionable_action_under_section_63_407
            or noncompliance_is_sanctionable_action_under_section_63_408
          )
          and
          not minimum_sanction_period_identified_in_section_63_407_53_completed
