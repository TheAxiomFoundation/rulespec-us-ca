format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.6
  summary: |-
    (QR) Treatment of ABAWD Months for Quarterly Reporting (QR) .61 A county shall take a county-initiated mid-quarter action to discontinue a case whenever an ABAWD uses up three out of 36 months. A county-initiated action shall also be taken when an ABAWD's three consecutive-month period identified in Section 63-410.52 is completed and to an ABAWD who has regained eligibility and subsequently stops meeting the work requirement.
rules:
  - name: abawd_time_limit_months
    kind: parameter
    dtype: Count
    source: 63-410.6, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.6
              excerpt: "whenever an ABAWD uses up three out of 36 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: abawd_time_limit_window_months
    kind: parameter
    dtype: Count
    source: 63-410.6, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.6
              excerpt: "whenever an ABAWD uses up three out of 36 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          36

  - name: abawd_consecutive_month_period_under_section_63_410_52_months
    kind: parameter
    dtype: Count
    source: 63-410.6, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.6
              excerpt: "when an ABAWD's three consecutive-month period identified in Section 63-410.52 is completed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: county_initiated_mid_quarter_discontinuance_required_for_abawd_case
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-410.6
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.6
              excerpt: "A county shall take a county-initiated mid-quarter action to discontinue a case whenever an ABAWD uses up three out of 36 months."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.6
              excerpt: "A county-initiated action shall also be taken when an ABAWD's three consecutive-month period identified in Section 63-410.52 is completed"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.6
              excerpt: "and to an ABAWD who has regained eligibility and subsequently stops meeting the work requirement."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (abawd_countable_month_window_months == abawd_time_limit_window_months and abawd_countable_months_used_in_window >= abawd_time_limit_months)
          or abawd_consecutive_months_completed_under_section_63_410_52 >= abawd_consecutive_month_period_under_section_63_410_52_months
          or (abawd_has_regained_eligibility and abawd_subsequently_stops_meeting_work_requirement)
