  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.13
  summary: |-
    A county is not required to begin tracking an individual’s food stamp eligibility based on compliance with, or exemption from, the ABAWD work requirement until the first month of the 36-month period identified in Section 63-410.11.
