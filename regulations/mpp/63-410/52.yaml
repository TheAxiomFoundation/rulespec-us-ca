format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.52
  summary: |-
    When, during the 36-month calendar period identified in Section 63-410.1, an individual stops performing the ABAWD work requirement after regaining eligibility in accordance with Section 63-410.51, the individual shall remain eligible for food stamps for a period of three consecutive countable months, beginning on the first month following the date the individual notifies the CWD or the CWD learns that the individual is not satisfying the ABAWD work requirement. The CWD shall provide a 10-day notice informing the individual of his/her change in status. If the individual has been meeting the ABAWD work requirement by participating in county workfare or another allowable work activity as specified in Section 63-410.213, the three consecutive countable months shall start the first month following the date the CWD notifies the individual that he/she is no longer meeting the ABAWD work requirement.
rules:
  - name: abawd_calendar_period_month_limit
    kind: parameter
    dtype: Count
    source: 63-410.52, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.52
              excerpt: "during the 36-month calendar period identified in Section 63-410.1"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          36

  - name: abawd_regained_eligibility_continued_eligibility_countable_month_limit
    kind: parameter
    dtype: Count
    source: 63-410.52, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.52
              excerpt: "the individual shall remain eligible for food stamps for a period of three consecutive countable months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: abawd_change_status_notice_day_limit
    kind: parameter
    dtype: Count
    source: 63-410.52, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.52
              excerpt: "The CWD shall provide a 10-day notice informing the individual of his/her change in status."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: abawd_regained_eligibility_continues_for_countable_month
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-410.52, eligibility continuation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.52
              excerpt: "When, during the 36-month calendar period identified in Section 63-410.1, an individual stops performing the ABAWD work requirement after regaining eligibility in accordance with Section 63-410.51"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.52
              excerpt: "the individual shall remain eligible for food stamps for a period of three consecutive countable months, beginning on the first month following the date the individual notifies the CWD or the CWD learns that the individual is not satisfying the ABAWD work requirement."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.52
              excerpt: "If the individual has been meeting the ABAWD work requirement by participating in county workfare or another allowable work activity as specified in Section 63-410.213, the three consecutive countable months shall start the first month following the date the CWD notifies the individual that he/she is no longer meeting the ABAWD work requirement."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          abawd_calendar_month_number_in_period_identified_under_section_63_410_1 >= 1 and
          abawd_calendar_month_number_in_period_identified_under_section_63_410_1 <= abawd_calendar_period_month_limit and
          individual_stopped_performing_abawd_work_requirement_after_regaining_eligibility_under_section_63_410_51 and
          (
            (
              not individual_met_abawd_work_requirement_by_county_workfare_or_allowable_work_activity_under_section_63_410_213 and
              countable_month_number_after_individual_notifies_cwd_or_cwd_learns_not_satisfying_abawd_work_requirement >= 1 and
              countable_month_number_after_individual_notifies_cwd_or_cwd_learns_not_satisfying_abawd_work_requirement <= abawd_regained_eligibility_continued_eligibility_countable_month_limit
            )
            or
            (
              individual_met_abawd_work_requirement_by_county_workfare_or_allowable_work_activity_under_section_63_410_213 and
              countable_month_number_after_cwd_notifies_individual_no_longer_meeting_abawd_work_requirement >= 1 and
              countable_month_number_after_cwd_notifies_individual_no_longer_meeting_abawd_work_requirement <= abawd_regained_eligibility_continued_eligibility_countable_month_limit
            )
          )

  - name: cwd_abawd_change_status_notice_days_required
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: 63-410.52, notice sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.52
              excerpt: "When, during the 36-month calendar period identified in Section 63-410.1, an individual stops performing the ABAWD work requirement after regaining eligibility in accordance with Section 63-410.51"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.52
              excerpt: "The CWD shall provide a 10-day notice informing the individual of his/her change in status."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if abawd_calendar_month_number_in_period_identified_under_section_63_410_1 >= 1 and abawd_calendar_month_number_in_period_identified_under_section_63_410_1 <= abawd_calendar_period_month_limit and individual_stopped_performing_abawd_work_requirement_after_regaining_eligibility_under_section_63_410_51: abawd_change_status_notice_day_limit else: 0
