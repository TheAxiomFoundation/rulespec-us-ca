format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.221
  summary: |-
    If an individual works an average of 80 hours per month but missed some scheduled work for a circumstance beyond his/her control and the absence is temporary and the individual retains his/her job, the individual shall have met the ABAWD work requirement for the month. As defined in Section 63-407.5, good cause for circumstances beyond the individual’s control includes, but is not limited to, illness, illness of another household member requiring the presence of the ABAWD, a household emergency, or the unavailability of transportation.
rules:
  - name: abawd_monthly_work_hours_average_threshold
    kind: parameter
    dtype: Decimal
    source: MPP 63-410.221, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.221
              excerpt: works an average of 80 hours per month
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          80

  - name: abawd_good_cause_circumstance_beyond_control
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-410.221, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.221
              excerpt: good cause for circumstances beyond the individual’s control includes, but is not limited to, illness, illness of another household member requiring the presence of the ABAWD, a household emergency, or the unavailability of transportation
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          abawd_absence_due_to_illness
          or abawd_absence_due_to_household_member_illness_requiring_presence
          or abawd_absence_due_to_household_emergency
          or abawd_absence_due_to_unavailability_of_transportation
          or abawd_absence_due_to_other_circumstance_beyond_control

  - name: abawd_temporary_good_cause_absence_with_job_retained
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-410.221, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.221
              excerpt: If an individual works an average of 80 hours per month but missed some scheduled work for a circumstance beyond his/her control and the absence is temporary and the individual retains his/her job, the individual shall have met the ABAWD work requirement for the month.
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.221
              excerpt: good cause for circumstances beyond the individual’s control includes, but is not limited to, illness, illness of another household member requiring the presence of the ABAWD, a household emergency, or the unavailability of transportation
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_average_work_hours_per_month >= abawd_monthly_work_hours_average_threshold
          and abawd_missed_scheduled_work
          and abawd_good_cause_circumstance_beyond_control
          and abawd_absence_is_temporary
          and abawd_retains_job
