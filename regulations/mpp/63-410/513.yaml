format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.513
  summary: |-
    Participates in an allowable work program as defined in Section 63-410.213 for at least 80 hours.
rules:
  - name: allowable_work_program_minimum_hours
    kind: parameter
    dtype: Count
    source: MPP 63-410.513, "at least 80 hours"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.513
              excerpt: "Participates in an allowable work program as defined in Section 63-410.213 for at least 80 hours."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          80

  - name: allowable_work_program_participation_hours_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-410.513, operative text
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.513
              excerpt: "Participates in an allowable work program as defined in Section 63-410.213 for at least 80 hours."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          participates_in_allowable_work_program_under_section_63_410_213
          and allowable_work_program_participation_hours >= allowable_work_program_minimum_hours
