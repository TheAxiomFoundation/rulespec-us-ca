format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.323
  summary: |-
    Any adult living in a household that contains a dependent child.
rules:
  - name: adult_living_in_household_with_dependent_child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-410.323
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.323
              excerpt: "Any adult living in a household that contains a dependent child."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_adult and
          person_lives_in_household and
          household_contains_dependent_child
