format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.213
  summary: |-
    (a) A program under the Job Training Partnership Act; (b) A program under Section 236 of the Trade Act of 1974 (19 U.S.C. 2296); or (c) A program of employment and training approved by a state agency, including the Food Stamp Employment and Training (FSET) program described in Section 63-407.8, and refugee employability services identified in 45 CFR 400.154. (1) Hours spent in job search or job search training activities identified in Section 63-407.841(a) shall not count toward completion of the ABAWD work requirement.
rules:
  - name: abawd_employment_training_program_qualifies_for_work_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-410.213(a)-(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.213
              excerpt: "(a) A program under the Job Training Partnership Act;"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.213
              excerpt: "(b) A program under Section 236 of the Trade Act of 1974 (19 U.S.C. 2296);"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.213
              excerpt: "(c) A program of employment and training approved by a state agency, including the Food Stamp Employment and Training (FSET) program described in Section 63-407.8, and refugee employability services identified in 45 CFR 400.154."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_participates_in_job_training_partnership_act_program or
          person_participates_in_trade_act_section_236_program or
          person_participates_in_state_agency_approved_employment_training_program_including_fset_or_refugee_employability_services
  - name: abawd_employment_training_program_hours_count_toward_work_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-410.213(a)-(c), (c)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.213
              excerpt: "(a) A program under the Job Training Partnership Act; (b) A program under Section 236 of the Trade Act of 1974 (19 U.S.C. 2296); or (c) A program of employment and training approved by a state agency"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.213
              excerpt: "(1) Hours spent in job search or job search training activities identified in Section 63-407.841(a) shall not count toward completion of the ABAWD work requirement."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          abawd_employment_training_program_qualifies_for_work_requirement and
          not hours_spent_in_job_search_or_job_search_training_activities_identified_in_section_63_407_841_a
