format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.413
  summary: |-
    Provide that for any of the three countable months identified in Section 63-410.412 evidence may be presented that demonstrates the individual met or was exempt from the ABAWD work requirement, or that good cause existed in accordance with Section 63-410.221; and
rules:
  - name: abawd_countable_month_evidence_presentation_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-410.413
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.413
              excerpt: "for any of the three countable months identified in Section 63-410.412 evidence may be presented that demonstrates the individual met or was exempt from the ABAWD work requirement, or that good cause existed in accordance with Section 63-410.221"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          one_of_three_countable_months_identified_under_section_63_410_412 and (
            evidence_demonstrates_individual_met_abawd_work_requirement
            or evidence_demonstrates_individual_exempt_from_abawd_work_requirement
            or evidence_demonstrates_good_cause_existed_under_section_63_410_221
          )
