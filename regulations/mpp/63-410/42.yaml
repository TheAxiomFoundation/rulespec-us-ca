  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.42
  summary: |-
    If the ABAWD provides evidence that demonstrates he/she should not lose food stamp eligibility, the CWD shall rescind the notice and restore any benefits that were inappropriately withheld.
rules:
