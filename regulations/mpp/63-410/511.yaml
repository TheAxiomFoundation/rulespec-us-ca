format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.511
  summary: |-
    Works for 80 or more hours;
rules:
  - name: minimum_work_hours
    kind: parameter
    dtype: Integer
    source: 63-410.511
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.511
              excerpt: "Works for 80 or more hours;"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          80

  - name: works_for_minimum_hours
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-410.511
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.511
              excerpt: "Works for 80 or more hours;"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hours_worked >= minimum_work_hours
