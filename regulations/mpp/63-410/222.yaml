format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.222
  summary: |-
    An indiviual satisfying the ABAWD work requirement through FSET, who missed scheduled work in a month for a circumstance beyond his/her control provided in Section 63-410.221, shall have met the ABAWD work requirement and complied with the FSET assignment for that month.
