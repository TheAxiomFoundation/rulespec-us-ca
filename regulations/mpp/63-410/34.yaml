format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.34
  summary: |-
    Individuals who qualify for the 15 percent ABAWD exemption determined by the CWD. The number of individuals, who can be exempted by a CWD each year under this section, and the duration of these exemptions, are limited to the number of ABAWD exemption months allocated each year by CDSS to each CWD.
rules:
  - name: abawd_exemption_percentage
    kind: parameter
    dtype: Rate
    source: 63-410.34, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.34
              excerpt: "Individuals who qualify for the 15 percent ABAWD exemption determined by the CWD."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.15

  - name: individual_qualifies_for_cwd_determined_fifteen_percent_abawd_exemption_within_cdss_month_allocation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-410.34
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.34
              excerpt: "Individuals who qualify for the 15 percent ABAWD exemption determined by the CWD."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.34
              excerpt: "The number of individuals, who can be exempted by a CWD each year under this section, and the duration of these exemptions, are limited to the number of ABAWD exemption months allocated each year by CDSS to each CWD."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cwd_determines_individual_qualifies_for_fifteen_percent_abawd_exemption and
          annual_cwd_abawd_exemption_months_needed_under_section <= annual_abawd_exemption_months_allocated_by_cdss_to_cwd
