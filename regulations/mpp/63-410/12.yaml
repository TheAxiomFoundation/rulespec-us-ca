format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.12
  summary: |-
    The period identified in Section 63-410.11 is a fixed period which continues uninterrupted for 36 months regardless of the number of times an individual becomes exempt in accordance with Section 63-410.3 or leaves the Food Stamp Program and subsequently reapplies.
rules:
  - name: fixed_period_duration_months
    kind: parameter
    dtype: Integer
    source: 63-410.12, fixed period duration
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.12
              excerpt: "fixed period which continues uninterrupted for 36 months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          36

  - name: food_stamp_program_fixed_period_duration_months
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    source: 63-410.12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.12
              excerpt: "The period identified in Section 63-410.11 is a fixed period"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.12
              excerpt: "continues uninterrupted for 36 months"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.12
              excerpt: "regardless of the number of times an individual becomes exempt in accordance with Section 63-410.3 or leaves the Food Stamp Program and subsequently reapplies"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if period_identified_under_section_63_410_11 and (individual_becomes_exempt_in_accordance_with_section_63_410_3 or not individual_becomes_exempt_in_accordance_with_section_63_410_3) and (individual_leaves_food_stamp_program_and_subsequently_reapplies or not individual_leaves_food_stamp_program_and_subsequently_reapplies): fixed_period_duration_months else: 0
