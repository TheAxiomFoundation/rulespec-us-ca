format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.43
  summary: |-
    The period of ineligibility shall begin with the first full month following expiration of the adverse notice period, unless a state hearing is requested. If a state hearing is requested, benefits shall continue in accordance with Section 63-804.6.
