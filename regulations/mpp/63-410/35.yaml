format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.35
  summary: |-
    Those months during which an individual is exempt for all or part of the month, in accordance with Section 63-410.3, shall not be considered in determining whether the participation requirement identified in Section 63-410 has been satisfied.
