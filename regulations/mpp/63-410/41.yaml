format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.41
  summary: |-
    When the CWD determines that an individual has failed to meet the ABAWD work requirement for three countable months during the 36-month period identified in Section 63-410.1, the CWD shall issue a timely notice in the third month to discontinue the individual’s food stamp benefits. In addition to the timely and adequate requirements specified in Section 63-504.21, the notice shall:
rules:
  - name: abawd_countable_months_failure_limit_for_discontinuance_notice
    kind: parameter
    dtype: Count
    source: MPP 63-410.41, trigger condition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.41
              excerpt: "failed to meet the ABAWD work requirement for three countable months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: abawd_work_requirement_period_months_identified_in_section_63_410_1
    kind: parameter
    dtype: Count
    source: MPP 63-410.41, cross-referenced period
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.41
              excerpt: "during the 36-month period identified in Section 63-410.1"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          36

  - name: abawd_discontinuance_notice_month_ordinal
    kind: parameter
    dtype: Count
    source: MPP 63-410.41, notice timing
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.41
              excerpt: "the CWD shall issue a timely notice in the third month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: abawd_discontinuance_notice_required_in_third_countable_month
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-410.41, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.41
              excerpt: "When the CWD determines that an individual has failed to meet the ABAWD work requirement for three countable months during the 36-month period identified in Section 63-410.1"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.41
              excerpt: "the CWD shall issue a timely notice in the third month to discontinue the individual’s food stamp benefits"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cwd_determines_individual_failed_to_meet_abawd_work_requirement
          and abawd_work_requirement_failed_countable_months_during_section_63_410_1_period == abawd_countable_months_failure_limit_for_discontinuance_notice
          and abawd_countable_month_ordinal_for_notice == abawd_discontinuance_notice_month_ordinal
