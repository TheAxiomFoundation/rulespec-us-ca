format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-410.431
  summary: |-
    Each individual has a right to a state hearing to appeal a termination or reduction of benefits due to a determination of nonexempt status, or a determination of failure to satisfy the ABAWD work requirement.
rules:
  - name: state_hearing_right_for_abawd_related_benefit_termination_or_reduction
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-410.431
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-410.431
              excerpt: Each individual has a right to a state hearing to appeal a termination or reduction of benefits due to a determination of nonexempt status, or a determination of failure to satisfy the ABAWD work requirement.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          benefit_termination_due_to_nonexempt_status_determination
          or benefit_reduction_due_to_nonexempt_status_determination
          or benefit_termination_due_to_failure_to_satisfy_abawd_work_requirement_determination
          or benefit_reduction_due_to_failure_to_satisfy_abawd_work_requirement_determination
