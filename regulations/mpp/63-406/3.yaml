format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-406.3
  summary: |-
    Any student as defined in Section 63-406.1 who does not meet the eligibility criteria of Section 63-406.2 shall be considered an excluded household member. The income and resources of an ineligible student shall be treated in accordance with Section 63-503.45.
rules:
  - name: ineligible_student_excluded_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-406.3, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.3
              excerpt: Any student as defined in Section 63-406.1 who does not meet the eligibility criteria of Section 63-406.2 shall be considered an excluded household member.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_student_under_section_63_406_1
          and
          not person_meets_student_eligibility_criteria_under_section_63_406_2

  - name: ineligible_student_income_and_resources_subject_to_section_63_503_45_treatment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-406.3, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.3
              excerpt: Any student as defined in Section 63-406.1 who does not meet the eligibility criteria of Section 63-406.2 shall be considered an excluded household member.
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.3
              excerpt: The income and resources of an ineligible student shall be treated in accordance with Section 63-503.45.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_student_under_section_63_406_1
          and
          not person_meets_student_eligibility_criteria_under_section_63_406_2
