format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-406.214
  summary: |-
    Be exerting parental control over a dependent household member who has reached age six but is under age 12 and the CWD has determined on a case-by-case basis that adequate child care services are not available (See Section 63-406.23) to enable the individual to attend class and work 20 hours per week or participate in a state or federally financed work study program during the regular school year.
rules:
  - name: dependent_household_member_parental_control_minimum_age
    kind: parameter
    dtype: Integer
    source: MPP 63-406.214, age-six clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.214
              excerpt: "dependent household member who has reached age six"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6

  - name: dependent_household_member_parental_control_exclusive_maximum_age
    kind: parameter
    dtype: Integer
    source: MPP 63-406.214, under-age-12 clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.214
              excerpt: "but is under age 12"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: class_and_work_minimum_weekly_hours
    kind: parameter
    dtype: Integer
    source: MPP 63-406.214, work-hours clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.214
              excerpt: "attend class and work 20 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20

  - name: parental_control_child_care_unavailable_for_class_work_or_work_study
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-406.214
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.214
              excerpt: "Be exerting parental control over a dependent household member who has reached age six but is under age 12"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.214
              excerpt: "the CWD has determined on a case-by-case basis that adequate child care services are not available (See Section 63-406.23)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.214
              excerpt: "to enable the individual to attend class and work 20 hours per week or participate in a state or federally financed work study program during the regular school year"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_exerts_parental_control_over_dependent_household_member and
          dependent_household_member_age >= dependent_household_member_parental_control_minimum_age and
          dependent_household_member_age < dependent_household_member_parental_control_exclusive_maximum_age and
          cwd_determined_adequate_child_care_services_not_available_under_section_63_406_23 and
          (
            (individual_attends_class and individual_work_hours_per_week >= class_and_work_minimum_weekly_hours) or
            individual_participates_in_state_or_federally_financed_work_study_program_during_regular_school_year
          )
