format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-406.121
  summary: |-
    If mental or physical unfitness for employment is claimed and the unfitness is not evident to the CWD, verification shall be required. Appropriate verification may consist of receipt of temporary or permanent disability benefits issued by governmental or private sources, or a statement from a physician or licensed or certified psychologist.
rules:
  - name: mental_or_physical_unfitness_verification_required
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-406.121, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.121
              excerpt: If mental or physical unfitness for employment is claimed and the unfitness is not evident to the CWD, verification shall be required.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          mental_or_physical_unfitness_for_employment_is_claimed
          and
          not mental_or_physical_unfitness_for_employment_evident_to_cwd
  - name: source_stated_appropriate_unfitness_verification_present
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-406.121, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.121
              excerpt: Appropriate verification may consist of receipt of temporary or permanent disability benefits issued by governmental or private sources, or a statement from a physician or licensed or certified psychologist.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_receipt_of_temporary_or_permanent_disability_benefits_from_governmental_or_private_source
          or person_has_statement_from_physician_or_licensed_or_certified_psychologist
