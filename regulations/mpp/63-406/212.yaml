format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-406.212
  summary: |-
    The exemption begins the month the school term starts or the month work study is approved, whichever is later. The exemption continues until the end of the month the school term ends, or it becomes known that the student refused a work assignment. The exemption shall not continue between terms when there is a break of a full month or longer unless the student is participating in work study during the break.
rules:
  - name: student_work_study_exemption_period_active
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-406.212
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.212
              excerpt: The exemption begins the month the school term starts or the month work study is approved, whichever is later.
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.212
              excerpt: The exemption continues until the end of the month the school term ends, or it becomes known that the student refused a work assignment.
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.212
              excerpt: The exemption shall not continue between terms when there is a break of a full month or longer unless the student is participating in work study during the break.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          current_month_is_on_or_after_later_of_school_term_start_and_work_study_approval_months and
          not student_refused_work_assignment_known and
          (
            current_month_is_within_school_term_through_month_school_term_ends or
            (
              current_month_is_between_terms and
              (
                not break_between_terms_is_full_month_or_longer or
                student_participating_in_work_study_during_break
              )
            )
          )
