format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-406.217
  summary: |-
    This provision applies when only one of the child’s(ren’s) natural, adoptive or stepparents, regardless of marital status, is in the same food stamp household as the child(ren). "Regardless of marital status" means that the parent could be single (never married), a widow or widower, separated, divorced, or married and living in a separate household from the other parent. HANDBOOK BEGINS HERE Example (a) If one natural parent and a stepparent are living with the child, neither the natural parent nor the stepparent could qualify for the student exemption. HANDBOOK ENDS HERE If no natural, adoptive or stepparent is in the same food stamp household as the child, another full-time student in the same food stamp household as the child may qualify for eligible student status if he or she has parental control over the child and is not living with his or her spouse.
rules:
  - name: one_parent_same_household_student_exemption_condition
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-406.217, first sentence and Example (a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.217
              excerpt: This provision applies when only one of the child’s(ren’s) natural, adoptive or stepparents, regardless of marital status, is in the same food stamp household as the child(ren).
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.217
              excerpt: If one natural parent and a stepparent are living with the child, neither the natural parent nor the stepparent could qualify for the student exemption.
    versions:
