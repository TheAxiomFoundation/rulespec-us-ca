format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-406.11
  summary: |-
    Any person who is age 18 through 49; physically and mentally fit for employment; and enrolled at least half-time, as defined by the institution, in an institution of higher education (as defined in Section 63-406.111(a)), shall be ineligible to participate in the Food Stamp Program unless that person complies with the eligibility requirements as specified in Section 63-406.2.
rules:
  - name: higher_education_student_minimum_age
    kind: parameter
    dtype: Integer
    source: MPP 63-406.11, phrase "age 18 through 49"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.11
              excerpt: "Any person who is age 18 through 49"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: higher_education_student_maximum_age
    kind: parameter
    dtype: Integer
    source: MPP 63-406.11, phrase "age 18 through 49"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.11
              excerpt: "Any person who is age 18 through 49"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          49

  - name: higher_education_student_food_stamp_ineligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-406.11, operative sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.11
              excerpt: "Any person who is age 18 through 49; physically and mentally fit for employment; and enrolled at least half-time, as defined by the institution, in an institution of higher education (as defined in Section 63-406.111(a)), shall be ineligible to participate in the Food Stamp Program unless that person complies with the eligibility requirements as specified in Section 63-406.2."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age >= higher_education_student_minimum_age
          and person_age <= higher_education_student_maximum_age
          and person_physically_and_mentally_fit_for_employment
          and person_enrolled_at_least_half_time_in_institution_of_higher_education_under_section_63_406_111_a
          and
          not person_complies_with_eligibility_requirements_under_section_63_406_2
