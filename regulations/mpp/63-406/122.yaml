format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-406.122
  summary: |-
    HANDBOOK BEGINS HERE Example (a) A man is involved in a six-month on-the-job training program at a vocational school that normally requires a high school diploma. During the first three months of the program he engages exclusively in full-time, on-site classroom instruction, to prepare him to work in the shop area. He must meet one of the student eligibility requirements as specified in Section 63-406.21 to be eligible to receive food stamps because he is a student at an institution of higher education as specified in Sections 63-406.111 and .111(a)(1). Example (b) A man is involved in a six-month on-the-job training program at a vocational school that normally requires a high school diploma. He spends the first four hours each day in classroom instruction and the second four hours in the shop, applying what he learned on the job. He does not have to meet the student eligibility requirements as specified in Section 63-406.21 because he is engaged in on-the-job training and therefore is exempt from meeting the student eligibility requirements. HANDBOOK ENDS HERE
