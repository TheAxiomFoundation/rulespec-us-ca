format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-406.216
  summary: |-
    Self-initiated placements during the period of time the person is enrolled in one of the employment and training programs as specified in Sections 63-406.216(a) through (e) shall be considered to be in compliance with the requirements of the employment and training program in which the person is enrolled, provided that the program has a component for enrollment in an institution of higher education and that program accepts the placement. Persons who voluntarily participate in one of the employment and training programs as specified in Sections 63-406.216(a) through (e) and are placed in an institution of higher education through or in compliance with the requirements of the program shall qualify for the exemption. These programs are: (a) The Job Training Partnership Act (JTPA), (b) a Food Stamp Employment or Training Program (FSET), FOOD STAMP REGULATIONS Regulations ELIGIBILITY STANDARDS 63-406 (Cont.) (c) the Job Opportunities and Basic Skills (JOBS) program under Title IV of the Social Security Act. (d) a program under Section 236 of the Trade Act of 1974, or (e) a state or local government employment and training program, for low-income individuals, determined by the county welfare department to be providing at least one of the components as specified in Section 63-407.841.
rules:
  - name: enrolled_in_specified_employment_training_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-406.216(a)-(e), enrolled programs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.216
              excerpt: "the person is enrolled in one of the employment and training programs as specified in Sections 63-406.216(a) through (e)"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.216
              excerpt: "These programs are: (a) The Job Training Partnership Act (JTPA), (b) a Food Stamp Employment or Training Program (FSET), FOOD STAMP REGULATIONS Regulations ELIGIBILITY STANDARDS 63-406 (Cont.) (c) the Job Opportunities and Basic Skills (JOBS) program under Title IV of the Social Security Act. (d) a program under Section 236 of the Trade Act of 1974, or (e) a state or local government employment and training program, for low-income individuals, determined by the county welfare department to be providing at least one of the components as specified in Section 63-407.841."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_enrolled_in_job_training_partnership_act_program
          or person_enrolled_in_food_stamp_employment_or_training_program
          or person_enrolled_in_jobs_program_under_title_iv_social_security_act
          or person_enrolled_in_trade_act_section_236_program
          or person_enrolled_in_cwd_determined_state_or_local_low_income_employment_training_program_with_component_under_section_63_407_841

  - name: voluntarily_participates_in_specified_employment_training_program
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-406.216(a)-(e), voluntary participation programs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.216
              excerpt: "Persons who voluntarily participate in one of the employment and training programs as specified in Sections 63-406.216(a) through (e)"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.216
              excerpt: "These programs are: (a) The Job Training Partnership Act (JTPA), (b) a Food Stamp Employment or Training Program (FSET), FOOD STAMP REGULATIONS Regulations ELIGIBILITY STANDARDS 63-406 (Cont.) (c) the Job Opportunities and Basic Skills (JOBS) program under Title IV of the Social Security Act. (d) a program under Section 236 of the Trade Act of 1974, or (e) a state or local government employment and training program, for low-income individuals, determined by the county welfare department to be providing at least one of the components as specified in Section 63-407.841."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_voluntarily_participates_in_job_training_partnership_act_program
          or person_voluntarily_participates_in_food_stamp_employment_or_training_program
          or person_voluntarily_participates_in_jobs_program_under_title_iv_social_security_act
          or person_voluntarily_participates_in_trade_act_section_236_program
          or person_voluntarily_participates_in_cwd_determined_state_or_local_low_income_employment_training_program_with_component_under_section_63_407_841

  - name: self_initiated_higher_education_placement_in_program_compliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-406.216, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.216
              excerpt: "Self-initiated placements during the period of time the person is enrolled in one of the employment and training programs as specified in Sections 63-406.216(a) through (e) shall be considered to be in compliance with the requirements of the employment and training program in which the person is enrolled, provided that the program has a component for enrollment in an institution of higher education and that program accepts the placement."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          enrolled_in_specified_employment_training_program
          and person_has_self_initiated_placement_in_institution_of_higher_education
          and employment_training_program_has_component_for_enrollment_in_institution_of_higher_education
          and employment_training_program_accepts_self_initiated_placement

  - name: higher_education_placement_employment_training_exemption_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-406.216, exemption sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.216
              excerpt: "Persons who voluntarily participate in one of the employment and training programs as specified in Sections 63-406.216(a) through (e) and are placed in an institution of higher education through or in compliance with the requirements of the program shall qualify for the exemption."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.216
              excerpt: "Self-initiated placements during the period of time the person is enrolled in one of the employment and training programs as specified in Sections 63-406.216(a) through (e) shall be considered to be in compliance with the requirements of the employment and training program in which the person is enrolled, provided that the program has a component for enrollment in an institution of higher education and that program accepts the placement."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          voluntarily_participates_in_specified_employment_training_program
          and (
            person_placed_in_institution_of_higher_education_through_requirements_of_employment_training_program
            or person_placed_in_institution_of_higher_education_in_compliance_with_requirements_of_employment_training_program
            or self_initiated_higher_education_placement_in_program_compliance
          )
