format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-406.22
  summary: |-
    The enrollment status of a student shall begin on the first day of the school term of the institution of higher education. Once a student enrolls in an institution of higher education, such enrollment shall be deemed to continue through normal periods of class attendance, vacation and recess unless the student graduates, is suspended or expelled or drops out.
rules:
  - name: higher_education_student_enrollment_status
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: MPP 63-406.22, operative enrollment-status rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.22
              excerpt: The enrollment status of a student shall begin on the first day of the school term of the institution of higher education.
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-406.22
              excerpt: Once a student enrolls in an institution of higher education, such enrollment shall be deemed to continue through normal periods of class attendance, vacation and recess unless the student graduates, is suspended or expelled or drops out.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          student_enrolled_in_institution_of_higher_education
          and (
            day_is_first_day_of_school_term_of_institution_of_higher_education
            or day_is_normal_period_of_class_attendance_vacation_or_recess
          )
          and not student_has_graduated
          and not student_is_suspended_or_expelled
          and not student_has_dropped_out
