format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-406.111
  summary: |-
    (a) An “institution of higher education” refers to: (1) A business, trade, technical or vocational school at the post-high school level that normally requires a high school diploma or equivalency certificate for enrollment; or (2) A junior, community, two-year or four-year college or university, or graduate school, regardless of whether a high school diploma or equivalency certificate is required. (A) If a college normally requires a high school diploma or equivalency certificate, but does not require either of these for a particular program or course, enrollment in such a program or course does not constitute enrollment in an institution of higher education.
