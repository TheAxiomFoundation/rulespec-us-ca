format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-401.6
  summary: |-
    The CWD shall not require the otherwise eligible household to reside in the county which is providing the food stamp benefit if the household is participating in the GAIN Work Supplemental Program; the CWD providing the AFDC benefits to these households shall also provide food stamp benefits to them.
rules:
  - name: county_residency_requirement_barred_for_gain_work_supplemental_program_household
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-401.6, first clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-401.6
              excerpt: "The CWD shall not require the otherwise eligible household to reside in the county which is providing the food stamp benefit if the household is participating in the GAIN Work Supplemental Program"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          otherwise_eligible_household and household_participating_in_gain_work_supplemental_program

  - name: afdc_benefit_cwd_must_provide_food_stamp_benefits_to_gain_work_supplemental_program_household
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-401.6, second clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-401.6
              excerpt: "the CWD providing the AFDC benefits to these households shall also provide food stamp benefits to them"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-401.6
              excerpt: "if the household is participating in the GAIN Work Supplemental Program"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          otherwise_eligible_household and household_participating_in_gain_work_supplemental_program and cwd_provides_afdc_benefits_to_household
