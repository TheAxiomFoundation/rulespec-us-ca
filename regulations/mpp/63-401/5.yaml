              excerpt: "The CWD shall not require an otherwise eligible household to reside in a permanent dwelling or have a fixed mailing address as a condition of eligibility."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-401.5
              excerpt: "Persons in a county solely for vacation purposes shall not be considered residents."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          otherwise_eligible_household
          and household_is_in_county
          and not household_in_county_solely_for_vacation_purposes
          and not household_has_fixed_mailing_address

  - name: household_residency_without_permanent_county_intent
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-401.5, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-401.5
