format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-401.2
  summary: |-
    No individual may participate as a member of more than one household, or in more than one county in any month except for eligible residents of shelters for battered women and children (see Section 63-503.46) who were program participants in dwelling of the abuser.
rules:
  - name: multiple_household_or_county_participation_bar_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-401.2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-401.2
              excerpt: "No individual may participate as a member of more than one household, or in more than one county in any month"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-401.2
              excerpt: "except for eligible residents of shelters for battered women and children (see Section 63-503.46) who were program participants in dwelling of the abuser"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (participates_as_member_of_more_than_one_household_in_month or participates_in_more_than_one_county_in_month)
          and
          not (eligible_resident_of_shelter_for_battered_women_and_children_under_section_63_503_46 and program_participant_in_dwelling_of_abuser)
