format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.211
  summary: |-
    (a) When the CWD learns that a household has lost a source of earned income or has experienced a reduction in income after the date of application, but before the household is certified, the CWD shall determine whether a voluntary quit or a reduction of work effort has occurred.
rules:
  - name: cwd_income_change_determination_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: 63-408.211(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.211
              excerpt: "When the CWD learns that a household has lost a source of earned income or has experienced a reduction in income after the date of application, but before the household is certified"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.211
              excerpt: "the CWD shall determine whether a voluntary quit or a reduction of work effort has occurred."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cwd_determines_whether_voluntary_quit_or_reduction_of_work_effort_occurred or (
            not cwd_learns_household_lost_source_of_earned_income_after_application_before_certification and
            not cwd_learns_household_experienced_reduction_in_income_after_application_before_certification
          )
