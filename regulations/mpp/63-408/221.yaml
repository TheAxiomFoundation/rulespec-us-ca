format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.221
  summary: |-
    When the CWD learns that a recipient household has lost a source of earned income or has experienced a reduction in income, the CWD shall determine whether an individual, who is a work registrant in the household, has voluntarily quit a job or reduced work effort below 30 hours per week. The CWD shall determine whether there was good cause for the voluntary quit or reduced hours as defined in Section 63-408.4. Benefits shall not be delayed pending good cause determination.
rules:
  - name: reduced_work_effort_weekly_hours_threshold
    kind: parameter
    dtype: Integer
    source: 63-408.221, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.221
              excerpt: "reduced work effort below 30 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: work_registrant_voluntary_quit_or_reduced_work_effort_below_threshold
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-408.221, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.221
              excerpt: "an individual, who is a work registrant in the household, has voluntarily quit a job or reduced work effort below 30 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_has_work_registrant_individual and (
            work_registrant_individual_voluntarily_quit_job
            or (
              work_registrant_individual_reduced_work_effort
              and work_registrant_individual_work_hours_per_week_after_reduction < reduced_work_effort_weekly_hours_threshold
            )
          )

  - name: cwd_must_determine_voluntary_quit_or_reduced_work_effort
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-408.221, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.221
              excerpt: "When the CWD learns that a recipient household has lost a source of earned income or has experienced a reduction in income"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.221
              excerpt: "the CWD shall determine whether an individual, who is a work registrant in the household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            cwd_learns_recipient_household_lost_source_of_earned_income
            or cwd_learns_recipient_household_experienced_reduction_in_income
          ) and household_has_work_registrant_individual

  - name: cwd_must_determine_good_cause_for_voluntary_quit_or_reduced_hours
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-408.221, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.221
              excerpt: "The CWD shall determine whether there was good cause for the voluntary quit or reduced hours as defined in Section 63-408.4."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            cwd_learns_recipient_household_lost_source_of_earned_income
            or cwd_learns_recipient_household_experienced_reduction_in_income
          ) and work_registrant_voluntary_quit_or_reduced_work_effort_below_threshold

  - name: benefits_must_not_be_delayed_pending_good_cause_determination
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-408.221, third sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.221
              excerpt: "Benefits shall not be delayed pending good cause determination."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cwd_must_determine_good_cause_for_voluntary_quit_or_reduced_hours and good_cause_determination_pending
