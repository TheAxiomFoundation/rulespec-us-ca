format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.63
  summary: |-
    When an application is filed in the final month of a food stamp disqualification period, the CWD must use the same application for both the denial of food stamp benefits in the remaining disqualification month and for certification of benefits for the subsequent month(s) as specified in Section 63-503.14, which provides the provisions for determining household eligibility and benefit levels.
rules:
  - name: same_application_use_requirement_for_final_disqualification_month
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: MPP 63-408.63, operative sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.63
              excerpt: When an application is filed in the final month of a food stamp disqualification period
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.63
              excerpt: the CWD must use the same application for both the denial of food stamp benefits in the remaining disqualification month and for certification of benefits for the subsequent month(s) as specified in Section 63-503.14
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not application_filed_in_final_month_of_food_stamp_disqualification_period)
          or cwd_uses_same_application_for_remaining_disqualification_month_denial_and_subsequent_month_certification_under_section_63_503_14
