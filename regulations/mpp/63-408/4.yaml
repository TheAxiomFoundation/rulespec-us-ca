format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.4
  summary: |-
    The CWD shall be responsible for determining good cause in those instances where a work registrant has voluntarily quit a job or reduced work effort. The CWD shall consider the facts and circumstances, which includes information submitted by the individual and the employer.
rules:
  - name: cwd_responsible_for_good_cause_determination_after_voluntary_quit_or_reduced_work_effort
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-408.4, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.4
              excerpt: The CWD shall be responsible for determining good cause in those instances where a work registrant has voluntarily quit a job or reduced work effort.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          work_registrant_voluntarily_quit_job or work_registrant_reduced_work_effort

