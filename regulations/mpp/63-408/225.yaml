format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.225
  summary: |-
    If the voluntary quit or reduction of work effort occurred in the last month of a certification period or is determined in the last 30 days of the certification period, disqualification requirements at Section 63-408.22 shall apply. The period of disqualification begins the day after the last certification period ends and continues for the length of the disqualification regardless of whether the individual reapplies for food stamps.
rules:
  - name: voluntary_quit_disqualification_requirements_apply_after_late_certification_event
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: MPP 63-408.225, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.225
              excerpt: If the voluntary quit or reduction of work effort occurred in the last month of a certification period or is determined in the last 30 days of the certification period, disqualification requirements at Section 63-408.22 shall apply.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          voluntary_quit_or_reduction_of_work_effort_occurred_in_last_month_of_certification_period
          or voluntary_quit_or_reduction_of_work_effort_determined_in_last_30_days_of_certification_period

  - name: voluntary_quit_disqualification_period_day_after_certification_period
    kind: derived
