format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.223
  summary: |-
    If it is determined an individual, who is a work registrant, has voluntarily quit a job or reduced work effort to less than 30 hours per week without good cause as specified in Section 63-408.4, the individual is ineligible for food stamps and shall be excluded as a household member in accordance with Section 63-402.228.
rules:
  - name: work_effort_reduction_weekly_hours_threshold
    kind: parameter
    dtype: Integer
    source: 63-408.223, reduced work effort threshold
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.223
              excerpt: "reduced work effort to less than 30 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: work_effort_reduced_below_weekly_hours_threshold
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: 63-408.223, reduced work effort clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.223
              excerpt: "reduced work effort to less than 30 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_reduced_work_effort and work_hours_per_week_after_reduction < work_effort_reduction_weekly_hours_threshold

  - name: work_registrant_voluntary_quit_or_reduction_food_stamp_ineligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-408.223, ineligibility clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.223
              excerpt: "an individual, who is a work registrant, has voluntarily quit a job or reduced work effort to less than 30 hours per week without good cause as specified in Section 63-408.4"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.223
              excerpt: "the individual is ineligible for food stamps"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_work_registrant and
          not individual_has_good_cause_under_section_63_408_4 and
          (individual_voluntarily_quit_job or work_effort_reduced_below_weekly_hours_threshold)

  - name: work_registrant_voluntary_quit_or_reduction_excluded_as_household_member
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-408.223, household-member exclusion clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.223
              excerpt: "an individual, who is a work registrant, has voluntarily quit a job or reduced work effort to less than 30 hours per week without good cause as specified in Section 63-408.4"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.223
              excerpt: "shall be excluded as a household member in accordance with Section 63-402.228"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_work_registrant and
          not individual_has_good_cause_under_section_63_408_4 and
          (individual_voluntarily_quit_job or work_effort_reduced_below_weekly_hours_threshold)
