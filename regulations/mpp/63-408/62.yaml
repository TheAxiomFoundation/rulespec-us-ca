format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.62
  summary: |-
    If at any time during the period of disqualification an individual qualifies for one of the work registration exemptions listed at Section 63-407.21, the disqualification period shall end and the individual may reestablish food stamp eligibility by reapplying if otherwise eligible.
rules:
  - name: work_registration_disqualification_period_ends
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-408.62, first clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.62
              excerpt: If at any time during the period of disqualification an individual qualifies for one of the work registration exemptions listed at Section 63-407.21, the disqualification period shall end
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_in_period_of_work_registration_disqualification
          and individual_qualifies_for_work_registration_exemption_under_section_63_407_21
  - name: individual_may_reestablish_food_stamp_eligibility
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-408.62, reapplication clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.62
              excerpt: the individual may reestablish food stamp eligibility by reapplying if otherwise eligible
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.62
              excerpt: If at any time during the period of disqualification an individual qualifies for one of the work registration exemptions listed at Section 63-407.21, the disqualification period shall end
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          work_registration_disqualification_period_ends
          and individual_reapplies_for_food_stamp_eligibility
          and individual_is_otherwise_food_stamp_eligible
