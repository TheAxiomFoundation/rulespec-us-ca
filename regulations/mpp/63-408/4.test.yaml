- name: voluntary_quit_triggers_cwd_good_cause_duties
  period: 2026-05
  input:
    us-ca:regulations/mpp/63-408#input.work_registrant_voluntarily_quit_job: true
    us-ca:regulations/mpp/63-408#input.work_registrant_reduced_work_effort: false
  output:
    us-ca:regulations/mpp/63-408#cwd_responsible_for_good_cause_determination_after_voluntary_quit_or_reduced_work_effort: holds
    us-ca:regulations/mpp/63-408#cwd_must_consider_facts_and_circumstances_in_good_cause_determination: holds
- name: reduced_work_effort_triggers_cwd_good_cause_duties
  period: 2026-05
  input:
    us-ca:regulations/mpp/63-408#input.work_registrant_voluntarily_quit_job: false
    us-ca:regulations/mpp/63-408#input.work_registrant_reduced_work_effort: true
  output:
    us-ca:regulations/mpp/63-408#cwd_responsible_for_good_cause_determination_after_voluntary_quit_or_reduced_work_effort: holds
    us-ca:regulations/mpp/63-408#cwd_must_consider_facts_and_circumstances_in_good_cause_determination: holds
- name: no_voluntary_quit_or_reduced_work_effort
  period: 2026-05
  input:
    us-ca:regulations/mpp/63-408#input.work_registrant_voluntarily_quit_job: false
    us-ca:regulations/mpp/63-408#input.work_registrant_reduced_work_effort: false
  output:
    us-ca:regulations/mpp/63-408#cwd_responsible_for_good_cause_determination_after_voluntary_quit_or_reduced_work_effort: not_holds
    us-ca:regulations/mpp/63-408#cwd_must_consider_facts_and_circumstances_in_good_cause_determination: not_holds
