format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.121
  summary: |-
    If an individual reduces hours while working in a job of less than 30 hours per week, a food stamp disqualification shall not be imposed. The minimum wage equivalency does not apply when determining a reduction in work effort.
rules:
  - name: reduced_hours_job_weekly_hours_limit
    kind: parameter
    dtype: Count
    source: MPP 63-408.121, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.121
              excerpt: "less than 30 hours per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: food_stamp_disqualification_barred_for_reduced_hours_under_weekly_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-408.121, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.121
              excerpt: "If an individual reduces hours while working in a job of less than 30 hours per week, a food stamp disqualification shall not be imposed."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_reduces_hours and job_hours_per_week < reduced_hours_job_weekly_hours_limit

  - name: minimum_wage_equivalency_excluded_from_reduction_in_work_effort_determination
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-408.121, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.121
              excerpt: "The minimum wage equivalency does not apply when determining a reduction in work effort."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          determining_reduction_in_work_effort
