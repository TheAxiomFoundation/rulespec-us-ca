format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.61
  summary: |-
    Following the end of the minimum disqualification period specified in Section 63-407.531, .532, or .533, eligibility for food stamps may be reestablished if the individual, who is otherwise eligible, applies and is determined by the CWD to be in compliance with the food stamp work registration requirements provided in Section 63-407.4. In compliance means the individual is fulfilling one of the food stamp work registration requirements or agrees to fulfill the requirements as specified by the CWD at application.
rules:
  - name: individual_in_compliance_with_food_stamp_work_registration_requirements
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-408.61, definition of in compliance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.61
              excerpt: In compliance means the individual is fulfilling one of the food stamp work registration requirements or agrees to fulfill the requirements as specified by the CWD at application.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_fulfilling_one_food_stamp_work_registration_requirement
          or individual_agrees_at_application_to_fulfill_food_stamp_work_registration_requirements_as_specified_by_cwd
  - name: food_stamp_eligibility_may_be_reestablished_after_work_registration_disqualification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-408.61, operative sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.61
              excerpt: Following the end of the minimum disqualification period specified in Section 63-407.531, .532, or .533, eligibility for food stamps may be reestablished if the individual, who is otherwise eligible, applies and is determined by the CWD to be in compliance with the food stamp work registration requirements provided in Section 63-407.4.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          minimum_disqualification_period_under_section_63_407_531_532_or_533_has_ended
          and individual_otherwise_eligible_for_food_stamps
          and individual_applies_for_food_stamps
          and individual_in_compliance_with_food_stamp_work_registration_requirements
