format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.111
  summary: |-
    Changes in employment status that result from reducing hours of employment while working for the same employer, terminating a self-employment enterprise, or resigning from a job at the demand of the employer shall not be considered a voluntary quit for purposes of this section.
rules:
  - name: employment_status_change_not_considered_voluntary_quit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: MPP 63-408.111
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.111
              excerpt: "Changes in employment status that result from reducing hours of employment while working for the same employer ... shall not be considered a voluntary quit for purposes of this section."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.111
              excerpt: "Changes in employment status that result from ... terminating a self-employment enterprise ... shall not be considered a voluntary quit for purposes of this section."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.111
              excerpt: "Changes in employment status that result from ... resigning from a job at the demand of the employer shall not be considered a voluntary quit for purposes of this section."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          employment_status_change_results_from_reducing_hours_while_working_for_same_employer or employment_status_change_results_from_terminating_self_employment_enterprise or employment_status_change_results_from_resigning_from_job_at_employer_demand
