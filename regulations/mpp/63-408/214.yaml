format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.214
  summary: |-
    If a voluntary quit or reduction in work effort occurred prior to certification, but is not discovered by the CWD until after certification, a food stamp disqualification shall be imposed in accordance with the procedures specified in Section 63-408.22.
