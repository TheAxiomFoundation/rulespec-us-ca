format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.222
  summary: |-
    (a) Explain the reason for the proposed disqualification; (b) Specify that the disqualification period shall begin the first of the month following the month the registrant is provided a timely notice of action and shall continue for the period identified in Section 63-407.53. (1) The notice shall inform the household member that if, at any time, he/she becomes exempt in accordance with Section 63-408.612 during a disqualification period, the disqualification shall end and he/she may reapply for food stamps. (c) Provide that the household member may reapply for food stamps after the disqualification period ends; (d) Explain the actions that may be taken to avoid or end a disqualification period; and (e) Inform the household member of the right to request a state hearing. If a state hearing is requested, food stamps shall be continued as specified in Section 63-804.6. If food stamp benefits are continued pending a state hearing and the CWD’s determination is upheld, the disqualification period shall begin the first of the month after the hearing decision is rendered. FOOD STAMP REGULATIONS Regulations ELIGIBILITY STANDARDS 63-408 (Cont.)
rules:
  - name: notice_contains_required_disqualification_information
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-408.222(a)-(e)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.222
              excerpt: (a) Explain the reason for the proposed disqualification; (b) Specify that the disqualification period shall begin the first of the month following the month the registrant is provided a timely notice of action and shall continue for the period identified in Section 63-407.53. (1) The notice shall inform the household member that if, at any time, he/she becomes exempt in accordance with Section 63-408.612 during a disqualification period, the disqualification shall end and he/she may reapply for food stamps. (c) Provide that the household member may reapply for food stamps after the disqualification period ends; (d) Explain the actions that may be taken to avoid or end a disqualification period; and (e) Inform the household member of the right to request a state hearing.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          notice_explains_reason_for_proposed_disqualification
          and notice_specifies_disqualification_begins_first_month_after_timely_notice_month
          and notice_specifies_disqualification_continues_for_period_identified_under_section_63_407_53
          and notice_informs_exemption_under_section_63_408_612_ends_disqualification
          and notice_provides_household_member_may_reapply_after_disqualification_period_ends
          and notice_explains_actions_to_avoid_or_end_disqualification_period
          and notice_informs_household_member_of_right_to_request_state_hearing
