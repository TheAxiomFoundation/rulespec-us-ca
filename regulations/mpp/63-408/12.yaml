format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.12
  summary: |-
    A reduction of work effort means voluntarily decreasing the number of hours worked in paid employment to less than 30 per week. If the reduction in hours worked occurs within 60 days of the date of application without good cause as defined in Section 63-408.4, the application shall be denied for one, three, or six months as specified in Section 63-407.53.
rules:
  - name: reduction_of_work_effort_hours_per_week_threshold
    kind: parameter
    dtype: Decimal
    source: MPP 63-408.12, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.12
              excerpt: "less than 30 per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: reduction_of_work_effort_application_lookback_days
    kind: parameter
    dtype: Count
    source: MPP 63-408.12, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.12
              excerpt: "within 60 days of the date of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60

  - name: reduction_of_work_effort
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-408.12, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.12
              excerpt: "A reduction of work effort means voluntarily decreasing the number of hours worked in paid employment to less than 30 per week."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_voluntarily_decreased_hours_worked_in_paid_employment and
          hours_worked_after_reduction_per_week < reduction_of_work_effort_hours_per_week_threshold

  - name: application_denied_for_recent_reduction_of_work_effort
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-408.12, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.12
              excerpt: "If the reduction in hours worked occurs within 60 days of the date of application"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.12
              excerpt: "without good cause as defined in Section 63-408.4"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.12
              excerpt: "the application shall be denied"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          reduction_of_work_effort and
          days_between_reduction_in_hours_and_application_date <= reduction_of_work_effort_application_lookback_days and
          not good_cause_under_section_63_408_4

  - name: application_denial_period_months_for_recent_reduction_of_work_effort
    kind: derived
    entity: Person
    dtype: Count
    period: Month
    source: MPP 63-408.12, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.12
              excerpt: "the application shall be denied for one, three, or six months as specified in Section 63-407.53"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if application_denied_for_recent_reduction_of_work_effort: denial_period_months_specified_under_section_63_407_53 else: 0
