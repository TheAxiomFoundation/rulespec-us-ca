format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.41
  summary: |-
    (a) Circumstances beyond the registrant’s control, such as, but not limited to, illness, illness of another household member requiring the presence of the registrant, a household emergency, the unavailability of transportation, or problems caused by inability of the registrant to speak or write English. (b) Resigning from a job that does not meet the suitability criteria specified in Section 63-407.7. FOOD STAMP REGULATIONS (c) Discrimination by an employer based on age, race, sex, color, handicap, religious beliefs, national origin or political beliefs; (d) Work demands or conditions that render continued employment unreasonable, such as working without being paid on schedule; (e) Acceptance by the individual of employment, or enrollment of at least half-time in any recognized school, training program or institution of higher education that requires the individual to leave employment; (f) Acceptance by any other household member of employment or enrollment at least half-time in any recognized school, training program or institution of higher education in another county or state which requires the household to move and thereby requires the work registrant to leave employment; (g) Resignations by persons under the age of 60 which are recognized by the employer as retirement; (h) Acceptance of a bona fide offer of employment of 30 hours or more a week, or in which the weekly earnings are equivalent to the federal minimum wage multiplied by 30 hours, or because of circumstances beyond the control of the individual, the job either does not materialize or result in employment of less than 30 hours a week, or weekly earnings of less than the federal minimum wage multiplied by 30 hours. (i) Leaving a job in connection with patterns of employment in which workers frequently move from one employer to another such as migrant farm labor or construction work. There may be some circumstances where registrants will apply for food stamp benefits between jobs particularly in cases where work may not yet be available at the new job site. Even though employment at the new site has not actually begun, the registrant shall be considered to have quit with good cause if the quitting of the previous employment is a part of the pattern of that type of employment. (j) Situations where there is a lack of adequate child care arrangements available for a registrant’s children who have reached age six but are under twelve years of age. For purposes of this section, adequate child care arrangements means those which meet the standards in California Code of Regulations, Title 22, Division 12, Chapter 1 commencing with Section 101151, Chapter 2 commencing with Section 101251, and Chapter 3 commencing with Section 102351.1. FOOD STAMP REGULATIONS Regulations ELIGIBILITY STANDARDS 63-408
rules:
  - name: bona_fide_offer_minimum_weekly_hours
    kind: parameter
    dtype: Decimal
    source: 63-408.41(h)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.41
              excerpt: "Acceptance of a bona fide offer of employment of 30 hours or more a week"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.41
              excerpt: "the federal minimum wage multiplied by 30 hours"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: registrant_has_good_cause_for_leaving_employment
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 63-408.41(a)-(j)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.41
              excerpt: "(a) Circumstances beyond the registrant’s control"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.41
              excerpt: "(b) Resigning from a job that does not meet the suitability criteria specified in Section 63-407.7."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.41
              excerpt: "(c) Discrimination by an employer based on age, race, sex, color, handicap, religious beliefs, national origin or political beliefs"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.41
              excerpt: "(d) Work demands or conditions that render continued employment unreasonable"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.41
              excerpt: "(e) Acceptance by the individual of employment, or enrollment of at least half-time in any recognized school, training program or institution of higher education that requires the individual to leave employment"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.41
              excerpt: "(f) Acceptance by any other household member of employment or enrollment at least half-time in any recognized school, training program or institution of higher education in another county or state which requires the household to move"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.41
              excerpt: "(g) Resignations by persons under the age of 60 which are recognized by the employer as retirement"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.41
              excerpt: "(h) Acceptance of a bona fide offer of employment of 30 hours or more a week"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.41
              excerpt: "(i) Leaving a job in connection with patterns of employment in which workers frequently move from one employer to another"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.41
              excerpt: "(j) Situations where there is a lack of adequate child care arrangements available for a registrant’s children who have reached age six but are under twelve years of age."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          circumstances_beyond_registrants_control
          or registrant_resigned_from_job_that_does_not_meet_suitability_criteria_under_section_63_407_7
          or employer_discriminated_against_registrant_based_on_listed_protected_belief_or_status
          or work_demands_or_conditions_rendered_continued_employment_unreasonable
          or individual_accepted_employment_requiring_individual_to_leave_employment
          or individual_enrolled_at_least_half_time_in_recognized_school_training_program_or_institution_requiring_individual_to_leave_employment
          or household_member_accepted_employment_in_another_county_or_state_requiring_household_move_and_registrant_leave_employment
          or household_member_enrolled_at_least_half_time_in_recognized_school_training_program_or_institution_in_another_county_or_state_requiring_household_move_and_registrant_leave_employment
          or person_under_age_sixty_resignation_recognized_by_employer_as_retirement
          or (registrant_accepted_bona_fide_offer_of_employment and (bona_fide_offer_weekly_hours >= bona_fide_offer_minimum_weekly_hours or bona_fide_offer_weekly_earnings_equivalent_to_federal_minimum_wage_times_weekly_hours_threshold or (circumstances_beyond_individual_control_prevented_expected_employment and (job_offer_did_not_materialize or resulting_employment_weekly_hours < bona_fide_offer_minimum_weekly_hours or resulting_employment_weekly_earnings_less_than_federal_minimum_wage_times_weekly_hours_threshold))))
          or quitting_previous_employment_part_of_pattern_of_employment_with_frequent_moves_between_employers
          or (registrant_has_child_reached_age_six_but_under_twelve and not adequate_child_care_arrangements_meeting_title_22_standards_available)
