format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-408.31
  summary: |-
    Individuals, who qualify for one of the work requirement exemptions at Section 63-407.21, shall be excused from the voluntary quit or reduction of work effort disqualification provision, and may regain food stamp eligibility by reapplying if otherwise eligible.
rules:
  - name: voluntary_quit_or_work_effort_disqualification_excused_by_work_requirement_exemption
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-408.31, first clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.31
              excerpt: Individuals, who qualify for one of the work requirement exemptions at Section 63-407.21, shall be excused from the voluntary quit or reduction of work effort disqualification provision
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_qualifies_for_work_requirement_exemption_under_section_63_407_21

  - name: food_stamp_eligibility_may_be_regained_after_reapplication
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-408.31, second clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.31
              excerpt: may regain food stamp eligibility by reapplying if otherwise eligible
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-408.31
              excerpt: Individuals, who qualify for one of the work requirement exemptions at Section 63-407.21
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_qualifies_for_work_requirement_exemption_under_section_63_407_21
          and person_reapplies_for_food_stamp_eligibility
          and person_otherwise_eligible_for_food_stamps
