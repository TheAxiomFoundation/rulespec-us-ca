format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-404.41
  summary: |-
    If the CWD determines that a household member has failed without good cause to provide or apply for an SSN that individual shall be ineligible to participate until he/she complies. This disqualification will apply only to the individual for which the SSN is not provided and not to the entire household.
rules:
  - name: individual_ineligible_to_participate_for_ssn_noncompliance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-404.41
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.41
              excerpt: "If the CWD determines that a household member has failed without good cause to provide or apply for an SSN that individual shall be ineligible to participate until he/she complies. This disqualification will apply only to the individual for which the SSN is not provided and not to the entire household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_is_household_member and
          cwd_determines_individual_failed_to_provide_or_apply_for_ssn and
          not individual_had_good_cause_for_failure_to_provide_or_apply_for_ssn and
          not individual_has_complied_with_ssn_requirement
