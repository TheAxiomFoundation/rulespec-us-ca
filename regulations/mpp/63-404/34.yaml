format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-404.34
  summary: |-
    Once the household member has filed an application for an SSN and continue to meet all other eligibility requirements, that member shall be permitted to continue to participate pending notification of the CWD through IEVS of the household member’s verified SSN.
