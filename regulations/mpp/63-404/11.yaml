format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-404.11
  summary: |-
    The CWD shall explain to applicants and recipients that refusal or failure without good cause to provide or apply for an SSN shall result in disqualification of the individual for whom the SSN is not obtained. The CWD shall send the household a notice of action explaining the effect of the disqualification on the eligibility and allotment of the remaining household members.
rules:
  - name: individual_disqualified_for_ssn_refusal_or_failure_without_good_cause
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-404.11, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.11
              excerpt: "refusal or failure without good cause to provide or apply for an SSN shall result in disqualification of the individual for whom the SSN is not obtained"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (individual_refused_to_provide_or_apply_for_ssn or individual_failed_to_provide_or_apply_for_ssn) and
          not good_cause_for_refusal_or_failure_to_provide_or_apply_for_ssn and
          ssn_not_obtained_for_individual
