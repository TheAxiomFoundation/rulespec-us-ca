              corpus_citation_path: us-ca/regulation/mpp/63-404.52
              excerpt: "If the household member(s) can show good cause why an application for an SSN has not been completed in a timely manner, that household member shall be allowed to participate for one month in addition to the month of application."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.52
              excerpt: "Thereafter, for a household member to continue to participate, good cause shall be shown monthly."
