format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-404.52
  summary: |-
    If the household member(s) can show good cause why an application for an SSN has not been completed in a timely manner, that household member shall be allowed to participate for one month in addition to the month of application. Thereafter, for a household member to continue to participate, good cause shall be shown monthly.
rules:
  - name: ssn_application_delay_good_cause_participation_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-404.52
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
