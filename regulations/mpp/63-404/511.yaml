format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-404.511
  summary: |-
    Good cause does not include delays due to illness, lack of transportation, or temporary absences.
rules:
  - name: delay_excluded_from_good_cause
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-404.511
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.511
              excerpt: "Good cause does not include delays due to illness, lack of transportation, or temporary absences."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          delay_due_to_illness or delay_due_to_lack_of_transportation or delay_due_to_temporary_absence
