format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-404.62
  summary: |-
    The application for a SSN shall be verified by obtaining the CDSS approved documentation of application from SSA. Approved documentation includes, but is not limited to, the MC-194, the SSA 5028 or the hospital issued SSA-2853-OP4.
rules:
  - name: ssn_application_verified_by_approved_documentation
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-404.62
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.62
              excerpt: "The application for a SSN shall be verified by obtaining the CDSS approved documentation of application from SSA."
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.62
              excerpt: "Approved documentation includes, but is not limited to, the MC-194, the SSA 5028 or the hospital issued SSA-2853-OP4."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_application_for_ssn and
          (cdss_approved_documentation_of_application_from_ssa_obtained or
          mc_194_obtained or
          ssa_5028_obtained or
          hospital_issued_ssa_2853_op4_obtained)
