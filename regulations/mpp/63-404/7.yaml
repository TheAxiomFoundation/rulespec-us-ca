format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-404.7
  summary: |-
    The disqualified household member may become eligible upon providing the CWD with his/her SSN, providing verification of application for an SSN, or showing good cause why an application for an SSN cannot be completed
rules:
  - name: disqualified_household_member_ssn_eligibility_restored
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: MPP 63-404.7, operative sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.7
              excerpt: The disqualified household member may become eligible upon providing the CWD with his/her SSN, providing verification of application for an SSN, or showing good cause why an application for an SSN cannot be completed
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_disqualified_for_ssn and (
            person_provided_cwd_with_ssn
            or person_provided_verification_of_application_for_ssn
            or person_shows_good_cause_ssn_application_cannot_be_completed
          )
