format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-404.21
  summary: |-
    Households entitled to expedited service shall not be required to furnish or apply for an SSN until after they have received their first allotment. However, these households shall be required to furnish or apply for an SSN before their next issuance in accordance with 63-301.543 and .544.
rules:
  - name: expedited_service_household_ssn_requirement_deferred_before_first_allotment
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Day
    source: 63-404.21 first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.21
              excerpt: "Households entitled to expedited service shall not be required to furnish or apply for an SSN until after they have received their first allotment."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_entitled_to_expedited_service
          and
          not household_has_received_first_allotment
  - name: expedited_service_household_ssn_required_before_next_issuance
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Day
    source: 63-404.21 second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.21
              excerpt: "However, these households shall be required to furnish or apply for an SSN before their next issuance in accordance with 63-301.543 and .544."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_entitled_to_expedited_service
          and household_has_received_first_allotment
          and day_is_before_households_next_issuance
