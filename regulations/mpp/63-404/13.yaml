format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-404.13
  summary: |-
    Household members who do not have an SSN and who apply for an SSN or provide good cause for failure to apply shall be allowed to participate in accordance with Section 63-404.3.
rules:
  - name: household_member_without_ssn_applies_or_has_good_cause_for_failure_to_apply
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 63-404.13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.13
              excerpt: "Household members who do not have an SSN and who apply for an SSN or provide good cause for failure to apply shall be allowed to participate in accordance with Section 63-404.3."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_member_has_no_ssn and
          (household_member_applies_for_ssn or household_member_provides_good_cause_for_failure_to_apply_for_ssn)
