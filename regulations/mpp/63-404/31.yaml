format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-404.31
  summary: |-
    Whenever an individual indicates he/she does not have an SSN, or is otherwise unable to provide one, the household member shall complete the application for SSNs provided by the CWD, and apply directly to the Social Security Administration (SSA).
rules:
  - name: household_member_satisfies_ssn_application_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 63-404.31
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.31
              excerpt: "Whenever an individual indicates he/she does not have an SSN, or is otherwise unable to provide one"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.31
              excerpt: "the household member shall complete the application for SSNs provided by the CWD, and apply directly to the Social Security Administration (SSA)."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not (individual_indicates_no_ssn or individual_unable_to_provide_ssn) or (
            household_member_completes_cwd_ssn_application and
            household_member_applies_directly_to_ssa
          )
