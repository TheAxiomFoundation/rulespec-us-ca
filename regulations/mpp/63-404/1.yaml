format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-404.1
  summary: |-
    Applicant or recipient households shall provide the CWD with the social security number (SSN) of each household member or shall provide verification of application for an SSN prior to certification. If individuals have more than one number, all numbers shall be required.
rules:
  - name: household_satisfies_ssn_certification_requirement
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-404.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.1
              excerpt: "Applicant or recipient households shall provide the CWD with the social security number (SSN) of each household member or shall provide verification of application for an SSN prior to certification."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.1
              excerpt: "If individuals have more than one number, all numbers shall be required."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          applicant_or_recipient_household and
          (
            household_provided_cwd_ssn_of_each_household_member_prior_to_certification or
            household_provided_verification_of_application_for_ssn_for_each_household_member_prior_to_certification
          ) and
          (
            not household_has_member_with_more_than_one_ssn or
            household_provided_cwd_all_ssns_for_each_member_with_more_than_one_ssn
          )
