format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-404.64
  summary: |-
    Once an SSN has been verified through IEVS, the EW shall annotate the casefile accordingly to prevent the need for future reverification.
rules:
  - name: ew_must_annotate_casefile_after_ievs_ssn_verification
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: 63-404.64
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-404.64
              excerpt: "Once an SSN has been verified through IEVS, the EW shall annotate the casefile accordingly to prevent the need for future reverification."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          ssn_has_been_verified_through_ievs
