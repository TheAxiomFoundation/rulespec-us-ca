format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-409.1
  summary: |-
    Except for categorically eligible households, as specified in Sections 63-301.6, .7, and .82, only those households with income and resources which do not exceed the maximum income and resource eligibility standards shall be eligible to participate in the Food Stamp Program. The maximum income and resource eligibility standards are promulgated and updated by the USDA, and contained in tables reproduced in Handbook Section 63-1101.
rules:
  - name: food_stamp_income_and_resource_eligibility_standard_satisfied
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-409.1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-409.1
              excerpt: "Except for categorically eligible households, as specified in Sections 63-301.6, .7, and .82"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-409.1
              excerpt: "only those households with income and resources which do not exceed the maximum income and resource eligibility standards shall be eligible to participate in the Food Stamp Program"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-409.1
              excerpt: "The maximum income and resource eligibility standards are promulgated and updated by the USDA, and contained in tables reproduced in Handbook Section 63-1101."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          categorically_eligible_household_under_sections_63_301_6_7_and_82
          or (
            household_income_does_not_exceed_maximum_income_eligibility_standard
            and household_resources_do_not_exceed_maximum_resource_eligibility_standard
          )
