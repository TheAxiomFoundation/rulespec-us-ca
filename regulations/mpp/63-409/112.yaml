    corpus_citation_path: us-ca/regulation/mpp/63-409.112
  summary: |-
    The CWD shall determine the eligibility of households with a member who is elderly or disabled [as define in Section 63-102(e)] based on the maximum net income eligibility standards reproduced in Handbook Section 63-1101. These standards shall apply if a household contains a member who is 59 years old on the date of application but who will become 60 before the end of the month of application. This eligibility determination shall be made in accordance with Sections 63-503.322 or .323, as appropriate.
