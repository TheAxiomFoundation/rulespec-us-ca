format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-409.111
  summary: |-
    The CWD shall determine the eligibility of all households, except as specified in Sections 63-409.112, and 63-301.7, based first on the maximum gross income. If the household is not eligible under this test the application shall be denied. If the household is gross income eligible then the net income eligibility standards reproduced in Handbook Section 63-1101 shall be applied and appropriate denial or approval shall be made. These eligibility determinations shall be made in accordance with Section 63-503.321.
rules:
  - name: application_denied_for_failed_maximum_gross_income_test
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-409.111, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-409.111
              excerpt: "If the household is not eligible under this test the application shall be denied."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_gross_income_eligible_under_maximum_gross_income_test

  - name: application_approved_after_gross_and_net_income_tests
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-409.111, sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-409.111
              excerpt: "If the household is gross income eligible then the net income eligibility standards reproduced in Handbook Section 63-1101 shall be applied and appropriate denial or approval shall be made."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_gross_income_eligible_under_maximum_gross_income_test and household_net_income_eligible_under_handbook_section_63_1101

  - name: application_denied_after_net_income_standards
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-409.111, sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-409.111
              excerpt: "If the household is gross income eligible then the net income eligibility standards reproduced in Handbook Section 63-1101 shall be applied and appropriate denial or approval shall be made."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_gross_income_eligible_under_maximum_gross_income_test and
          not household_net_income_eligible_under_handbook_section_63_1101
