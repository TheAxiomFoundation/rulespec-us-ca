format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-409.12
  summary: |-
    Except for categorically eligible households, the CWD shall deny participation in the Food Stamp Program to any household whose nonexempt resources determined in accordance with Section 63-501, exceed the appropriate maximum resource eligibility standards specified in federal regulations 7 CFR 273.8(b), and reproduced in Handbook Sections 63-1101.11 and .12.
rules:
  - name: noncategorically_eligible_household_exceeds_resource_eligibility_standard
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: MPP 63-409.12
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-409.12
              excerpt: "Except for categorically eligible households"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-409.12
              excerpt: "the CWD shall deny participation in the Food Stamp Program to any household whose nonexempt resources determined in accordance with Section 63-501, exceed the appropriate maximum resource eligibility standards"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not household_categorically_eligible
          and household_nonexempt_resources_determined_under_section_63_501_exceed_appropriate_maximum_resource_eligibility_standard
