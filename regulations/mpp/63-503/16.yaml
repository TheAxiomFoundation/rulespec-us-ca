format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.16
  summary: |-
    Households who apply for benefits after the 15th day of the month, and have been determined eligible to receive benefits for the initial month and the subsequent month, shall receive both allotments at the same time.
rules:
  - name: household_receives_initial_and_subsequent_month_allotments_at_same_time
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-503.16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.16
              excerpt: "Households who apply for benefits after the 15th day of the month"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.16
              excerpt: "have been determined eligible to receive benefits for the initial month and the subsequent month"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.16
              excerpt: "shall receive both allotments at the same time"
    versions:
      - effective_from: '0001-01-01'
