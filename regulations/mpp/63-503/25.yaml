format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.25
  summary: |-
    (MR) Determining Deductions For All Households Deductible expenses include only certain medical, dependent care, shelter costs, and child support as specified in Section 63-502.3. (QR) Determining Deductions for Change Reporting and QR/RB Households Deductible expenses include only certain medical, dependent care, and shelter costs. Treatment of deductions for households subject to QR/PB are specified in Sections 63-509(a)(3), (a)(3)(A), (a)(3)(B), and (a)(3)(C). FOOD STAMP REGULATIONS (Continued)
rules:
  - name: mr_household_deductible_expense
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 63-503.25 (MR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.25
              excerpt: "(MR) Determining Deductions For All Households Deductible expenses include only certain medical, dependent care, shelter costs, and child support as specified in Section 63-502.3."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          medical_expense_specified_in_section_63_502_3 or dependent_care_expense_specified_in_section_63_502_3 or shelter_cost_specified_in_section_63_502_3 or child_support_expense_specified_in_section_63_502_3
  - name: change_reporting_qr_rb_household_deductible_expense
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 63-503.25 (QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.25
              excerpt: "(QR) Determining Deductions for Change Reporting and QR/RB Households Deductible expenses include only certain medical, dependent care, and shelter costs."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          medical_expense_specified_in_section_63_502_3 or dependent_care_expense_specified_in_section_63_502_3 or shelter_cost_specified_in_section_63_502_3
