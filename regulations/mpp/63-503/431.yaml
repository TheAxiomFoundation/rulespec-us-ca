format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.431
  summary: |-
    (a) If income is received on a monthly or more frequent basis, it shall be considered as coming from a terminated source if it will not be received again from the same source during the balance of the month of application or during the following month. (b) If income is normally received less often than monthly, the nonreceipt of income from the same source in the balance of the month of application or in the following month is inappropriate to determine whether or not the income is terminated. Therefore, for households that normally receive income less often than monthly, the income shall be considered as coming from a terminated source if it will not be received in the month in which the next payment would normally be received.
rules:
  - name: income_from_terminated_source_under_frequency_timing_rule
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-503.431(a), (b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.431
              excerpt: "(a) If income is received on a monthly or more frequent basis, it shall be considered as coming from a terminated source if it will not be received again from the same source during the balance of the month of application or during the following month."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.431
              excerpt: "(b) If income is normally received less often than monthly, the nonreceipt of income from the same source in the balance of the month of application or in the following month is inappropriate to determine whether or not the income is terminated. Therefore, for households that normally receive income less often than monthly, the income shall be considered as coming from a terminated source if it will not be received in the month in which the next payment would normally be received."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            income_received_on_monthly_or_more_frequent_basis and
            income_will_not_be_received_again_from_same_source_during_balance_of_month_of_application and
            income_will_not_be_received_again_from_same_source_during_following_month
          ) or (
            income_normally_received_less_often_than_monthly and
            income_will_not_be_received_in_month_next_payment_would_normally_be_received
          )
