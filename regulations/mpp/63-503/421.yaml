format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.421
  summary: |-
    The income from boarders shall include all direct payments to the household for lodging and meals, including contributions to the household's shelter expenses. Shelter expenses paid directly by boarders to someone outside the household shall not be counted as income to the household. Foster care payments are not counted as income if the foster care boarders are not members of the foot stamp household as specified in Section 63-402.322.
rules:
  - name: boarder_shelter_expenses_paid_outside_household_excluded_income_amount
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 63-503.421, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.421
              excerpt: "Shelter expenses paid directly by boarders to someone outside the household shall not be counted as income to the household."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, shelter_expenses_paid_directly_by_boarders_to_someone_outside_household)

  - name: foster_care_payments_excluded_from_boarder_income
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 63-503.421, sentence 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.421
              excerpt: "Foster care payments are not counted as income if the foster care boarders are not members of the foot stamp household as specified in Section 63-402.322."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if foster_care_payments_to_household_for_foster_care_boarders > 0 and foster_care_boarders_are_not_members_of_food_stamp_household_under_section_63_402_322: max(0, foster_care_payments_to_household_for_foster_care_boarders) else: 0

  - name: countable_boarder_income_to_household
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 63-503.421
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.421
              excerpt: "The income from boarders shall include all direct payments to the household for lodging and meals, including contributions to the household's shelter expenses."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.421
              excerpt: "Foster care payments are not counted as income if the foster care boarders are not members of the foot stamp household as specified in Section 63-402.322."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, direct_payments_to_household_for_boarder_lodging_and_meals_including_shelter_contributions - foster_care_payments_excluded_from_boarder_income)
