format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.329
  summary: |-
    (MR) The CWD shall deny the application of an otherwise eligible household with three or more members that has a net income which would set its benefit level at zero. The application shall be denied on the grounds that net income exceeds the level at which benefits are issued unless any of the following occur: (QR) The CWD shall deny the application of an otherwise eligible change reporting or QR/PB household with three or more members that has a net income which would set its benefit level at zero. The application shall be denied on the grounds that net income exceeds the level at which benefits are issued unless any of the following occur: (a) The benefit level of zero is due to proration; or (b) The household is categorically eligible as specified in Sections 63-301.7 and .82. The CWD shall notify these households of their eligibility for zero benefits. Page 289.2 FOOD STAMP REGULATIONS Regulations ELIGIBILITY DETERMINATIONS 63-503 (Cont.) (Continued)
rules:
  - name: zero_benefit_denial_minimum_household_members
    kind: parameter
    dtype: Count
    source: 63-503.329, "three or more members"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.329
              excerpt: "otherwise eligible household with three or more members"
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.329
              excerpt: "otherwise eligible change reporting or QR/PB household with three or more members"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: application_denied_for_zero_benefit_net_income
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.329, denial rule and exceptions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.329
              excerpt: "(MR) The CWD shall deny the application of an otherwise eligible household with three or more members that has a net income which would set its benefit level at zero."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.329
              excerpt: "(QR) The CWD shall deny the application of an otherwise eligible change reporting or QR/PB household with three or more members that has a net income which would set its benefit level at zero."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.329
              excerpt: "(a) The benefit level of zero is due to proration"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.329
              excerpt: "(b) The household is categorically eligible as specified in Sections 63-301.7 and .82."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (otherwise_eligible_mr_household or otherwise_eligible_change_reporting_or_qr_pb_household)
          and household_member_count >= zero_benefit_denial_minimum_household_members
          and net_income_would_set_benefit_level_at_zero
          and
          not zero_benefit_level_due_to_proration
          and
          not household_categorically_eligible_under_sections_63_301_7_and_82
