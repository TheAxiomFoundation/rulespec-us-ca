  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.324
  summary: |-
    (MR) The household's monthly allotment shall be determined from the Coupon Allotment Tables on the basis of household size and net income. The counties shall issue food stamp coupons pursuant to the coupon allotment tables as promulgated and updated by the USDA. The SDSS shall provide the updated coupon allotment tables, which are to be implemented upon their effective date. Refer to Handbook Section 63-1101 for the most recent coupon allotment tables and their effective date. FOOD STAMP REGULATIONS (Continued) (QR) Change reporting and QR/PB household's monthly allotment shall be determined from the Coupon Allotment Tables on the basis of household size and net income. The counties shall issue food stamp benefits pursuant to the coupon allotment tables as promulgated and updated by the USDA. The CDSS shall provide the updated coupon allotment tables, which are to be implemented upon their effective date. Refer to Handbook Section 63-1101 for the most recent coupon allotment tables and their effective date.
