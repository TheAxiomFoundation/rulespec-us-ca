format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.132
  summary: |-
    After determining the prorated allotment, the CWD shall round the product down to the nearest lower whole dollar. If the computation results in an allotment of less than $10, then no issuance shall be made for the whole month.
rules:
  - name: minimum_prorated_allotment_issuance_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 63-503.132, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.132
              excerpt: "If the computation results in an allotment of less than $10, then no issuance shall be made for the whole month."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: prorated_allotment_rounded_down_to_whole_dollar
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 63-503.132, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.132
              excerpt: "After determining the prorated allotment, the CWD shall round the product down to the nearest lower whole dollar."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, floor(determined_prorated_allotment))

  - name: monthly_issuance_after_minimum_prorated_allotment_rule
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 63-503.132, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.132
              excerpt: "If the computation results in an allotment of less than $10, then no issuance shall be made for the whole month."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.132
              excerpt: "After determining the prorated allotment, the CWD shall round the product down to the nearest lower whole dollar."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if prorated_allotment_rounded_down_to_whole_dollar < minimum_prorated_allotment_issuance_threshold: 0 else: prorated_allotment_rounded_down_to_whole_dollar
