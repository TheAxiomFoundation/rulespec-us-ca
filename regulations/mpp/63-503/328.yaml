format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.328
  summary: |-
    (MR) When a household's circumstances change and it becomes entitled to a different income eligibility test, the CWD shall apply the different test at the next recertification or whenever the CWD changes the household's eligibility, benefit level or certification period, whichever occurs first. (QR) When a change reporting or QR/PB household's circumstances change and it becomes entitled to a different income eligibility test, the CWD shall apply the different test at the next recertification or whenever the CWD changes the household's eligibility, benefit level or certification period, whichever occurs first.
rules:
  - name: different_income_eligibility_test_application_required_at_first_event
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-503.328, timing condition for applying a different income eligibility test
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.328
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            household_is_mr_household
            or household_is_change_reporting_household
            or household_is_qr_pb_household
          )
          and household_circumstances_changed
          and household_becomes_entitled_to_different_income_eligibility_test
          and (
            current_day_is_next_recertification
            or current_day_is_when_cwd_changes_household_eligibility_benefit_level_or_certification_period
          )
          and current_day_is_first_of_next_recertification_or_cwd_change
  - name: cwd_different_income_eligibility_test_application_requirement_satisfied
    kind: derived
    entity: Household
    dtype: Judgment
    period: Day
    source: MPP 63-503.328, CWD shall apply the different test at the first specified event
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.328
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not different_income_eligibility_test_application_required_at_first_event
          or cwd_applies_different_income_eligibility_test
