format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.141
  summary: |-
    (QR) Determination of benefits in a QR/PB household is also based upon reported, estimated and/or anticipated income over the QR Payment Quarter. The household shall be entitled to benefits if otherwise eligible in accordance with Sections 63-508 and 63-509. FOOD STAMP REGULATIONS (Continued)
rules:
  - name: qr_pb_household_benefit_determination_uses_qr_payment_quarter_income
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.141 (QR), first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.141
              excerpt: "(QR) Determination of benefits in a QR/PB household is also based upon reported, estimated and/or anticipated income over the QR Payment Quarter."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_qr_pb_household
  - name: qr_pb_household_entitled_to_benefits_when_otherwise_eligible
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.141 (QR), second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.141
              excerpt: "The household shall be entitled to benefits if otherwise eligible in accordance with Sections 63-508 and 63-509."
