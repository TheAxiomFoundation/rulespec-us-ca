format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.432
  summary: |-
    (a) Income which is normally received on a monthly or more frequent basis shall be considered to be from a new source if income of more than $25 has not been received from that source within 30 days prior to the date the application was filed. (b) If income is normally received less often than monthly, it shall be considered to be from a new source if income of more than $25 was not received within the last normal interval between payments.
rules:
  - name: new_source_income_received_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 63-503.432(a), (b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.432
              excerpt: "income of more than $25"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: new_source_application_lookback_days
    kind: parameter
    dtype: Count
    source: 63-503.432(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.432
              excerpt: "within 30 days prior to the date the application was filed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30

  - name: monthly_or_more_frequent_income_from_new_source
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.432(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.432
              excerpt: "(a) Income which is normally received on a monthly or more frequent basis shall be considered to be from a new source if income of more than $25 has not been received from that source within 30 days prior to the date the application was filed."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          income_normally_received_monthly_or_more_frequently and
          income_received_from_source_within_30_days_prior_to_application <= new_source_income_received_threshold

  - name: less_than_monthly_income_from_new_source
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.432(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.432
              excerpt: "(b) If income is normally received less often than monthly, it shall be considered to be from a new source if income of more than $25 was not received within the last normal interval between payments."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          income_normally_received_less_often_than_monthly and
          income_received_from_source_within_last_normal_interval_between_payments <= new_source_income_received_threshold

  - name: income_considered_from_new_source
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.432(a), (b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.432
              excerpt: "(a) Income which is normally received on a monthly or more frequent basis shall be considered to be from a new source if income of more than $25 has not been received from that source within 30 days prior to the date the application was filed. (b) If income is normally received less often than monthly, it shall be considered to be from a new source if income of more than $25 was not received within the last normal interval between payments."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          monthly_or_more_frequent_income_from_new_source or less_than_monthly_income_from_new_source
