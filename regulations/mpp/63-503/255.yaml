format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.255
  summary: |-
    Expense Conversion Procedures (MR) For nonmonthly reporting households the income conversion procedures of Section 63-503.242(b)(1) shall also apply to expenses billed on a weekly or biweekly basis. (QR) For change reporting and QR households, the income conversion procedures of Section 63-503.242(b)(1) shall also apply to expenses billed on a weekly or biweekly basis.
rules:
  - name: weekly_or_biweekly_billed_expenses_subject_to_income_conversion_procedures
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-503.255 (MR), (QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.255
              excerpt: "For nonmonthly reporting households the income conversion procedures of Section 63-503.242(b)(1) shall also apply to expenses billed on a weekly or biweekly basis."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.255
              excerpt: "For change reporting and QR households, the income conversion procedures of Section 63-503.242(b)(1) shall also apply to expenses billed on a weekly or biweekly basis."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (expenses_billed_on_weekly_basis or expenses_billed_on_biweekly_basis) and (household_is_nonmonthly_reporting_household or household_is_change_reporting_household or household_is_qr_household)
