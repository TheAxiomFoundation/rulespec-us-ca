format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.31
  summary: |-
    In calculating net monthly income, the entire calculation process including individual shelter and medical costs shall include exact dollars and cents. The final figure shall be rounded down to calculations that end in 1 through 49 cents and rounded up for calculations that end in 50 through 99 cents. FOOD STAMP REGULATIONS Regulations ELIGIBILITY DETERMINATIONS 63-503 (Cont.) (Continued)
rules:
  - name: net_monthly_income_round_down_cent_floor
    kind: parameter
    dtype: Money
    unit: USD
    source: 63-503.31, round-down cents range
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.31
              excerpt: "rounded down to calculations that end in 1 through 49 cents"
          - path: unit
            kind: unit
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.31
              excerpt: "exact dollars and cents"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.01

  - name: net_monthly_income_round_down_cent_ceiling
    kind: parameter
    dtype: Money
    unit: USD
    source: 63-503.31, round-down cents range
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.31
              excerpt: "rounded down to calculations that end in 1 through 49 cents"
          - path: unit
            kind: unit
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.31
              excerpt: "exact dollars and cents"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.49

  - name: net_monthly_income_round_up_cent_floor
    kind: parameter
    dtype: Money
    unit: USD
    source: 63-503.31, round-up cents range
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.31
              excerpt: "rounded up for calculations that end in 50 through 99 cents"
          - path: unit
            kind: unit
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.31
              excerpt: "exact dollars and cents"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: net_monthly_income_round_up_cent_ceiling
    kind: parameter
    dtype: Money
    unit: USD
    source: 63-503.31, round-up cents range
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.31
              excerpt: "rounded up for calculations that end in 50 through 99 cents"
          - path: unit
            kind: unit
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.31
              excerpt: "exact dollars and cents"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.99

  - name: net_monthly_income_after_final_rounding
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 63-503.31, final rounding rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.31
              excerpt: "The final figure shall be rounded down to calculations that end in 1 through 49 cents and rounded up for calculations that end in 50 through 99 cents."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.31
              excerpt: "In calculating net monthly income, the entire calculation process including individual shelter and medical costs shall include exact dollars and cents."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          floor(net_monthly_income_calculated_with_exact_dollars_and_cents_including_shelter_and_medical_costs + net_monthly_income_round_up_cent_floor)
