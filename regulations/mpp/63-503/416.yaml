format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.416
  summary: |-
    (1) The following is an example of how the farming or fishing offset should be applied in determining the monthly net self-employment income to be used for both the gross and net income eligibility tests and benefit computations: Self-Employment Income Computation Gross Income $500 Expenses - 600 Total Monthly Nonexempt Income - 100 A. Gross Income Eligibility 1. Gross Salary $300 2. Self-Employment - 0 Total Gross Earned Income 300 Unearned Income (Cash Aid) 450 Total Gross Earned and Unearned Income 750 Net Income Eligibility Adjusted Gross Earned Income $240 (300 x .80) Cash Aid 450 Less Offset -100 Total Nonexempt Gross Income 590
    (2) Self-employment Income Computation When There Are Two Different Sources of Self-employment Income Job 1 Job 2 Gross Income $ 500 $ 400 Expenses 600 350 Profit/Loss -100 +50 (A) First, offset against self-employment income Job 1 $100 Job 2 -50 $ 50 Net loss from self-employment (B) Gross Income Eligibility $ 300 Gross salary + 0 Self-employment +450 Cash Aid $ 750 total earned and unearned income (C) Net Income Eligibility $ 240 Adjusted gross salary (300 x .80) + 450 Unearned income $ 690 Adjusted net income - 50 Self-employment loss $ 640 total nonexempt gross income
rules:
  - name: farming_fishing_self_employment_income_for_gross_eligibility
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 63-503.416 Handbook (1)-(2), Gross Income Eligibility
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.416
              excerpt: "Gross Income Eligibility 1. Gross Salary $300 2. Self-Employment - 0 Total Gross Earned Income 300 Unearned Income (Cash Aid) 450 Total Gross Earned and Unearned Income 750"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.416
              excerpt: "First, offset against self-employment income Job 1 $100 Job 2 -50 $ 50 Net loss from self-employment (B) Gross Income Eligibility $ 300 Gross salary + 0 Self-employment +450 Cash Aid $ 750 total earned and unearned income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, monthly_farming_fishing_self_employment_gross_income - monthly_farming_fishing_self_employment_expenses)
  - name: farming_fishing_self_employment_loss_offset_for_net_eligibility
    kind: derived
