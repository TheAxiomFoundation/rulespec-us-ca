format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.15
  summary: |-
    (MR) As a result of reported, estimated or anticipated changes, the household's allotment for the month of application may differ from its allotment in subsequent months. The household's allotment shall vary from month to month to reflect actual changes reported during the certification period or those changes anticipated at the time of certification unless the averaging techniques in Sections 63-503.212(b), .242(c) or .252 are used. The CWD shall establish the household's certification period in accordance with Section 63-504.1. (QR) As a result of reported, estimated or anticipated changes in a change reporting household, the household's allotment for the month of application may differ from its allotment in subsequent months. The household's allotment shall vary from month to month to reflect actual changes reported during the certification period or those changes anticipated at the time of certification unless the averaging techniques in Sections 63-504.242(c), .252 or .411(b) are used. The CWD shall establish the household's certification period in accordance with Section 63-504.1.
rules:
  - name: household_allotment_varies_month_to_month_for_reported_or_anticipated_changes
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.15 (MR), (QR), allotment-variation clauses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.15
              excerpt: "The household's allotment shall vary from month to month to reflect actual changes reported during the certification period or those changes anticipated at the time of certification unless the averaging techniques in Sections 63-503.212(b), .242(c) or .252 are used."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.15
              excerpt: "The household's allotment shall vary from month to month to reflect actual changes reported during the certification period or those changes anticipated at the time of certification unless the averaging techniques in Sections 63-504.242(c), .252 or .411(b) are used."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.15
              excerpt: "(QR) As a result of reported, estimated or anticipated changes in a change reporting household"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            monthly_reporting_household
            and (
              actual_changes_reported_during_certification_period
              or changes_anticipated_at_time_of_certification
            )
            and not averaging_techniques_under_section_63_503_212_b_used
            and not averaging_techniques_under_section_63_503_242_c_used
            and not averaging_techniques_under_section_63_503_252_used
          ) or (
            change_reporting_household
            and (
              actual_changes_reported_during_certification_period
              or changes_anticipated_at_time_of_certification
            )
            and not averaging_techniques_under_section_63_504_242_c_used
            and not averaging_techniques_under_section_63_504_252_used
            and not averaging_techniques_under_section_63_504_411_b_used
          )
