format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.423
  summary: |-
    The income from self-employment minus the cost of doing business shall be added to other earned income and the earned income deduction shall be applied to the total. Shelter expenses the household actually incurs, even if the boarder contributes to the household for part of the household's shelter expenses, shall be computed to determine if the household will receive a shelter deduction. However, the shelter expenses shall not include any shelter expenses paid directly by the boarder to a third party, such as to the landlord or utility company.
rules:
  - name: earned_income_deduction_base_with_net_self_employment_income
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: MPP 63-503.423, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.423
              excerpt: "The income from self-employment minus the cost of doing business shall be added to other earned income and the earned income deduction shall be applied to the total."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          self_employment_income - self_employment_cost_of_doing_business + other_earned_income
  - name: shelter_expenses_for_shelter_deduction_excluding_boarder_direct_payments
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: MPP 63-503.423, sentences 2-3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.423
              excerpt: "Shelter expenses the household actually incurs, even if the boarder contributes to the household for part of the household's shelter expenses, shall be computed to determine if the household will receive a shelter deduction."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.423
              excerpt: "However, the shelter expenses shall not include any shelter expenses paid directly by the boarder to a third party, such as to the landlord or utility company."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, household_actually_incurred_shelter_expenses - shelter_expenses_paid_directly_by_boarder_to_third_party)
