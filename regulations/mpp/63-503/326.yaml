format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.326
  summary: |-
    (MR) For an eligible household with three or more members which is entitled to benefits for the initial month but not the following month, the CWD shall certify the household in accordance with Section 63-504.1 and terminate the case for the following month if the household is prospectively ineligible. The household shall be notified in accordance with Section 63-504.261. FOOD STAMP REGULATIONS Regulations ELIGIBILITY DETERMINATIONS 63-503 (Cont.) (Continued) (QR) For an eligible change reporting household with three or more members which is entitled to benefits for the initial month but not the following month, the CWD shall certify the household in accordance with Section 63-504.1 and terminate the case for the following month if the household is prospectively ineligible. For QR/PB households with three or more members, benefits shall be provided during the QR Payment Quarter if averaged income over the quarter does not render the household ineligible for the quarter. The QR/PB household shall be certified in accordance with Section 63-504.1 if averaged income over the quarter for the QR/PB household does not exceed the 130 percent FPL for family size.
rules:
  - name: minimum_household_members_for_three_or_more_member_rules
    kind: parameter
    dtype: Count
    source: 63-503.326, three-or-more-member condition
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.326
              excerpt: "three or more members"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: qr_pb_certification_fpl_limit_rate
    kind: parameter
    dtype: Rate
    source: 63-503.326, final sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.326
              excerpt: "does not exceed the 130 percent FPL for family size"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1.30

  - name: initial_month_certification_required_for_three_or_more_member_household
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.326, MR and QR initial-month certification clauses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.326
              excerpt: "For an eligible household with three or more members which is entitled to benefits for the initial month but not the following month, the CWD shall certify the household in accordance with Section 63-504.1"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.326
              excerpt: "For an eligible change reporting household with three or more members which is entitled to benefits for the initial month but not the following month, the CWD shall certify the household in accordance with Section 63-504.1"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            eligible_household
            or eligible_change_reporting_household
          )
          and household_member_count >= minimum_household_members_for_three_or_more_member_rules
          and household_entitled_to_benefits_for_initial_month
          and not household_entitled_to_benefits_for_following_month

  - name: following_month_case_termination_required_for_prospectively_ineligible_household
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.326, MR and QR following-month termination clauses
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.326
              excerpt: "terminate the case for the following month if the household is prospectively ineligible"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            eligible_household
            or eligible_change_reporting_household
          )
          and household_member_count >= minimum_household_members_for_three_or_more_member_rules
          and household_entitled_to_benefits_for_initial_month
          and not household_entitled_to_benefits_for_following_month
          and household_prospectively_ineligible_for_following_month

  - name: qr_payment_quarter_benefits_provided_for_three_or_more_member_qr_pb_household
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.326, QR/PB payment-quarter benefits clause
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.326
              excerpt: "For QR/PB households with three or more members, benefits shall be provided during the QR Payment Quarter if averaged income over the quarter does not render the household ineligible for the quarter."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          qr_pb_household
          and month_is_in_qr_payment_quarter
          and household_member_count >= minimum_household_members_for_three_or_more_member_rules
          and averaged_income_over_quarter_does_not_render_household_ineligible_for_quarter

  - name: qr_pb_household_certification_required_based_on_averaged_income
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.326, QR/PB certification by averaged income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.326
              excerpt: "The QR/PB household shall be certified in accordance with Section 63-504.1 if averaged income over the quarter for the QR/PB household does not exceed the 130 percent FPL for family size."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          qr_pb_household
          and household_member_count >= minimum_household_members_for_three_or_more_member_rules
          and averaged_income_over_qr_payment_quarter <= family_size_fpl * qr_pb_certification_fpl_limit_rate
