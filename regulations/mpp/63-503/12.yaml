format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.12
  summary: |-
    A calendar month shall be used for certification and issuance purposes. However, a CWD may, with prior SDSS and FNS approval, use a fiscal month if the CWD determines that it is more efficient and satisfies SDSS that the accounting procedures fully comply with certification and issuance requirements contained in these regulations. A CWD may elect to use either one fiscal month for all households, or more than one fiscal month with varying beginning dates based on the date a household files an application.
rules:
  - name: cwd_may_use_fiscal_month_for_certification_and_issuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-503.12, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.12
              excerpt: "a CWD may, with prior SDSS and FNS approval, use a fiscal month"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.12
              excerpt: "if the CWD determines that it is more efficient"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.12
              excerpt: "satisfies SDSS that the accounting procedures fully comply with certification and issuance requirements contained in these regulations"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cwd_has_prior_sdss_approval_to_use_fiscal_month_for_certification_and_issuance
          and cwd_has_prior_fns_approval_to_use_fiscal_month_for_certification_and_issuance
          and cwd_determines_fiscal_month_more_efficient_for_certification_and_issuance
          and cwd_satisfies_sdss_accounting_procedures_fully_comply_with_certification_and_issuance_requirements
  - name: calendar_month_required_for_certification_and_issuance
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-503.12, first and second sentences
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.12
              excerpt: "A calendar month shall be used for certification and issuance purposes."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.12
              excerpt: "However, a CWD may, with prior SDSS and FNS approval, use a fiscal month"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not cwd_may_use_fiscal_month_for_certification_and_issuance
  - name: cwd_may_elect_one_fiscal_month_for_all_households
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-503.12, third sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.12
              excerpt: "A CWD may elect to use either one fiscal month for all households"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cwd_may_use_fiscal_month_for_certification_and_issuance
          and cwd_elects_one_fiscal_month_for_all_households
  - name: cwd_may_elect_multiple_fiscal_months_based_on_application_date
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-503.12, third sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.12
              excerpt: "or more than one fiscal month with varying beginning dates based on the date a household files an application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          cwd_may_use_fiscal_month_for_certification_and_issuance
          and cwd_elects_more_than_one_fiscal_month_with_varying_beginning_dates_based_on_date_household_files_application
