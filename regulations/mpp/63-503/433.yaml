format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.433
  summary: |-
    Households may receive both income from a terminated source prior to the date of application and income from a new source after the date of application, and shall still be considered destitute if income of more than $25 will not be received by the 10th day after the date of application and no other income will be received in the month of application.
rules:
  - name: destitute_income_receipt_threshold
    kind: parameter
    dtype: Money
    unit: USD
    period: Month
    source: 63-503.433, "$25" threshold
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.433
              excerpt: "income of more than $25 will not be received by the 10th day after the date of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25

  - name: terminated_and_new_source_income_household_still_destitute
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-503.433
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.433
              excerpt: "Households may receive both income from a terminated source prior to the date of application and income from a new source after the date of application"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.433
              excerpt: "shall still be considered destitute if income of more than $25 will not be received by the 10th day after the date of application"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.433
              excerpt: "and no other income will be received in the month of application"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_received_income_from_terminated_source_prior_to_application and
          household_will_receive_income_from_new_source_after_application and
          income_expected_by_tenth_day_after_application <= destitute_income_receipt_threshold and
          not other_income_will_be_received_in_month_of_application
