format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.41
  summary: |-
    Section 63-503.41(MR) shall become inoperative and Section 63-503.41(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director's QR/PB Declaration. (MR) For monthly reporting households receiving self-employment income, including those households that own and operate a commercial boarding house, the CWD shall calculate the self-employment income in accordance with this section. All households that own and operate a noncommercial boarding house shall have their income calculated in accordance with Section 63-503.42. (QR) For QR households receiving self-employment income, including those households that own and operate a commercial boarding house, the CWD shall calculate the self-employment income in accordance with this section. All households that own and operate a noncommercial boarding house shall have their income calculated in accordance with Section 63-503.42. QR/PB households are subject to income averaging rules as specified in Sections 63-509(a)(4), (a)(5) and (a)(6).
rules:
  - name: self_employment_income_calculation_under_section_applies
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 63-503.41(MR), (QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.41
              excerpt: "For monthly reporting households receiving self-employment income, including those households that own and operate a commercial boarding house, the CWD shall calculate the self-employment income in accordance with this section."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.41
              excerpt: "For QR households receiving self-employment income, including those households that own and operate a commercial boarding house, the CWD shall calculate the self-employment income in accordance with this section."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.41
              excerpt: "All households that own and operate a noncommercial boarding house shall have their income calculated in accordance with Section 63-503.42."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (household_receives_self_employment_income or household_owns_and_operates_commercial_boarding_house) and
          not household_owns_and_operates_noncommercial_boarding_house
