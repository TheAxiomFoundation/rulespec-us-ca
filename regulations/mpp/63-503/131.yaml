format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.131
  summary: |-
    (a) Refer to Handbook Section 63-1101 for Reciprocal Table for computing first month benefits, or (b) Use the following formula: (number of days in month +1 full month's - date of application) benefits X number of days in month = allotment Page 262.1 FOOD STAMP REGULATIONS Regulations ELIGIBILITY DETERMINATIONS 63-503 (Cont.) (Continued)
rules:
  - name: first_month_allotment_computed_by_reciprocal_table_or_formula
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 63-503.131(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.131
              excerpt: "(a) Refer to Handbook Section 63-1101 for Reciprocal Table for computing first month benefits"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.131
              excerpt: "(b) Use the following formula: (number of days in month +1 full month's - date of application) benefits X number of days in month = allotment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if first_month_benefits_are_computed_using_handbook_section_63_1101_reciprocal_table: max(0, first_month_allotment_from_handbook_section_63_1101_reciprocal_table) else: max(0, ((number_of_days_in_month + 1 - application_date_day_of_month) * full_month_benefits) / number_of_days_in_month)
