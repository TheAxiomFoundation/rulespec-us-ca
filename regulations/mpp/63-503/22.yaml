format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.22
  summary: |-
    (MR) Transitioning Households from Prospective to Retrospective Budgeting A household's benefit level shall be computed prospectively during the beginning months of the household's certification period by considering all factors of eligibility. The prospective determination of eligibility and benefit level shall be based on the income and other circumstances that the CWD is reasonably certain will exist for that household during the beginning months as specified in Section 63-503.212(a). (MR) .221 If the household has two beginning months, when the CWD receives the household's first CA 7 during the second beginning month, the CWD shall continue to prospectively determine the household's eligibility, but the CWD shall issue benefits retrospectively for month three based on the actual information reported on the CA 7 for month one except as specified in Section 63-503.232(c). (MR) .222 If the household has three beginning months, when the CWD receives the household's second CA 7 during the third beginning month, the CWD shall continue to prospectively determine the household's eligibility. The CWD shall commence issuing benefits retrospectively for month four based on the actual information reported on the CA 7 for month two, except as specified in Section 63-503.232(c).
