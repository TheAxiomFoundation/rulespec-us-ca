format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.43
  summary: |-
    Migrant or seasonal farmworker households may have little or no income at the time of application and may be in need of immediate food assistance, even though they receive income at some other time during the month of application. The following procedures shall be used to determine when migrant or seasonal farmworker households in these circumstances may be considered destitute and, therefore, entitled to expedited service and special income calculation procedures. Households other than migrant or seasonal farmworker households shall not be classified as destitute.
rules:
  - name: migrant_or_seasonal_farmworker_household_may_be_considered_destitute
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.43
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.43
              excerpt: "Migrant or seasonal farmworker households may have little or no income at the time of application and may be in need of immediate food assistance, even though they receive income at some other time during the month of application."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.43
              excerpt: "The following procedures shall be used to determine when migrant or seasonal farmworker households in these circumstances may be considered destitute and, therefore, entitled to expedited service and special income calculation procedures."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.43
              excerpt: "Households other than migrant or seasonal farmworker households shall not be classified as destitute."
    versions:
