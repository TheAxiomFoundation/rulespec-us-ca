format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.327
  summary: |-
    (MR) For those eligible households which are entitled to no benefits in their initial month of application in accordance with Section 63-503.324, but are entitled to benefits in the next month, the CWD shall certify the households beginning with the month of application. (QR) No Eligibility in the Initial Month of Application (QR) (a) For those eligible change reporting households which are not entitled to benefits in their initial month of application in accordance with Section 63-503.324, but are entitled to benefits in the next month, the CWD shall certify the households beginning with the month of application. (QR) (b) For QR/PB households whose income has been averaged over the QR Payment Quarter and averaged income makes the household ineligible, the application shall be denied unless the household is categorically eligible. (1) The CWD shall inform households whose applications have been denied that if their income stops or drops, the household may contact the CWD to reapply for benefits. (2) The CWD shall use the original application along with updated information if the household reapplies within 30 days of the denial of benefits. Page 289.1 FOOD STAMP REGULATIONS (Continued)
rules:
  - name: cwd_must_certify_no_initial_benefits_household_beginning_with_month_of_application
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.327 (MR), (QR)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.327
              excerpt: "(MR) For those eligible households which are entitled to no benefits in their initial month of application in accordance with Section 63-503.324, but are entitled to benefits in the next month, the CWD shall certify the households beginning with the month of application."
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.327
              excerpt: "(QR) (a) For those eligible change reporting households which are not entitled to benefits in their initial month of application in accordance with Section 63-503.324, but are entitled to benefits in the next month, the CWD shall certify the households beginning with the month of application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (eligible_household or eligible_change_reporting_household)
          and household_not_entitled_to_benefits_in_initial_month_under_section_63_503_324
          and household_entitled_to_benefits_in_next_month

  - name: qr_pb_application_denied_for_averaged_income_ineligibility
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.327 (QR)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.327
              excerpt: "(QR) (b) For QR/PB households whose income has been averaged over the QR Payment Quarter and averaged income makes the household ineligible, the application shall be denied unless the household is categorically eligible."
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.327
              excerpt: "unless the household is categorically eligible"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          qr_pb_household
          and household_income_averaged_over_qr_payment_quarter
          and averaged_income_makes_household_ineligible
          and not household_categorically_eligible

  - name: cwd_must_use_original_application_for_timely_reapplication
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.327 (QR)(b)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.327
              excerpt: "(2) The CWD shall use the original application along with updated information if the household reapplies within 30 days of the denial of benefits."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_reapplies_within_30_days_of_denial_of_benefits
