format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.322
  summary: |-
    (MR) To determine the eligibility of a household with at least one member who is elderly or disabled as defined in Section 63-102(e), the household's net income, as determined by Section 63-503.312, shall be compared to the net monthly income eligibility standard for the appropriate household size. (See Handbook Section 63-1101 for the net monthly income eligibility standards.) (MR) (a) For households which are subject to monthly reporting, the CWD shall apply the net monthly income eligibility standards each month during the household's certification period, except as specified in Sections 63-301.7 and .82. The household's continued eligibility for benefits shall be based on the household's size and income information which the household and the CWD anticipate for the next issuance month. This determination shall be based on the information reported on and submitted with the most recent CA 7. The CWD shall also consider information which the household reports outside of the normal monthly reporting system. (MR) (1) If the household's net monthly income does not exceed the standard, the CWD shall issue benefits in accordance with Section 63-503.22. (MR) (2) If the household's net monthly income exceeds the standard, the CWD shall either deny the application or terminate; or suspend the household's benefits in accordance with Section 63-504.37. (MR) (b) For migrant farmworker households, the CWD shall deny the application if the household's net monthly income exceeds the standard. (QR) (a) For households which are subject to QR, the CWD shall apply the gross and net monthly income tests to income averaged over the QR Payment Quarter. The household's continued eligibility for benefits shall be based on the household's size and income information which the household and the CWD anticipate for the next QR Payment Quarter or remaining months in the quarter. FOOD STAMP REGULATIONS Regulations ELIGIBILITY DETERMINATIONS 63-503 (Cont.) (Continued) (QR) (1) If the household’s net quarterly averaged income does not exceed the standard, the CWD shall issue benefits in accordance with Section 63-503.22. (QR) (2) If the household's net quarterly averaged income exceeds the standard, the CWD shall deny the application or terminate benefits at the end of the quarter. If CalWORKs benefits are terminated mid-quarter based on income in excess of the IRT and income exceeds the household's standards, a mid-quarter action shall be taken to deny or terminate benefits and Transitional Food Stamp Benefits must be issued in accordance with Section 63-504.13.
