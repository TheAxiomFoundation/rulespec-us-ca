format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.434
  summary: |-
    Destitute households shall have their eligibility and level of benefits calculated for the month of application by considering only income which is received between the first of the month and the date of application. Any income from a new source that is anticipated after the date of application shall be disregarded.
rules:
  - name: destitute_household_application_month_income_considered
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: MPP 63-503.434, first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.434
              excerpt: "Destitute households shall have their eligibility and level of benefits calculated for the month of application by considering only income which is received between the first of the month and the date of application."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_is_destitute: income_received_between_first_of_month_and_date_of_application else: 0
  - name: destitute_household_anticipated_new_source_income_disregarded
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: MPP 63-503.434, second sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.434
              excerpt: "Any income from a new source that is anticipated after the date of application shall be disregarded."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if household_is_destitute: income_from_new_source_anticipated_after_date_of_application else: 0
