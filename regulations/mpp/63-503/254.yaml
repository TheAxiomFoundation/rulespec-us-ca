    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: 63-503.254(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.254
              excerpt: "An expense covered by an excluded reimbursement or vendor payment shall not be deductible"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.254
              excerpt: "except for energy assistance vendor payments made under the LIHEAA of 1981"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          expense_covered_by_excluded_reimbursement_or_vendor_payment and (not energy_assistance_vendor_payment_made_under_liheaa_of_1981)

