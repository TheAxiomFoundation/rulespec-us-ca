format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.414
  summary: |-
    The proceeds from the sale of capital goods or equipment shall be calculated in the same manner as a capital gain for Federal income tax purposes. Even if only 50 percent of the proceeds from the sale of capital goods or equipment is taxed for Federal income tax purposes, the CWD shall count the full amount of the capital gain as income for food stamp purposes. For households whose self-employment income is calculated on an anticipated, rather than averaged basis in accordance with Section 63-503.412(a)(1), the CWD must count the amount of capital gains the household anticipates receiving during the months over which the income is being averaged.
rules:
  - name: full_capital_gain_counted_rate_for_food_stamp_income
    kind: parameter
    dtype: Rate
    source: 63-503.414, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.414
              excerpt: "the CWD shall count the full amount of the capital gain as income for food stamp purposes"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: federal_taxed_proceeds_rate_disregarded_for_food_stamp_capital_gain_income
    kind: parameter
    dtype: Rate
    source: 63-503.414, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.414
              excerpt: "Even if only 50 percent of the proceeds from the sale of capital goods or equipment is taxed for Federal income tax purposes"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50

  - name: capital_goods_or_equipment_sale_capital_gain_counted_as_food_stamp_income
    kind: derived
    entity: SnapUnit
    dtype: Money
    period: Month
    unit: USD
    source: 63-503.414
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.414
              excerpt: "The proceeds from the sale of capital goods or equipment shall be calculated in the same manner as a capital gain for Federal income tax purposes."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.414
              excerpt: "the CWD shall count the full amount of the capital gain as income for food stamp purposes"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.414
              excerpt: "For households whose self-employment income is calculated on an anticipated, rather than averaged basis in accordance with Section 63-503.412(a)(1), the CWD must count the amount of capital gains the household anticipates receiving during the months over which the income is being averaged."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (if household_self_employment_income_calculated_on_anticipated_rather_than_averaged_basis_under_section_63_503_412_a_1: capital_gains_from_capital_goods_or_equipment_anticipated_during_income_averaging_months else: capital_goods_or_equipment_sale_capital_gain_amount_calculated_for_federal_income_tax_purposes) * full_capital_gain_counted_rate_for_food_stamp_income
