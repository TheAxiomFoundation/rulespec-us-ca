format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.412
  summary: |-
    (a) At the time of application, the income and expenses from a self-employment enterprise shall be verified for either the last year or the last period during which income was earned and which was intended to cover either a year or part of a year. The CWD shall then use this verified information to average the household's income over the next year or period of time the income is intended to cover. (1) If the household has experienced a substantial increase or decrease in business income and can provide the CWD with information that shows the averaged amount is not reflective of the household's actual circumstances, the CWD shall then calculate the household's self-employment income based on anticipated earnings rather than prior income. (b) Section 63-503.412(b)(MR) shall become inoperative and Section 63-503.412(b)(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director's QR/PB Declaration. (MR) Self-employment must be averaged over the period of time the income is intended to cover even if the household receives income from other sources. (QR) Self-employment must be averaged over the period of time the income is intended to cover even if the household receives income from other sources. For QR/PB households, self-employment must be averaged over the certification period or over a QR Payment Quarter. (c) Section 63-503.412(c)(MR) shall become inoperative and Section 63-503.412(c)(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director's QR/PB Declaration. FOOD STAMP REGULATIONS (Continued) (MR) Actual self-employment income and expense information reported and verified with the household's CA 7 shall be used at the household's next certification to average and project the household's circumstances for the next year or period of time the income is intended to cover, except that the self-employment income averaged for the current certification period must be redetermined in the following instances: (QR) Actual self-employment income and expense information reported and verified with the household's last QR 7 shall be used at the household's next certification to average and project the household’s circumstances for the next year or next QR Payment Quarter, except that the self-employment income averaged for the current certification period or QR Payment Quarter must be redetermined in the following instances: (1) The household will likely experience or has experienced a substantial decline in income due to a change in circumstance such as crop failure or bankruptcy; (2) The household reports increases or decreases in self-employment income that are outside what is normal for the particular season or trade. (3) The household provides the CWD with verification of self-employment expenses which the household incurred to produce the income specified in Section 63-503.412(a), but had previously failed to give to the CWD. In redetermining a household's averaged self-employment income the CWD shall only consider income and expenses which have been verified.
rules:
  - name: prior_self_employment_information_used_for_application_average
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.412(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.412
              excerpt: "At the time of application, the income and expenses from a self-employment enterprise shall be verified for either the last year or the last period during which income was earned"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.412
              excerpt: "If the household has experienced a substantial increase or decrease in business income and can provide the CWD with information that shows the averaged amount is not reflective"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          at_time_of_application
          and self_employment_enterprise_income_and_expenses_verified_for_last_year_or_last_income_period_intended_to_cover_year_or_part_year
          and not (
            household_experienced_substantial_increase_or_decrease_in_business_income
            and household_provides_cwd_information_showing_averaged_amount_not_reflective_of_actual_circumstances
          )

  - name: anticipated_self_employment_earnings_used_when_prior_average_not_reflective
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.412(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.412
              excerpt: "the CWD shall then calculate the household's self-employment income based on anticipated earnings rather than prior income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          at_time_of_application
          and household_experienced_substantial_increase_or_decrease_in_business_income
          and household_provides_cwd_information_showing_averaged_amount_not_reflective_of_actual_circumstances

  - name: self_employment_averaged_over_intended_coverage_period
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
