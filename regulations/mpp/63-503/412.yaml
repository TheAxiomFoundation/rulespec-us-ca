        formula: |-
          household_has_self_employment_income_intended_to_cover_period

  - name: qr_pb_self_employment_averaged_over_certification_period_or_payment_quarter
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.412(b)(QR)
    metadata:
      proof:
        atoms:
