              excerpt: "Actual self-employment income and expense information reported and verified with the household's last QR 7 shall be used at the household's next certification"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.412
