    period: Month
    source: 63-503.412(c)(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.412
              excerpt: "The household will likely experience or has experienced a substantial decline in income due to a change in circumstance such as crop failure or bankruptcy"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.412
              excerpt: "The household reports increases or decreases in self-employment income that are outside what is normal for the particular season or trade."
          - path: versions[0].formula
            kind: condition
            source:
