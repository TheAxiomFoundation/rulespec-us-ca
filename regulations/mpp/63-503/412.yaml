            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.412
              excerpt: "For QR/PB households, self-employment must be averaged over the certification period or over a QR Payment Quarter."
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.412
              excerpt: "Section 63-503.412(b)(QR) shall become operative in a county on the date QR/PB becomes effective in that county"
