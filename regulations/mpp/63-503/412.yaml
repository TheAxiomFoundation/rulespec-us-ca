          and (
            household_likely_or_has_substantial_decline_in_income_due_to_change_such_as_crop_failure_or_bankruptcy
            or household_reports_self_employment_income_increase_or_decrease_outside_normal_for_season_or_trade
            or household_provides_verification_of_previously_unreported_self_employment_expenses_incurred_to_produce_income_specified_for_application_average
