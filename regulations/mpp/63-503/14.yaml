format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.14
  summary: |-
    (MR) Because of reported, estimated or anticipated changes, a household may be eligible for the month of application, but ineligible in the subsequent month. The household shall be entitled to benefits for the month of application even if the processing of its application results in the benefits being issued in the subsequent month. (See Sections 63-504.1 for certification periods and Section 63-504.2 for notice requirements.) Similarly, a household may be ineligible for the month of application, but eligible in the subsequent month due to reported, estimated or anticipated changes in circumstances. Even though denied for the month of application, the household does not have to reapply in the subsequent month. The same application shall be used for the denial for the month of application, and for the determination of eligibility for subsequent months, within the timeliness standards in Section 63-301.1. (QR) Determination of benefits in a change reporting household, based on reported, estimated or anticipated changes, may result in a household being eligible for the month of application, but ineligible in the subsequent month. The household shall be entitled to benefits for the month of application even if the processing of its application results in the benefits being issued in the subsequent month. (See Sections 63-504.1 for certification periods and Section 63-504.2 for notice requirements.) Similarly, a household may be ineligible for the month of application, but eligible in the subsequent month due to reported, estimated or anticipated changes in circumstances. Even though denied for the month of application, the household does not have to reapply in the subsequent month. The same application shall be used for the denial for the month of application, and for the determination of eligibility for subsequent months, within the timeliness standards in Section 63-301.1.
