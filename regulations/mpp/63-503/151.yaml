format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.151
  summary: |-
    (QR) As a result of reported or anticipated changes in a QR household, the household's allotment for the month of application may differ from its allotment in subsequent months. The household's allotment may vary within the quarter to reflect changes reported during the QR Payment Quarter. The averaging techniques in Sections 63-509(a)(4), (a)(5) and (a)(6) are used to determine income in a quarter. The CWD shall establish the household's certification period in accordance with Section 63-504.1.
rules:
  - name: qr_household_application_month_allotment_may_differ_from_subsequent_months
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.151, sentence 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.151
              excerpt: "As a result of reported or anticipated changes in a QR household, the household's allotment for the month of application may differ from its allotment in subsequent months."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          qr_household and (reported_changes_in_household or anticipated_changes_in_household)

  - name: qr_household_allotment_may_vary_within_quarter_for_reported_changes
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.151, sentence 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.151
              excerpt: "The household's allotment may vary within the quarter to reflect changes reported during the QR Payment Quarter."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          qr_household and changes_reported_during_qr_payment_quarter
