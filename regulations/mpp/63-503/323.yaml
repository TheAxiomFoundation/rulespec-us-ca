format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.323
  summary: |-
    (a) The CWD shall apply the net monthly income eligibility standards whenever the household reports a change in either income or household size. The household's continued eligibility for benefits shall be based on the household's new size and income information which the household and the CWD anticipate for the next issuance month. (1) If the household's net monthly income does not exceed the standard, the CWD shall issue benefits in accordance with Section 63-503.22. (2) If the household's net monthly income exceeds the standard, the CWD shall either deny the application or terminate; or suspend the household's benefits in accordance with Section 63-504.37.
rules:
  - name: net_monthly_income_standard_applies_after_reported_change
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.323(a), first sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.323
              excerpt: "The CWD shall apply the net monthly income eligibility standards whenever the household reports a change in either income or household size."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_reports_change_in_income or household_reports_change_in_household_size

  - name: benefits_issued_when_income_within_standard_after_reported_change
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.323(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.323
              excerpt: "The household's continued eligibility for benefits shall be based on the household's new size and income information which the household and the CWD anticipate for the next issuance month."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.323
              excerpt: "If the household's net monthly income does not exceed the standard, the CWD shall issue benefits in accordance with Section 63-503.22."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          net_monthly_income_standard_applies_after_reported_change and anticipated_net_monthly_income_for_next_issuance_month <= net_monthly_income_eligibility_standard_for_anticipated_household_size

  - name: application_denied_or_benefits_terminated_or_suspended_when_income_exceeds_standard_after_reported_change
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: 63-503.323(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.323
              excerpt: "The household's continued eligibility for benefits shall be based on the household's new size and income information which the household and the CWD anticipate for the next issuance month."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.323
              excerpt: "If the household's net monthly income exceeds the standard, the CWD shall either deny the application or terminate; or suspend the household's benefits in accordance with Section 63-504.37."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          net_monthly_income_standard_applies_after_reported_change and anticipated_net_monthly_income_for_next_issuance_month > net_monthly_income_eligibility_standard_for_anticipated_household_size
