              excerpt: "Monthly reporting households which receive self-employment income on a monthly basis shall report the actual amount of such income on the monthly eligibility report. The CWD shall calculate the household's benefit level for each month based on the actual amount of self-employment income reported"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.411
              excerpt: "Section 63-503.411(a)(MR) shall become inoperative and Section 63-503.411(a)(QR) shall become operative in a county on the date QR/PB becomes effective in that county"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if monthly_reporting_household_receives_self_employment_income_on_monthly_basis and not county_qr_pb_effective_pursuant_to_directors_qr_pb_declaration: actual_self_employment_income_reported_on_monthly_eligibility_report else: 0

