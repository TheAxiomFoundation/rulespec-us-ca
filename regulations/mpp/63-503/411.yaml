    kind: parameter
    dtype: Count
    source: 63-503.411(b)(MR), (QR)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.411
              excerpt: "Self-employment income received less often than monthly which represents a household's annual income shall be averaged over a 12-month period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: monthly_reporting_self_employment_income_used_for_monthly_benefit_level
