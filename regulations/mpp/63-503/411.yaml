format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.411
  summary: |-
    (a) Section 63-503.411(a)(MR) shall become inoperative and Section 63-503.411(a)(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director's QR/PB Declaration. (MR) Monthly reporting households which receive self-employment income on a monthly basis shall report the actual amount of such income on the monthly eligibility report. The CWD shall calculate the household's benefit level for each month based on the actual amount of self-employment income reported even if such income fluctuates from month to month. (QR) QR households which receive self-employment income on a monthly basis shall report the actual amount of such income on the QR 7 for the Data Month. The CWD shall calculate the household's benefit level for the Payment Quarter based on the actual amount of self-employment income reported on the QR 7 and anticipated income for each month of the upcoming QR Payment Quarter. Self-employment income shall be averaged over the QR Payment Quarter. Changes in self-employment income that occur mid-quarter shall be treated in accordance with Section 63-509(d). (b) Section 63-503.411(b)(MR) shall become inoperative and Section 63-504.411(b)(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director's QR/PB Declaration. (MR) Self-employment income received less often than monthly which represents a household's annual income shall be averaged over a 12-month period even if the household receives income from other sources in addition to self-employment. If income is from a household member's self-employment in a farming or fishing operation and irregular expenses are incurred to produce that income, the household shall have the option to annualize the allowable costs of producing self-employment income from farming when the self-employment farm income is annualized. (QR) Self-employment income received less often than monthly which represents a change reporting or QR/PB household's annual income shall be averaged over a 12-month period even if the household receives income from other sources in addition to self-employment. The annualized monthly income figure shall be used as the averaged income for the QR Payment quarter. If income is from a household member's self-employment in a farming or fishing operation and irregular expenses are incurred to produce that income, the household shall have the option to annualize the allowable costs of producing self-employment income from farming when the self-employment farm income is annualized. For QR households, the annualized monthly figure for allowable costs of producing income from farming or fishing shall be used as an averaged expense for the QR Payment quarter. (c) Section 63-503.411(c)(MR) shall become inoperative and Section 63-503.411(c)(QR) shall become operative in a county on the date QR/PB becomes effective in that county, pursuant to the Director's QR/PB Declaration. (MR) If a household's self-employment enterprise has been in existence for less than a year the income from that self-employment enterprise shall be averaged over the period of time the business has been in operation, and the monthly amount projected over the certification period. (QR) If a household's self-employment enterprise has been in existence for less than a year, the income from that self-employment enterprise shall be averaged over the period of time the business has been in operation, and the monthly amount projected over the certification period. For QR/PB households, the projected income over the certification period shall be used in averaging income over the QR Payment Quarter.
rules:
