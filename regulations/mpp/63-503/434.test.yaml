- name: destitute_household_counts_only_income_received_before_application
  period: 2026-05
  input:
    ? us-ca:regulations/mpp/63-503#input.household_is_destitute
    : true
    ? us-ca:regulations/mpp/63-503#input.income_received_between_first_of_month_and_date_of_application
    : 275
    ? us-ca:regulations/mpp/63-503#input.income_from_new_source_anticipated_after_date_of_application
    : 900
  output:
    us-ca:regulations/mpp/63-503#destitute_household_application_month_income_considered: 275
    us-ca:regulations/mpp/63-503#destitute_household_anticipated_new_source_income_disregarded: 900
- name: destitute_household_with_no_anticipated_new_source_income
  period: 2026-05
  input:
    ? us-ca:regulations/mpp/63-503#input.household_is_destitute
    : true
    ? us-ca:regulations/mpp/63-503#input.income_received_between_first_of_month_and_date_of_application
    : 120
    ? us-ca:regulations/mpp/63-503#input.income_from_new_source_anticipated_after_date_of_application
    : 0
  output:
    us-ca:regulations/mpp/63-503#destitute_household_application_month_income_considered: 120
    us-ca:regulations/mpp/63-503#destitute_household_anticipated_new_source_income_disregarded: 0
- name: household_not_destitute_rule_inoperative
  period: 2026-05
  input:
    ? us-ca:regulations/mpp/63-503#input.household_is_destitute
    : false
    ? us-ca:regulations/mpp/63-503#input.income_received_between_first_of_month_and_date_of_application
    : 275
    ? us-ca:regulations/mpp/63-503#input.income_from_new_source_anticipated_after_date_of_application
    : 900
  output:
    us-ca:regulations/mpp/63-503#destitute_household_application_month_income_considered: 0
    us-ca:regulations/mpp/63-503#destitute_household_anticipated_new_source_income_disregarded: 0
