format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-ca/regulation/mpp/63-503.321
  summary: |-
    (MR) Monthly income, as defined in Sections 63-502.11 and 63-503.312 shall be compared to the gross and net monthly income eligibility standard for the appropriate household size to determine eligibility for all households, except as provided in Sections 63-301.6, 63-503.322, and .323. (See Handbook Section 63-1101 for the gross and net monthly income eligibility standards.) (MR) (a) For households which are subject to monthly reporting, the CWD shall apply the gross and net monthly income eligibility standards each month during the household's certification period. The household's continued eligibility for benefits shall be based on the household's size and income information which the household and the CWD anticipate for the issuance month. This determination shall be based on the information reported on and submitted with the household's most recent CA 7. The CWD shall also consider information which the household reports outside of the normal monthly reporting system. (MR) (1) If the household's gross and net monthly income does not exceed the standards the CWD shall issue benefits, in accordance with Section 63-503.22. (MR) (2) If the household's gross or net monthly income exceeds the standards, the CWD shall either deny the application or terminate; or suspend the household's benefits in accordance with Section 63-504.37. (MR) (b) For migrant farmworker households, the CWD shall deny the application if the household's gross and/or net monthly income exceeds the standards. (QR) (a) For food stamp households which are subject to QR, the CWD shall apply the gross and net monthly income eligibility standards to the averaged QR/PB Payment Quarter's income during the certification period. The household's continued eligibility for benefits shall be based on the household's size and income information which the household and the CWD anticipate for the QR Payment Quarter. This determination shall be based on the information reported on and submitted with the household's most recent QR 7. The CWD shall also consider information which the household reports outside of the normal QR system. FOOD STAMP REGULATIONS (Continued)
rules:
  - name: monthly_reporting_household_benefits_issuable_under_income_standards
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: MPP 63-503.321 (MR)(a)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.321
              excerpt: "(MR) (a) For households which are subject to monthly reporting, the CWD shall apply the gross and net monthly income eligibility standards each month during the household's certification period."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.321
              excerpt: "(MR) (1) If the household's gross and net monthly income does not exceed the standards the CWD shall issue benefits, in accordance with Section 63-503.22."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_subject_to_monthly_reporting
          and gross_monthly_income <= gross_monthly_income_eligibility_standard_for_household_size
          and net_monthly_income <= net_monthly_income_eligibility_standard_for_household_size

  - name: monthly_reporting_household_subject_to_denial_termination_or_suspension_for_income_excess
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: MPP 63-503.321 (MR)(a)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.321
              excerpt: "(MR) (a) For households which are subject to monthly reporting, the CWD shall apply the gross and net monthly income eligibility standards each month during the household's certification period."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.321
              excerpt: "(MR) (2) If the household's gross or net monthly income exceeds the standards, the CWD shall either deny the application or terminate; or suspend the household's benefits in accordance with Section 63-504.37."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_subject_to_monthly_reporting
          and (
            gross_monthly_income > gross_monthly_income_eligibility_standard_for_household_size
            or net_monthly_income > net_monthly_income_eligibility_standard_for_household_size
          )

  - name: migrant_farmworker_application_denied_for_income_excess
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: MPP 63-503.321 (MR)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.321
              excerpt: "(MR) (b) For migrant farmworker households, the CWD shall deny the application if the household's gross and/or net monthly income exceeds the standards."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          household_is_migrant_farmworker_household
          and household_has_application_pending
          and (
            gross_monthly_income > gross_monthly_income_eligibility_standard_for_household_size
            or net_monthly_income > net_monthly_income_eligibility_standard_for_household_size
          )

  - name: quarterly_reporting_household_averaged_quarter_income_within_standards
    kind: derived
    entity: SnapUnit
    dtype: Judgment
    period: Month
    source: MPP 63-503.321 (QR)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.321
              excerpt: "(QR) (a) For food stamp households which are subject to QR, the CWD shall apply the gross and net monthly income eligibility standards to the averaged QR/PB Payment Quarter's income during the certification period."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-ca/regulation/mpp/63-503.321
              excerpt: "The household's continued eligibility for benefits shall be based on the household's size and income information which the household and the CWD anticipate for the QR Payment Quarter."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          food_stamp_household_subject_to_quarterly_reporting
          and averaged_qr_pb_payment_quarter_gross_income <= qr_payment_quarter_gross_income_eligibility_standard_for_household_size
          and averaged_qr_pb_payment_quarter_net_income <= qr_payment_quarter_net_income_eligibility_standard_for_household_size
